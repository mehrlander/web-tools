<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nav Repo</title>
<meta name="shot-query" content="repo=mehrlander/web-tools&file=README.md">
<script src="https://cdn.jsdelivr.net/combine/npm/@tailwindcss/browser@4,npm/@phosphor-icons/web"></script>
<link href="https://cdn.jsdelivr.net/combine/npm/daisyui@5/themes.css,npm/daisyui@5,npm/@tailwindcss/typography/dist/typography.min.css" rel="stylesheet" />
<script type="module">
  // ?use=<branch|tag|sha> overrides which ref the bundle loads from.
  const ref = new URLSearchParams(location.search).get('use') || 'main';
  await import(`https://cdn.jsdelivr.net/gh/mehrlander/web-tools@${ref}/lib/gh-api.js`);
  await gh.load('gh-store.js');
  await gh.load('alpineComponents/repo.js');
  await gh.load('alpineComponents/navigator.js');
  await gh.load('alpineComponents/viewer.js');
  await gh.load('alpineComponents/compare.js');
  await gh.load('alpineComponents/pages.js');
  await gh.load('alpine-bundle.js');
</script>
</head>
<!-- No x-init: Alpine auto-calls a data object's init(); declaring both runs boot twice. -->
<body class="min-h-screen bg-base-100" x-data="app()">

<div class="toast toast-top toast-end z-40" x-data x-show="$store.toasts && $store.toasts.length">
  <template x-for="t in ($store.toasts || [])" :key="t.id">
  <div class="alert text-sm gap-2" :class="t.cls">
    <i class="ph" :class="'ph-'+t.icon"></i>
    <span x-text="t.msg"></span>
  </div>
  </template>
</div>

<div class="max-w-7xl mx-auto px-2 py-3">

  <div id="repo" x-data="repo()"></div>

  <div role="tablist" class="tabs tabs-border mb-3">
  <a role="tab" class="tab gap-1.5" :class="tab==='files' && 'tab-active'" @click="setTab('files')">
    <i class="ph ph-tree-structure"></i>Files
  </a>
  <a role="tab" class="tab gap-1.5" :class="tab==='pages' && 'tab-active'" @click="setTab('pages')">
    <i class="ph ph-squares-four"></i>Pages
  </a>
  </div>

  <div x-show="tab==='files'" class="grid grid-cols-1 lg:grid-cols-4 gap-3">
  <div id="navigator" x-data="navigator()" class="lg:col-span-1 flex flex-col gap-4"></div>
  <div class="lg:col-span-3 flex flex-col gap-4">
    <div id="viewer" x-data="viewer()"></div>
    <div id="compare" x-data="compare()"></div>
  </div>
  </div>

  <div x-show="tab==='pages'" id="pages" x-data="pages()"></div>
</div>

<script>
window.TOKEN = '🎟️GitHubToken';
if (window.TOKEN === '🎟️GitHubToken') {
  try { window.TOKEN = localStorage.getItem('ghToken') || window.TOKEN; } catch {}
}

const waitFor = async (pred, ms=8000, step=50) => {
  for (let t=0; t<ms; t+=step) {
  if (pred()) return true;
  await new Promise(r => setTimeout(r, step));
  }
  return false;
};

const notify = (msg, cls='alert-error', icon='warning') => {
  try {
  const t = Alpine.store('toast');
  if (t) return t(icon, msg, cls, 6000);
  } catch {}
  console.error(msg);
};

function app(){ return {
  tab: 'files',

  setTab(t) {
  this.tab = t;
  if (t === 'pages') {
    const el = document.getElementById('pages');
    const p = el && el.__pages;
    if (p && !p.open) p.toggle();
  }
  this.updateUrl();
  },

  async init(){
  const ready = await waitFor(() => window.GH);
  if (!ready) return notify('Boot timed out waiting for modules. Reload to retry.');
  try {
    const gh = new window.GH({ token: window.TOKEN });
    Alpine.store('browser').gh = gh;
    const repoEl = document.getElementById('repo');
    if (!await waitFor(() => repoEl.__repo)) return notify('Repo component never mounted.');

    const state = this.parseUrlState();

    if (state?.repo) {
    // Identity-free boot: pick the named repo directly, then populate the
    // picker dropdown in the background. No token (or a dead one) still
    // gets a browsable page for public repos.
    await repoEl.__repo.pickByName(state.repo, { ref: state.ref || '' });
    const navEl = document.getElementById('navigator');
    if (await waitFor(() => navEl.__navigator) && state.file) {
      const folder = state.file.split('/').slice(0, -1).join('/');
      if (folder) await navEl.__navigator.load(folder, true);
      await navEl.__navigator.sel(state.file, true);
    }
    repoEl.__repo.setup(gh, { quiet: true })
      .catch(e => console.warn('picker setup:', e?.message || e));
    } else {
    try {
      await repoEl.__repo.setup(gh);
    } catch (e) {
      console.error('setup:', e);
      const status = e?.status;
      if (status === 401) {
      notify('GitHub rejected the token (401). Paste a new one.');
      try { repoEl.__repo.tokenExpired = true; } catch {}
      } else if (status === 403) {
      notify('GitHub rate-limited this IP (403). A token raises the limit.');
      } else {
      notify('Could not load repos: ' + (e?.message || e));
      }
      try { document.getElementById('repoModal').showModal(); } catch {}
      return;
    }
    }
    if (state?.tab === 'pages') this.setTab('pages');

    // Keep the URL shareable: any change to repo / ref / selected file
    // rewrites the query string in place (no history spam, no remote
    // state file). repo.js's setRef also calls store.save; route it here.
    Alpine.store('browser').save = () => this.updateUrl();
    this.$watch(
    () => {
      const s = Alpine.store('browser');
      return s.repo + '@' + s.ref + ':' + (s.activeFile?.path || '');
    },
    (now, prev) => {
      // A newly selected file means the Files lens is what to look at
      // (this is how the Pages cards' "open in viewer" jumps tabs).
      const file = now.split(':')[1];
      if (file && file !== (prev || '').split(':')[1]) this.tab = 'files';
      this.updateUrl();
    }
    );

  } catch(e) {
    console.error('init:', e);
    notify('Startup failed: ' + (e?.message || e));
  }
  },

  parseUrlState() {
  const p = new URLSearchParams(location.search);
  const out = {};
  for (const k of ['repo', 'ref', 'file', 'tab']) {
    if (p.has(k)) out[k] = p.get(k);
  }
  return Object.keys(out).length ? out : null;
  },

  updateUrl() {
  try {
    const s = Alpine.store('browser');
    const p = new URLSearchParams(location.search);
    const set = (k, v) => v ? p.set(k, v) : p.delete(k);
    set('repo', s.repo);
    set('ref', s.ref && s.ref !== s.defaultRef ? s.ref : '');
    set('file', s.activeFile?.path);
    set('tab', this.tab === 'pages' ? 'pages' : '');
    const q = p.toString();
    history.replaceState(null, '', location.pathname + (q ? '?' + q : '') + location.hash);
  } catch (e) { console.warn('updateUrl:', e); }
  }
}}
</script>
</body>
</html>
