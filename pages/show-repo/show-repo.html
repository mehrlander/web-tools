<!DOCTYPE html>
<html lang="en" data-theme="winter">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>web-tools · browse</title>
<link rel="icon" type="image/svg+xml" href="../../lib/favicon.svg">
<link href="https://cdn.jsdelivr.net/combine/npm/daisyui@5/themes.css,npm/daisyui@5,npm/@tailwindcss/typography/dist/typography.min.css" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/combine/npm/@tailwindcss/browser@4,npm/@phosphor-icons/web"></script>
<script type="module">
  // ?use=<branch|tag|sha> overrides which ref the bundle loads from.
  // gh-api.js's auto-bootstrap parses owner/repo/ref from its own import URL,
  // exposes window.gh, and loads gh-auth.js. The gallery needs no token; the
  // file drawer boots lazily and only prompts for auth when the user opens it.
  const ref = new URLSearchParams(location.search).get('use') || 'main';
  await import(`https://cdn.jsdelivr.net/gh/mehrlander/web-tools@${ref}/lib/gh-api.js`);
  await gh.load('gh-store.js');
  await gh.load('alpineComponents/repo.js');
  await gh.load('alpineComponents/navigator.js');
  await gh.load('alpineComponents/viewer.js');
  await gh.load('alpineComponents/compare.js');
  await gh.load('alpine-bundle.js');
</script>
<style>[x-cloak]{display:none!important}</style>
</head>
<!-- Repo browser fronted by a per-repo landing page. The repo picker and auth
     are up front (header); the drawer is the file tree for the selected repo;
     the main area is that repo's landing (web-tools' = its pages index) or the
     file viewer. See the design notes at the end of this file. -->
<body class="min-h-screen bg-base-100 text-base-content" x-data="app()" x-cloak>

<div class="toast toast-top toast-end z-[60]" x-data x-show="$store.toasts && $store.toasts.length">
  <template x-for="t in ($store.toasts || [])" :key="t.id">
  <div class="alert text-sm gap-2" :class="t.cls">
    <i class="ph" :class="'ph-'+t.icon"></i>
    <span x-text="t.msg"></span>
  </div>
  </template>
</div>

<!-- ── Header ─────────────────────────────────────────────────────────────── -->
<header class="sticky top-0 z-30 bg-base-100/90 backdrop-blur border-b border-base-300">
  <div class="max-w-6xl mx-auto px-4">
    <!-- Row 1: brand + the standing view toggle -->
    <div class="h-14 flex items-center gap-3">
      <button @click="goHome()" class="flex items-center gap-2 hover:opacity-80 transition-opacity shrink-0"
              title="web-tools">
        <img src="../../lib/favicon.svg" alt="" width="28" height="28" class="w-7 h-7">
        <span class="font-bold tracking-tight text-lg hidden sm:inline">web-tools</span>
      </button>

      <div class="grow"></div>

      <!-- The landing button appears only when the selected repo has a landing
           (web-tools does — its pages index); otherwise the view is just files. -->
      <div class="join">
        <button x-show="hasLanding" class="btn btn-sm join-item gap-1.5"
                :class="view==='landing' ? 'btn-primary' : 'btn-ghost'" @click="goHome()">
          <i class="ph text-lg" :class="landingIcon"></i>
          <span class="hidden sm:inline text-xs font-medium" x-text="landingLabel"></span>
        </button>
        <button class="btn btn-sm join-item gap-1.5"
                :class="view==='file' ? 'btn-primary' : 'btn-ghost'" @click="goFiles()">
          <i class="ph ph-folders text-lg"></i>
          <span class="hidden sm:inline text-xs font-medium">Files</span>
        </button>
      </div>
    </div>

    <!-- Row 2: repo navigation up front — picker, ref switch, and the auth
         shield all live in the repo component. Files for the selected repo
         stay in the drawer. -->
    <div id="repo" x-data="repo()"></div>
  </div>
</header>

<!-- ── File drawer (slides in from the left) — just the tree for the repo ──── -->
<div x-show="drawer" @click="drawer=false" x-transition.opacity
     class="fixed inset-0 bg-black/30 z-40" x-cloak></div>

<aside class="fixed inset-y-0 left-0 w-80 max-w-[85vw] z-50 bg-base-100 border-r border-base-300 shadow-xl flex flex-col transition-transform duration-200 ease-out"
       :class="drawer ? 'translate-x-0' : '-translate-x-full'">
  <div class="flex items-center justify-between px-4 h-14 border-b border-base-300 shrink-0">
    <div class="min-w-0 flex items-center gap-1.5">
      <i class="ph ph-folders text-primary shrink-0"></i>
      <span class="font-mono text-xs truncate" x-text="$store.browser.repo || 'Files'"></span>
    </div>
    <button @click="drawer=false" class="btn btn-sm btn-square btn-ghost">
      <i class="ph ph-x text-lg"></i>
    </button>
  </div>
  <div class="flex-1 overflow-y-auto px-3 py-3">
    <div id="navigator" x-data="navigator()"></div>
  </div>
</aside>

<!-- ── Main area: gallery (home) or the file viewer ───────────────────────── -->
<main class="max-w-6xl mx-auto px-4 py-8">

  <!-- web-tools' landing: the pages gallery, fed from pages.json. Other repos'
       landings will slot in here later (a repo's own pages/landing.html, or an
       elegant default) — see the design notes at the bottom of this file. -->
  <div x-show="view==='landing'" x-data="gallery()">
    <p class="text-base-content/50 text-sm mb-6">
      Browser-based tools and demos. Cards toggle between a
      <span class="font-medium">screenshot</span>, a <span class="font-medium">live</span> preview,
      and the <span class="font-medium">source</span>. Open the
      <button @click="openFiles()" class="link link-hover font-medium text-base-content/70">Files</button>
      drawer to browse any repo's raw contents.
    </p>

    <div x-show="!loaded" class="flex justify-center py-20">
      <span class="loading loading-dots loading-md opacity-30"></span>
    </div>

    <template x-if="loaded">
    <div>
      <div class="flex flex-wrap items-center gap-1.5 mb-8">
        <template x-for="c in chips" :key="c.key">
          <button class="btn btn-xs font-mono"
                  :class="filter===c.key ? 'btn-primary' : 'btn-ghost text-base-content/60'"
                  @click="filter=c.key">
            <span><span class="opacity-50 font-normal" x-text="c.pre"></span><span x-text="c.seg"></span></span>
            <span class="opacity-50" x-text="c.count"></span>
          </button>
        </template>
        <div class="grow"></div>
        <label class="input input-xs input-bordered flex items-center gap-1.5 w-48">
          <i class="ph ph-magnifying-glass opacity-50"></i>
          <input type="search" x-model.debounce="q" placeholder="filter by name…" class="grow min-w-0">
        </label>
      </div>

      <p x-show="!filteredGroups.length" class="text-base-content/40 text-sm">
        No pages match<span x-show="q"> “<span x-text="q"></span>”</span>.
      </p>

      <template x-for="g in filteredGroups" :key="g.label">
        <section class="mb-10">
          <h2 x-show="g.label" class="text-xs font-mono uppercase tracking-widest text-base-content/40 mb-3 flex items-center gap-2">
            <i class="ph ph-folder"></i><span x-text="g.label"></span>
            <span class="badge badge-ghost badge-sm" x-text="g.items.length"></span>
          </h2>
          <div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
            <template x-for="p in g.items" :key="p.href">
              <div class="card bg-base-100 border border-base-300 shadow-sm overflow-hidden">

            <div class="relative bg-base-200/40 border-b border-base-300 aspect-[16/10] overflow-hidden">
              <a :href="p.href" x-show="p.view==='shot'" class="block w-full h-full">
                <img :src="p.thumb" :alt="p.label" loading="lazy"
                     class="w-full h-full object-cover object-top"
                     @error="p.shotMissing = true" x-show="!p.shotMissing">
                <div x-show="p.shotMissing"
                     class="w-full h-full flex items-center justify-center text-base-content/30 text-xs gap-1">
                  <i class="ph ph-image-broken"></i> no screenshot
                </div>
              </a>
              <template x-if="p.view==='live'">
                <iframe :src="p.href + '?use=main'" loading="lazy"
                        sandbox="allow-scripts allow-same-origin allow-popups"
                        class="w-full h-full bg-base-100"></iframe>
              </template>
              <pre x-show="p.view==='html'"
                   class="w-full h-full overflow-auto m-0 p-2 text-[10px] leading-snug bg-base-100"
                   x-text="p.source"></pre>

              <div class="join absolute top-1.5 right-1.5 shadow">
                <button class="btn btn-xs join-item" :class="p.view==='shot' && 'btn-primary btn-active'"
                        @click="show(p,'shot')" title="Screenshot"><i class="ph ph-image"></i></button>
                <button class="btn btn-xs join-item" :class="p.view==='live' && 'btn-primary btn-active'"
                        @click="show(p,'live')" title="Live preview"><i class="ph ph-play"></i></button>
                <button class="btn btn-xs join-item" :class="p.view==='html' && 'btn-primary btn-active'"
                        @click="show(p,'html')" title="HTML source"><i class="ph ph-code"></i></button>
              </div>
            </div>

            <div class="card-body p-3 gap-1">
              <div class="flex items-baseline justify-between gap-2">
                <a :href="p.href" class="font-semibold text-sm hover:text-primary transition-colors truncate"
                   x-text="p.label"></a>
                <div class="flex items-center gap-1.5 shrink-0">
                  <button @click="inspect(p)" title="Open the source in the file browser"
                          class="text-base-content/30 hover:text-primary transition-colors cursor-pointer">
                    <i class="ph ph-sidebar-simple"></i></button>
                  <a :href="p.code" target="_blank"
                     class="text-base-content/30 hover:text-base-content/60" title="Source on GitHub">
                    <i class="ph ph-github-logo"></i></a>
                </div>
              </div>
              <p class="text-xs text-base-content/50" x-text="p.note || p.title"></p>
            </div>

              </div>
            </template>
          </div>
        </section>
      </template>

      <div class="mt-8 pt-4 border-t border-base-200">
        <a href="https://github.com/mehrlander/web-tools/blob/main/pages/README.md"
           class="text-xs text-base-content/40 hover:text-base-content/70 flex items-center gap-1.5 transition-colors"
           target="_blank">
          <i class="ph ph-list-bullets"></i>
          Full catalog — every page incl. nested, with rendered + source links
        </a>
      </div>
    </div>
    </template>
  </div>

  <!-- File viewer — the show-repo content pane, taking over when a file is picked -->
  <div x-show="view==='file'">
    <div x-show="!$store.browser.activeFile" class="text-center py-24 text-base-content/40">
      <i class="ph ph-folder-open text-5xl opacity-40"></i>
      <p class="mt-3 text-sm">
        Open the <button @click="drawer=true" class="link link-hover font-medium text-base-content/60">Files</button>
        drawer and pick a file.
      </p>
    </div>
    <div x-show="$store.browser.activeFile" class="flex flex-col gap-4">
      <div id="viewer" x-data="viewer()"></div>
      <div id="compare" x-data="compare()"></div>
    </div>
  </div>

</main>

<script>
window.TOKEN = '🎟️GitHubToken';
if (window.TOKEN === '🎟️GitHubToken') {
  try { window.TOKEN = localStorage.getItem('ghToken') || window.TOKEN; } catch {}
}

const waitFor = async (pred, ms=8000, step=50) => {
  for (let t=0; t<ms; t+=step) {
    if (pred()) return true;
    await new Promise(r => setTimeout(r, step));
  }
  return false;
};

const notify = (msg, cls='alert-error', icon='warning') => {
  try {
    const t = Alpine.store('toast');
    if (t) return t(icon, msg, cls, 6000);
  } catch {}
  console.error(msg);
};

// ── Shell: repo context + view state (landing | file). The repo picker and
// auth are up front (the repo component in the header); files for the selected
// repo live in the drawer. Which landing a repo gets is a per-repo decision —
// today only web-tools has one (its pages index); see landingKind(). ──────────
function app(){ return {
  view: 'landing',        // 'landing' | 'file'
  drawer: false,
  DEFAULT_REPO: 'mehrlander/web-tools',

  async init(){
    window.__shell = this;
    const ready = await waitFor(() => window.GH);
    if (!ready) return notify('Boot timed out waiting for modules. Reload to retry.');
    const gh = new window.GH({ token: window.TOKEN });
    Alpine.store('browser').gh = gh;

    // Selecting a file (drawer or a landing card) flips us into the file view.
    this.$watch(() => Alpine.store('browser').activeFile, (f) => {
      if (f) { this.view = 'file'; this.drawer = false; this.syncUrl(); }
    });

    // Changing the repo re-decides the view: a repo with a landing opens on it,
    // one without drops straight to files (drawer open, so the tree is right
    // there). pick() has already cleared activeFile by the time this fires.
    this.$watch(() => Alpine.store('browser').repo, () => {
      if (Alpine.store('browser').activeFile) return;
      if (this.hasLanding) { this.view = 'landing'; }
      else { this.view = 'file'; this.drawer = true; }
      this.syncUrl();
    });

    // The repo bar is always visible, so point the browser at a repo now rather
    // than lazily. Deep link ?repo&ref&file lands directly on that file.
    const url = this.parseUrl();
    await this.ensureBrowser(url?.repo, url?.ref);
    if (url && url.file) await this.openFile(url.file);
  },

  // Which landing a repo gets. web-tools -> its pages index ('gallery'). Other
  // repos: none yet, so the toggle hides the landing button and the view is
  // just files. The design notes at the bottom of this file sketch where a
  // repo's own pages/landing.html and an elegant default slot in.
  landingKind(){
    return Alpine.store('browser').repo === this.DEFAULT_REPO ? 'gallery' : null;
  },
  get hasLanding(){ return !!this.landingKind(); },
  get landingLabel(){ return this.landingKind() === 'gallery' ? 'Pages' : 'Home'; },
  get landingIcon(){ return this.landingKind() === 'gallery' ? 'ph-squares-four' : 'ph-house'; },

  parseUrl(){
    const p = new URLSearchParams(location.search);
    if (!p.has('repo') && !p.has('file')) return null;
    return { repo: p.get('repo') || this.DEFAULT_REPO, ref: p.get('ref') || '', file: p.get('file') };
  },

  syncUrl(){
    const s = Alpine.store('browser');
    const p = new URLSearchParams(location.search);
    // Off-default repo/ref is always worth pinning; file only in the file view.
    if (s.repo && s.repo !== this.DEFAULT_REPO) p.set('repo', s.repo); else p.delete('repo');
    if (s.ref && s.ref !== s.defaultRef) p.set('ref', s.ref); else p.delete('ref');
    if (this.view === 'file' && s.activeFile) p.set('file', s.activeFile.path); else p.delete('file');
    const qs = p.toString();
    history.replaceState(null, '', location.pathname + (qs ? '?' + qs : '') + location.hash);
  },

  // Point the file browser at a repo. web-tools boots identity-free via
  // pickByName; setup() fills the repo dropdown in the background (quiet: a
  // missing/expired token won't hijack the page).
  async ensureBrowser(repo, ref){
    repo = repo || this.DEFAULT_REPO;
    const gh = Alpine.store('browser').gh;
    const repoEl = document.getElementById('repo');
    if (!await waitFor(() => repoEl.__repo)) { notify('Repo component never mounted.'); return; }
    if (!this._setup){
      this._setup = true;
      repoEl.__repo.setup(gh, { quiet: true }).catch(e => console.warn('repo setup:', e?.message || e));
    }
    if (Alpine.store('browser').repo !== repo || (ref && Alpine.store('browser').ref !== ref)){
      try { await repoEl.__repo.pickByName(repo, ref ? { ref } : {}); }
      catch(e){ notify('Could not open ' + repo + ': ' + (e?.message || e)); }
    }
  },

  // Load a repo-relative file path into the viewer via the navigator.
  async openFile(path){
    const navEl = document.getElementById('navigator');
    if (!await waitFor(() => navEl.__navigator)) return;
    const folder = path.split('/').slice(0, -1).join('/');
    if (folder) await navEl.__navigator.load(folder, true);
    await navEl.__navigator.sel(path);
  },

  // The landing button. Returns to the repo's landing view.
  goHome(){
    if (!this.hasLanding) return this.goFiles();
    this.view = 'landing';
    this.drawer = false;
    this.syncUrl();
  },

  // Files reopens the drawer when there's nothing to show yet, or to switch
  // files when one is up; it keeps the active file, so toggling back resumes it.
  async goFiles(){
    await this.ensureBrowser();
    const hasFile = !!Alpine.store('browser').activeFile;
    if (this.view === 'file' && hasFile){ this.drawer = true; return; }
    this.view = 'file';
    if (!hasFile) this.drawer = true;
    this.syncUrl();
  }
}}

// ── Gallery: the pages index, rendered from pages.json ───────────────────────
function gallery(){
  // show-repo sits one level below pages/, so pages.json's page-relative hrefs
  // and thumbs rebase with a '../' prefix; absolute code URLs pass through.
  const REBASE = '../';
  return {
    loaded: false,
    filter: 'main',
    q: '',
    groups: [],

    async init(){
      try {
        const raw = await (await fetch('../pages.json')).json();
        this.groups = raw.map(g => ({
          ...g,
          items: g.items.map(p => ({
            ...p,
            href: REBASE + p.href,
            thumb: REBASE + p.thumb,
            view: 'shot', source: '', shotMissing: false,
          })),
        }));
      } catch(e){
        notify('Could not load the pages catalog: ' + (e?.message || e));
      }
      this.loaded = true;
      const p = new URLSearchParams(location.search);
      const f = p.get('filter');
      if (f && (f === 'all' || this.groups.some(g => g.top === f))) this.filter = f;
      this.q = p.get('q') || '';
      this.$watch('filter', () => this.syncUrl());
      this.$watch('q', () => this.syncUrl());
    },

    syncUrl(){
      const p = new URLSearchParams(location.search);
      if (this.filter === 'main') p.delete('filter'); else p.set('filter', this.filter);
      if (this.q.trim()) p.set('q', this.q.trim()); else p.delete('q');
      const qs = p.toString();
      history.replaceState(null, '', location.pathname + (qs ? '?' + qs : '') + location.hash);
    },

    get chips(){
      const tops = [...new Set(this.groups.map(g => g.top))].filter(t => t !== 'main');
      tops.sort((a, b) => (a === 'kit-demos') - (b === 'kit-demos') || a.localeCompare(b));
      const countTop = t => this.groups.filter(g => g.top === t).reduce((n, g) => n + g.items.length, 0);
      const all = this.groups.reduce((n, g) => n + g.items.length, 0);
      const path = t => t === 'kit-demos' ? ['lib/', 'kits/demos/'] : ['pages/', t + '/'];
      return [
        { key: 'main', pre: '', seg: 'pages/', count: countTop('main') },
        { key: 'all',  pre: '', seg: 'All',    count: all },
        ...tops.map(t => ({ key: t, pre: path(t)[0], seg: path(t)[1], count: countTop(t) })),
      ];
    },
    get visibleGroups(){
      if (this.filter === 'all') return this.groups.filter(g => g.items.length);
      return this.groups.filter(g => g.top === this.filter && g.items.length);
    },
    get filteredGroups(){
      const q = this.q.trim().toLowerCase();
      if (!q) return this.visibleGroups;
      return this.visibleGroups
        .map(g => ({ ...g, items: g.items.filter(p =>
          (p.label + ' ' + (p.title || '') + ' ' + (p.note || '')).toLowerCase().includes(q)) }))
        .filter(g => g.items.length);
    },
    async show(p, v){
      p.view = v;
      if (v === 'html' && !p.source){
        p.source = 'Loading…';
        try { p.source = await (await fetch(p.href)).text(); }
        catch(e){ p.source = '// failed to load source: ' + e; }
      }
    },
    // Delegate the shell-owned view switch to the app scope.
    openFiles(){ window.__shell?.goFiles(); },
    // The bridge: open a card's source in the file browser. Its repo path is the
    // github blob URL after /blob/<ref>/; that always names the real file, even
    // for the out-of-tree kit demos under lib/.
    async inspect(p){
      const m = p.code.match(/\/blob\/[^/]+\/(.+)$/);
      if (!m || !window.__shell) return;
      await window.__shell.ensureBrowser();
      await window.__shell.openFile(m[1]);
    },
  };
}
</script>

<!-- ── Design notes: the landing mechanism ─────────────────────────────────────
  This page treats a repo as having, potentially, a LANDING PAGE. The repo
  picker and auth are up front; the drawer is just the file tree for whatever
  repo is selected; the main area shows either that repo's landing or the file
  viewer. app.landingKind(repo) is the one decision point.

  Today only web-tools resolves to a landing ('gallery', its pages index). The
  intended progression, aligned with tracker task 0002 (private-repo landing
  federation via mehrlander/home):

    1. Per-repo custom landing. A repo ships its own pages/landing.html; the
       shell renders it live — for a mehrlander repo (public or private) via the
       toss #gh= address mode (token-authed, relative deps handled), for any
       public repo via its github.io URL or a ?use= iframe. "The repo builds its
       own page." landingKind() returns 'custom' and the main area mounts an
       iframe at that render URL.

    2. Elegant default landing. For a repo with no landing of its own, synthesize
       one instead of dropping to bare files: a repo overview — description +
       stats (already in repoObj), the rendered README, and a compact strip of
       any pages/*.html found (the old pages.js scan, reclaimed in the card
       style). landingKind() returns 'overview'. Every repo then has a landing,
       and the toggle is always Landing | Files.

    3. Federation (task 0002). With a token, read mehrlander/home's landing.json
       and fold each featured private repo's landing into web-tools' own gallery
       as additional cards/sections. HOME_REPO becomes the one public-private
       hinge, a single lib/ constant. No token: the private section is simply
       absent, no leak.

  The seam is deliberately small so 1-3 are additive: each is a new branch in
  landingKind() plus the matching main-area block, no rework of the shell.
─────────────────────────────────────────────────────────────────────────── -->
</body>
</html>
