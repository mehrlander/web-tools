<!DOCTYPE html>
<html lang="en" data-theme="winter">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>web-tools · browse</title>
<link rel="icon" type="image/svg+xml" href="../../lib/favicon.svg">
<link href="https://cdn.jsdelivr.net/combine/npm/daisyui@5/themes.css,npm/daisyui@5,npm/@tailwindcss/typography/dist/typography.min.css" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/combine/npm/@tailwindcss/browser@4,npm/@phosphor-icons/web"></script>
<script type="module">
  // The pre-build: one same-origin import carries the whole lib/ (the loader,
  // the gh-boot chain, every Alpine component, alpine-bundle) — no per-file
  // gh.load network for own code. ?use=<branch|tag|sha> re-pins to jsDelivr
  // for branch preview (pass a SHA for fresh commits; branch tips cache ~12h).
  // The landing needs no token; the file browser boots quietly and only
  // prompts for auth on demand.
  const ref = new URLSearchParams(location.search).get('use');
  await import(ref
    ? `https://cdn.jsdelivr.net/gh/mehrlander/web-tools@${ref}/dist/web-tools.js`
    : '../../dist/web-tools.js');
  // gh-store rides in the pre-build cached but unexecuted; this load runs it
  // from the inlined cache (no network) so GH.prototype.save exists as before.
  await gh.load('gh-store.js');
  // Config-aggregate builders for the private cache (state/configs.json).
  await gh.load('repo-config-cache.js');
  // The private request/response mailbox (mailbox/requests -> results).
  await gh.load('repo-mailbox.js');
</script>
<style>[x-cloak]{display:none!important}</style>
</head>
<!-- A repo browser fronted by a per-repo landing page. The repo picker is up
     front (header). The sidebar lists the repo's views — landing, atlas,
     files, stage — plus pinned and recent shortcuts; the actual folder/file
     navigation lives in the main area (breadcrumb + listing, file content
     beneath). The sidebar is pinned on desktop, a drawer on mobile.
     See the design notes at the end of this file. -->
<body class="h-screen flex flex-col overflow-hidden bg-base-100 text-base-content" x-data="app()" x-cloak>

<div class="toast toast-top toast-end z-[60]" x-data x-show="$store.toasts && $store.toasts.length">
  <template x-for="t in ($store.toasts || [])" :key="t.id">
  <div class="alert text-sm gap-2" :class="t.cls">
    <i class="ph" :class="'ph-'+t.icon"></i>
    <span x-text="t.msg"></span>
  </div>
  </template>
</div>

<!-- ── Header: brand (doubles as the mobile drawer toggle), then repo nav ─── -->
<header class="shrink-0 z-30 bg-base-100 border-b border-base-300">
  <div class="max-w-full px-4">
    <div class="h-14 flex items-center gap-3">
      <button @click="brandClick()" class="flex items-center gap-2 hover:opacity-80 transition-opacity shrink-0"
              :title="brandTip">
        <img src="../../lib/favicon.svg" alt="" width="28" height="28" class="w-7 h-7">
        <span class="font-semibold text-base-content text-base hidden sm:inline">web-tools</span>
      </button>
      <div class="w-px h-6 bg-base-300 mx-1 hidden sm:block"></div>
      <div id="repo" x-data="repo({ inline: true })" class="min-w-0"></div>
      <div class="grow"></div>
      <!-- Quick links to frequent repos. The full join row needs width, so
           below sm it collapses to a single dropdown. Config editing lives in
           the sidebar shield dialog (repoModal), not here. -->
      <div class="join shrink-0 hidden sm:flex">
        <template x-for="p in quickLinks" :key="p.repo">
          <button @click="openPinned(p.repo)"
                  class="btn btn-sm btn-square join-item tooltip tooltip-bottom"
                  :class="[Alpine.store('browser').repo===p.repo ? 'btn-primary btn-active' : 'btn-ghost', pinnedDim(p) && 'opacity-40']"
                  :data-tip="pinnedTip(p)">
            <i class="ph text-lg" :class="pinnedIcon(p)"></i>
          </button>
        </template>
      </div>
      <details class="dropdown dropdown-end shrink-0 sm:hidden" data-auto-close>
        <summary class="btn btn-sm btn-square btn-ghost list-none">
          <i class="ph ph-squares-four text-lg"></i>
        </summary>
        <ul class="dropdown-content menu bg-base-100 rounded-box z-50 w-56 p-1 shadow border border-base-300 mt-1">
          <template x-for="p in quickLinks" :key="p.repo">
            <li>
              <a @click="openPinned(p.repo)"
                 :class="[Alpine.store('browser').repo===p.repo && 'active', pinnedDim(p) && 'opacity-40']">
                <i class="ph text-base" :class="pinnedIcon(p)"></i>
                <span class="font-mono text-xs truncate" x-text="p.repo"></span>
              </a>
            </li>
          </template>
        </ul>
      </details>
    </div>
  </div>
</header>

<div class="flex-1 flex min-h-0">

  <!-- ── Sidebar: repo views + the file tree. Pinned on desktop, drawer on
       mobile. ─────────────────────────────────────────────────────────────── -->
  <div x-show="drawer" @click="drawer=false" x-transition.opacity
       class="fixed inset-0 bg-black/30 z-40 lg:hidden" x-cloak></div>

  <aside class="fixed inset-y-0 left-0 w-72 max-w-[85vw] z-50 bg-base-100 border-r border-base-300 shadow-xl
                flex flex-col transition-transform duration-200 ease-out
                lg:static lg:z-auto lg:shadow-none lg:translate-x-0 lg:w-80 xl:w-[22rem] lg:shrink-0"
         :class="drawer ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'">
    <!-- Sidebar top bar: repo name + auth shield (opens the token dialog), plus
         the mobile-only drawer close button. -->
    <div class="h-14 flex items-center gap-2 px-4 border-b border-base-300 shrink-0">
      <!-- Repo address with its GitHub jump right beside it (the pattern: the
           github link sits next to the repo address wherever it is shown). -->
      <div class="flex items-center gap-1.5 min-w-0 flex-1">
        <span class="font-mono text-xs truncate"
              x-text="view==='estate' ? 'Repositories' : ($store.browser.repo || 'Browse')"></span>
        <a x-show="view!=='estate' && $store.browser.repo" :href="repoGithubUrl" target="_blank"
           class="shrink-0 text-base-content/40 hover:text-base-content/80 transition-colors"
           title="Open on GitHub"><i class="ph ph-github-logo text-sm leading-none"></i></a>
      </div>
      <button @click="document.getElementById('repoModal')?.showModal()"
              class="tooltip tooltip-left btn btn-sm btn-square btn-ghost" :data-tip="authTip">
        <i class="ph text-lg leading-none" :class="authIcon"></i>
      </button>
      <button @click="drawer=false" class="btn btn-sm btn-square btn-ghost lg:hidden"><i class="ph ph-x text-lg"></i></button>
    </div>

    <div class="flex-1 overflow-y-auto px-3 py-3 flex flex-col gap-3">
      <!-- Per-repo views, hidden in the estate (global) context. The estate is
           reached from the header selector ("Repositories") and the brand icon,
           not from here, since it is a context above the repo, not a view of it.
           Repo views: the landing (web-tools' is its pages index, others get an
           overview), the atlas, the file explorer, and the stage (the shared
           cross-repo fileset; badge shows its size). -->
      <div class="flex flex-col gap-0.5" x-show="view!=='estate'">
        <button @click="goLanding()"
                class="flex items-center gap-2 px-2 py-1.5 rounded-lg text-sm hover:bg-base-200 transition-colors"
                :class="view==='landing' ? 'bg-primary/10 text-primary font-semibold' : 'text-base-content/80'">
          <i class="ph text-base" :class="landingIcon"></i><span x-text="landingLabel"></span>
        </button>
        <button @click="goAtlas()"
                class="flex items-center gap-2 px-2 py-1.5 rounded-lg text-sm hover:bg-base-200 transition-colors"
                :class="view==='atlas' ? 'bg-primary/10 text-primary font-semibold' : 'text-base-content/80'">
          <i class="ph ph-map-trifold text-base"></i><span>Atlas</span>
        </button>
        <button @click="goFiles()"
                class="flex items-center gap-2 px-2 py-1.5 rounded-lg text-sm hover:bg-base-200 transition-colors"
                :class="view==='files' ? 'bg-primary/10 text-primary font-semibold' : 'text-base-content/80'">
          <i class="ph ph-folders text-base"></i><span>Files</span>
        </button>
        <button @click="goStage()"
                class="flex items-center gap-2 px-2 py-1.5 rounded-lg text-sm hover:bg-base-200 transition-colors"
                :class="view==='stage' ? 'bg-primary/10 text-primary font-semibold' : 'text-base-content/80'">
          <i class="ph ph-stack text-base"></i><span>Stage</span>
          <span x-show="$store.browser.stage.length" class="badge badge-ghost badge-sm ml-auto"
                x-text="$store.browser.stage.length"></span>
        </button>
      </div>

      <div class="border-t border-base-200" x-show="view!=='estate'"></div>

      <!-- Pinned: folders and files the repo designates in .web-tools.json. -->
      <div x-show="pins.length && view!=='estate'" class="flex flex-col gap-0.5">
        <div class="text-xs font-semibold text-base-content/50 px-2 pb-1 flex items-center gap-1.5">
          <i class="ph ph-push-pin"></i>Pinned
        </div>
        <template x-for="p in pins" :key="p">
          <button @click="openPin(p)"
                  class="flex items-center gap-2 px-2 py-1 rounded-lg text-sm hover:bg-base-200 transition-colors text-left"
                  :class="Alpine.store('browser').activeFile?.path===p ? 'bg-primary/10 text-primary font-semibold' : 'text-base-content/80'">
            <i class="ph text-base shrink-0" :class="pinIsFile(p) ? 'ph-file text-info' : 'ph-folder text-warning'"></i>
            <span class="truncate font-mono text-xs" :title="p" x-text="p"></span>
          </button>
        </template>
      </div>

      <div x-show="pins.length && view!=='estate'" class="border-t border-base-200"></div>

      <!-- Recent: files touched by the newest commits on the current ref. -->
      <div x-show="(recentLoading || recent.length) && view!=='estate'" class="flex flex-col gap-0.5">
        <div class="text-xs font-semibold text-base-content/50 px-2 pb-1 flex items-center gap-1.5">
          <i class="ph ph-clock-counter-clockwise"></i>Recent
        </div>
        <div x-show="recentLoading" class="flex justify-center py-2">
          <span class="loading loading-dots loading-xs opacity-30"></span>
        </div>
        <template x-for="f in recent" :key="f.path">
          <button @click="openFile(f.path)"
                  class="flex items-center justify-between gap-2 px-2 py-1 rounded-lg text-sm hover:bg-base-200 transition-colors text-left"
                  :class="Alpine.store('browser').activeFile?.path===f.path ? 'bg-primary/10 text-primary font-semibold' : 'text-base-content/80'">
            <span class="truncate font-mono text-xs" :title="f.path" x-text="f.path.split('/').pop()"></span>
            <span class="text-[10px] text-base-content/40 shrink-0" x-text="f.age"></span>
          </button>
        </template>
      </div>

    </div>
  </aside>

  <!-- ── Main area: the selected view for the repo ────────────────────────── -->
  <main class="flex-1 min-w-0 min-h-0">

    <!-- Estate: the all-repo view — registry-driven repo cards plus curated
         surfaces from the private registry. Mounted lazily on first visit,
         like the atlas. -->
    <div x-show="view==='estate'" class="h-full overflow-y-auto">
      <div class="mx-auto px-6 py-8 max-w-5xl">
        <template x-if="estateSeen">
          <div x-data="estate()"></div>
        </template>
      </div>
    </div>

    <!-- Landing: web-tools' gallery, a manifest-designated custom page, or a
         default overview for other repos. -->
    <div x-show="view==='landing'" class="h-full overflow-y-auto">

      <!-- Custom landing: the repo's own page (config.landing), rendered live
           through toss-render's #gh= address mode. Full-bleed, like the atlas. -->
      <template x-if="landingKind()==='custom'">
        <iframe :src="customLandingUrl" class="w-full h-full border-0 bg-base-100"
                sandbox="allow-scripts allow-same-origin allow-popups allow-downloads"></iframe>
      </template>

      <div x-show="landingKind()!=='custom'" class="!max-w-none px-6 py-8">

        <!-- web-tools landing: the pages gallery, fed from pages.json -->
        <div x-show="landingKind()==='gallery'">
          <div x-data="gallery()">
            <p class="text-base-content/50 text-sm mb-6">
              Browser-based tools and demos. Cards toggle between a
              <span class="font-medium">screenshot</span>, a <span class="font-medium">live</span> preview,
              and the <span class="font-medium">source</span>. Use the sidebar to open a file,
              the atlas, or another repo.
            </p>

            <div x-show="!loaded" class="flex justify-center py-20">
              <span class="loading loading-dots loading-md opacity-30"></span>
            </div>

            <template x-if="loaded">
            <div>
              <div class="flex flex-wrap items-center gap-1.5 mb-8">
                <template x-for="c in chips" :key="c.key">
                  <button class="btn btn-xs font-mono"
                          :class="filter===c.key ? 'btn-primary' : 'btn-ghost text-base-content/60'"
                          @click="filter=c.key">
                    <span><span class="opacity-50 font-normal" x-text="c.pre"></span><span x-text="c.seg"></span></span>
                    <span class="opacity-50" x-text="c.count"></span>
                  </button>
                </template>
                <div class="grow"></div>
                <label class="input input-xs input-bordered flex items-center gap-1.5 w-48">
                  <i class="ph ph-magnifying-glass opacity-50"></i>
                  <input type="search" x-model.debounce="q" placeholder="filter by name…" class="grow min-w-0">
                </label>
              </div>

              <p x-show="!filteredGroups.length" class="text-base-content/40 text-sm">
                No pages match<span x-show="q"> “<span x-text="q"></span>”</span>.
              </p>

              <template x-for="g in filteredGroups" :key="g.label">
                <section class="mb-10">
                  <h2 x-show="g.label" class="text-xs font-mono uppercase tracking-widest text-base-content/40 mb-3 flex items-center gap-2">
                    <i class="ph ph-folder"></i><span x-text="g.label"></span>
                    <span class="badge badge-ghost badge-sm" x-text="g.items.length"></span>
                  </h2>
                  <div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
                    <template x-for="p in g.items" :key="p.href">
                      <div class="card bg-base-100 border border-base-300 shadow-sm overflow-hidden">

                    <div class="relative bg-base-200/40 border-b border-base-300 aspect-[16/10] overflow-hidden">
                      <a :href="p.href" x-show="p.view==='shot'" class="block w-full h-full">
                        <img :src="p.thumb" :alt="p.label" loading="lazy"
                             class="w-full h-full object-cover object-top"
                             @error="p.shotMissing = true" x-show="!p.shotMissing">
                        <div x-show="p.shotMissing"
                             class="w-full h-full flex items-center justify-center text-base-content/30 text-xs gap-1">
                          <i class="ph ph-image-broken"></i> no screenshot
                        </div>
                      </a>
                      <template x-if="p.view==='live'">
                        <iframe :src="p.href + '?use=main'" loading="lazy"
                                sandbox="allow-scripts allow-same-origin allow-popups"
                                class="w-full h-full bg-base-100"></iframe>
                      </template>
                      <pre x-show="p.view==='html'"
                           class="w-full h-full overflow-auto m-0 p-2 text-[10px] leading-snug bg-base-100"
                           x-text="p.source"></pre>

                      <div class="join absolute top-1.5 right-1.5 shadow">
                        <button class="btn btn-xs join-item" :class="p.view==='shot' && 'btn-primary btn-active'"
                                @click="show(p,'shot')" title="Screenshot"><i class="ph ph-image"></i></button>
                        <button class="btn btn-xs join-item" :class="p.view==='live' && 'btn-primary btn-active'"
                                @click="show(p,'live')" title="Live preview"><i class="ph ph-play"></i></button>
                        <button class="btn btn-xs join-item" :class="p.view==='html' && 'btn-primary btn-active'"
                                @click="show(p,'html')" title="HTML source"><i class="ph ph-code"></i></button>
                      </div>
                    </div>

                    <div class="card-body p-3 gap-1">
                      <div class="flex items-baseline justify-between gap-2">
                        <a :href="p.href" class="font-semibold text-sm hover:text-primary transition-colors truncate"
                           x-text="p.label"></a>
                        <div class="flex items-center gap-1.5 shrink-0">
                          <button @click="inspect(p)" title="Open the source in the file browser"
                                  class="text-base-content/30 hover:text-primary transition-colors cursor-pointer">
                            <i class="ph ph-sidebar-simple"></i></button>
                          <a :href="p.code" target="_blank"
                             class="text-base-content/30 hover:text-base-content/60" title="Source on GitHub">
                            <i class="ph ph-github-logo"></i></a>
                        </div>
                      </div>
                      <p class="text-xs text-base-content/50" x-text="p.note || p.title"></p>
                    </div>

                      </div>
                    </template>
                  </div>
                </section>
              </template>

              <div class="mt-8 pt-4 border-t border-base-200">
                <a href="https://github.com/mehrlander/web-tools/blob/main/pages/README.md"
                   class="text-xs text-base-content/40 hover:text-base-content/70 flex items-center gap-1.5 transition-colors"
                   target="_blank">
                  <i class="ph ph-list-bullets"></i>
                  Full catalog — every page incl. nested, with rendered + source links
                </a>
              </div>
            </div>
            </template>
          </div>
        </div>

        <!-- Default landing for any other repo: an overview — stats, README,
             and a jump to the atlas. -->
        <div x-show="landingKind()==='overview'">
          <div x-data="overview()">
            <div class="flex items-start justify-between gap-4 flex-wrap mb-4">
              <div class="min-w-0">
                <h1 class="text-2xl font-bold tracking-tight font-mono truncate" x-text="repo"></h1>
                <p x-show="desc" class="text-base-content/60 mt-1" x-text="desc"></p>
              </div>
              <button @click="goAtlas()" class="btn btn-sm btn-outline gap-1.5 shrink-0">
                <i class="ph ph-map-trifold"></i> Atlas
              </button>
            </div>

            <div x-show="repoObj" class="flex flex-wrap gap-1.5 mb-6">
              <span class="badge badge-ghost gap-1"><i class="ph" :class="repoObj?.private?'ph-lock':'ph-globe'"></i>
                <span x-text="visibility"></span></span>
              <span class="badge badge-ghost gap-1"><i class="ph ph-star"></i><span x-text="stars"></span></span>
              <span class="badge badge-ghost gap-1"><i class="ph ph-git-fork"></i><span x-text="forks"></span></span>
              <span class="badge badge-ghost gap-1"><i class="ph ph-git-branch"></i><span x-text="defaultRef"></span></span>
              <span x-show="pushed" class="badge badge-ghost gap-1"><i class="ph ph-clock"></i>
                <span x-text="'pushed '+pushed"></span></span>
            </div>

            <div x-show="loading" class="flex justify-center py-16">
              <span class="loading loading-dots loading-md opacity-30"></span>
            </div>
            <article x-show="!loading && html" class="prose prose-sm !max-w-none prose-pre:bg-base-200 prose-pre:text-base-content"
                     x-html="html"></article>
            <p x-show="!loading && !html" class="text-base-content/40 italic text-sm py-8">
              No README found on this ref. Use the sidebar to browse files, or open the atlas.
            </p>
          </div>
        </div>

      </div>
    </div>

    <!-- Atlas: the treemap for the selected repo, embedded. Available for every
         repo (the "ready mechanism"), even one with its own landing. -->
    <div x-show="view==='atlas'" class="h-full">
      <template x-if="atlasSeen">
        <iframe :src="atlasUrl" class="w-full h-full border-0 bg-base-100"
                sandbox="allow-scripts allow-same-origin allow-popups allow-downloads"></iframe>
      </template>
    </div>

    <!-- Files: the folder navigation (breadcrumb + listing), with the selected
         file's content beneath it. The explorer lives here in the main area;
         the sidebar's pins and recents deep-link into it. -->
    <div x-show="view==='files'" class="h-full overflow-y-auto">
      <div class="mx-auto px-4 py-6 flex flex-col gap-4">
        <div id="explorer" x-data="explorer()"></div>
        <div id="viewer" x-data="viewer()" x-show="$store.browser.activeFile"></div>
      </div>
    </div>

    <!-- Stage: the shared cross-repo fileset, grouped by source repo@ref, with
         send/save/mint actions and the concatenated bundle. Opening a staged
         file lands in the Files view's shared viewer. Compare lives here too:
         a ref-diff belongs with the fileset, not under the file viewer. -->
    <div x-show="view==='stage'" class="h-full overflow-y-auto">
      <div class="mx-auto px-4 py-6 flex flex-col gap-4 max-w-3xl w-full">
        <div x-data="stager()"></div>
        <div class="border-t border-base-200 pt-3">
          <div id="compare" x-data="compare()"></div>
        </div>
      </div>
    </div>

  </main>
</div>

<script>
window.TOKEN = '🎟️GitHubToken';
if (window.TOKEN === '🎟️GitHubToken') {
  try { window.TOKEN = localStorage.getItem('ghToken') || window.TOKEN; } catch {}
}

const waitFor = async (pred, ms=8000, step=50) => {
  for (let t=0; t<ms; t+=step) {
    if (pred()) return true;
    await new Promise(r => setTimeout(r, step));
  }
  return false;
};

const notify = (msg, cls='alert-error', icon='warning') => {
  try {
    const t = Alpine.store('toast');
    if (t) return t(icon, msg, cls, 6000);
  } catch {}
  console.error(msg);
};

// marked, loaded once on demand for the overview README render.
let _markedP = null;
function loadMarked(){
  return _markedP ??= new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/marked/marked.min.js';
    s.onload = res; s.onerror = rej;
    document.head.appendChild(s);
  });
}

// ── Shell: repo context + view state. The repo picker is up front; the brand
// icon doubles as the mobile drawer toggle. The sidebar lists the repo's views
// (landing, atlas) and its files. Which
// landing a repo gets is one decision — landingKind(). ────────────────────────
function app(){ return {
  view: 'landing',        // 'estate' | 'landing' | 'atlas' | 'files' | 'stage'
  drawer: false,          // mobile sidebar (pinned on desktop, ignores this)
  atlasSeen: false,       // mount the atlas iframe lazily, on first visit
  estateSeen: false,      // mount the estate component lazily, on first visit
  _restoring: false,      // true while restoring state from a popstate (see syncUrl)
  DEFAULT_REPO: 'mehrlander/web-tools',
  // The header quick-link row is data-driven. This public page must not
  // enumerate private repos in its source, so the built-in default lists only
  // the public repo. The real, curated list (order, membership, icons — private
  // repos included) lives in a private registry repo and is fetched at boot
  // when the viewer has a token (loadQuickLinks). No token: this default only.
  REGISTRY_REPO: 'mehrlander/web-tools-private',
  PUBLIC_QUICK_LINKS: [
    { repo: 'mehrlander/web-tools', icon: 'ph-toolbox' },
  ],
  quickLinks: [],   // resolved row; seeded from PUBLIC_QUICK_LINKS in init
  // Recently-committed files for the current repo@ref, shown in the sidebar.
  // Generated artifacts a build hook writes on every commit are noise here,
  // not real edits, so they're filtered out for web-tools specifically.
  GENERATED: ['dist/web-tools.js', 'pages/README.md', 'pages/index.html',
              'pages/pages.json', 'tracker/board.md'],
  recent: [],
  recentLoading: false,
  _recentKey: '',

  async init(){
    window.__shell = this;
    const ready = await waitFor(() => window.GH);
    if (!ready) return notify('Boot timed out waiting for modules. Reload to retry.');
    const gh = new window.GH({ token: window.TOKEN });
    Alpine.store('browser').gh = gh;

    // Selecting a file (explorer row, landing card, staged item) flips to the
    // Files view, where the shared viewer shows it beneath the listing.
    this.$watch(() => Alpine.store('browser').activeFile, (f) => {
      if (f) { this.view = 'files'; this.drawer = false; this.syncUrl(); }
    });

    // Changing the repo takes you to its landing (default or specified).
    this.$watch(() => Alpine.store('browser').repo, () => {
      if (Alpine.store('browser').activeFile) return;
      this.view = 'landing';
      this.syncUrl();
    });

    // Recent files and the repo's manifest track whichever repo@ref is open,
    // landing or file view alike.
    this.$watch(() => Alpine.store('browser').repo + '@' + Alpine.store('browser').ref, () => {
      this.loadRecent();
      this.loadConfig();
    });

    // The quick-link row is the public default until a token lets us read the
    // private registry. Auth resolves after boot, so load then, and reload when
    // auth arrives. After the row resolves, refresh the config cache (guarded).
    // Editing a repo's config (config-saved) reloads the row when it was the
    // registry, and always refreshes the cache so the edit enters its history.
    this.quickLinks = [...this.PUBLIC_QUICK_LINKS];
    this.$watch(() => this._authState, (s) => {
      if (s === 'auth') { this.loadQuickLinks().then(() => this.refreshConfigCache()); this.processMailbox(); }
    });
    document.addEventListener('web-tools:config-saved', async (e) => {
      this.loadConfig();
      if (e.detail?.repo === this.REGISTRY_REPO) await this.loadQuickLinks();
      this.refreshConfigCache(true);
    });
    this.loadQuickLinks().then(() => this.refreshConfigCache());
    this.processMailbox();

    // Folder navigation in the explorer keeps the ?path deep link honest.
    this.$watch(() => Alpine.store('browser').path, () => {
      if (this.view === 'files') this.syncUrl();
    });

    // The repo bar is always visible, so point the browser at a repo now.
    // Deep link: ?repo&ref then ?file / ?view=atlas|files|stage (&path with
    // files). A #stage= fragment (a set of refs; see stage.js) preloads the
    // stage and wins the initial view: it is the point of such a link.
    const url = this.parseUrl();
    await this.ensureBrowser(url?.repo, url?.ref);
    if (url && url.file) await this.openFile(url.file);
    else if (url && url.view === 'estate') this.goEstate();
    else if (url && url.view === 'atlas') this.goAtlas();
    else if (url && url.view === 'stage') this.goStage();
    else if (url && url.view === 'files') { this.goFiles(); if (url.path) await this.openFolder(url.path); }
    const staged = window.StageLink ? window.StageLink.parse(location.hash) : [];
    if (staged.length) {
      Alpine.store('browser').stage = staged;
      this.goStage();
    }
    // A bare open (no repo, file, view, or stage addressed) lands on the
    // estate: the all-repo view is the page's front door.
    else if (!url) this.goEstate();

    // Browser Back/Forward restores state from the URL (syncUrl pushes an entry
    // per distinct URL, so the history has real steps to walk).
    window.addEventListener('popstate', () => this.restoreFromUrl());
  },

  async loadRecent(){
    const s = Alpine.store('browser');
    const key = s.repo + '@' + s.ref;
    if (!s.repo || !s.gh) return;
    this._recentKey = key;
    this.recentLoading = true; this.recent = [];
    // Let the file listing win the early network window: hold this panel's
    // fetches until the explorer's first listing has landed (loadedOnce),
    // with a timeout so a listing that never mounts can't starve the panel.
    // On later repo/ref switches the flag is already set, so this is a
    // cold-load deferral only — the case the phone-load symptom came from.
    await waitFor(() => document.getElementById('explorer')?.__explorer?.loadedOnce, 5000);
    if (this._recentKey !== key) return;
    try {
      const files = await s.gh.recentFiles(12);
      if (this._recentKey !== key) return; // repo/ref changed while in flight
      const generated = s.repo === this.DEFAULT_REPO ? this.GENERATED : [];
      this.recent = files
        .filter(f => !generated.includes(f.path))
        .slice(0, 8)
        .map(f => ({ path: f.path, age: s.gh.ago ? s.gh.ago(f.date) : '' }));
    } catch(e) {
      if (this._recentKey === key) this.recent = [];
    } finally {
      if (this._recentKey === key) this.recentLoading = false;
    }
  },

  // ── The per-repo manifest: .web-tools.json at the repo root ───────────────
  // The repo's web-tools config. A repo designates what this shell should
  // consider — a landing page, pinned folders/files, a staged-files list with
  // transfer targets — and its top-level fields are the repo's config for any
  // web-tools page, not just this shell. One GET per repo@ref; 404 means no
  // config. Parsed as data, never executed, so probing any repo is safe. Reads
  // .web-tools.json, falling back to the legacy .show-repo.json during the
  // rename's deprecation window. Consumers: landingKind() (landing), the sidebar
  // Pinned block (pins), and the navigator's stage/transfer panel (stage).
  _configKey: '',
  async loadConfig(){
    const s = Alpine.store('browser');
    if (!s.repo || !s.gh) return;
    const key = s.repo + '@' + s.ref;
    this._configKey = key;
    s.config = null;
    s.configName = null;
    let cfg = null, name = null;
    // SUNSET(2026-08-15): the '.show-repo.json' entry is the legacy-name read
    // fallback. Drop it (read '.web-tools.json' only) once consumer repos are
    // migrated. See docs/PORTABLE.md "Sunset markers". The config editor writes
    // the new name on save, so editing a legacy repo migrates it in place.
    for (const n of ['.web-tools.json', '.show-repo.json']) {
      try {
        const parsed = JSON.parse((await s.gh.get(n)).text);
        if (typeof parsed === 'object' && !Array.isArray(parsed)) { cfg = parsed; name = n; break; }
      } catch {}
    }
    if (this._configKey === key) { s.config = cfg; s.configName = name; }
  },

  // Resolve the quick-link row. With a token, read the private registry repo's
  // .web-tools.json (a `quickLinks: [{repo, icon}]` list — the curated set,
  // order, and icons, private repos included) on its own lightweight GH
  // instance and use it. Without a token, or on any failure, fall back to the
  // public-only default. The registry name is the one private string this
  // public page references; it never enumerates the private repos themselves.
  hasToken(){ return !!window.TOKEN && window.TOKEN !== '🎟️GitHubToken'; },
  async loadQuickLinks(){
    if (!this.hasToken()) { this.quickLinks = [...this.PUBLIC_QUICK_LINKS]; return; }
    try {
      const reg = new window.GH({ token: window.TOKEN, repo: this.REGISTRY_REPO, ref: 'main' });
      const parsed = JSON.parse((await reg.get('.web-tools.json')).text);
      const list = Array.isArray(parsed?.quickLinks)
        ? parsed.quickLinks.filter(e => e && typeof e.repo === 'string')
        : null;
      this.quickLinks = list && list.length
        ? list.map(e => ({ repo: e.repo, icon: e.icon || 'ph-bookmark-simple' }))
        : [...this.PUBLIC_QUICK_LINKS];
    } catch {
      this.quickLinks = [...this.PUBLIC_QUICK_LINKS];
    }
  },

  // The row's icon is the registry entry's icon. Config editing lives in the
  // sidebar shield dialog (repoModal, lib/alpineComponents/repo.js).
  pinnedIcon(p){ return p.icon; },

  // ── Config aggregate: crawl each participating repo's .web-tools.json and
  // fold it into a derived cache (state/configs.json) in the registry repo,
  // keeping a bounded on-change history per repo. Source of truth stays each
  // repo's own file; this is breadth + history a single read can't give. A
  // per-browser throttle (localStorage) keeps the crawl occasional, and a
  // material-change check keeps commits sparse, so nav triggers cost nothing.
  CONFIG_CACHE_INTERVAL_MS: 6 * 3600 * 1000,
  _cacheCheckKey: 'wt:configCacheCheckedAt',
  async refreshConfigCache(force){
    if (!this.hasToken() || !window.RepoConfigCache) return;
    const repos = this.quickLinks.map(q => q.repo);
    if (!repos.length) return;
    if (!force){
      try {
        const last = +localStorage.getItem(this._cacheCheckKey) || 0;
        if (Date.now() - last < this.CONFIG_CACHE_INTERVAL_MS) return;
      } catch {}
    }
    try {
      // One GH per repo (the shared store.gh is bound to the open repo). Read
      // the current manifest for each participant, legacy name as fallback.
      const fetched = {};
      await Promise.all(repos.map(async (repo) => {
        const g = new window.GH({ token: window.TOKEN, repo, ref: 'main' });
        let entry = { config: null, configName: null };
        for (const name of ['.web-tools.json', '.show-repo.json']){
          try {
            const parsed = JSON.parse((await g.get(name)).text);
            if (parsed && typeof parsed === 'object' && !Array.isArray(parsed)){ entry = { config: parsed, configName: name }; break; }
          } catch {}
        }
        fetched[repo] = entry;
      }));
      const reg = new window.GH({ token: window.TOKEN, repo: this.REGISTRY_REPO, ref: 'main' });
      let prev = null;
      try { prev = JSON.parse((await reg.get(window.RepoConfigCache.CACHE_PATH)).text); } catch {}
      const next = window.RepoConfigCache.buildCache(prev, fetched, new Date().toISOString());
      try { localStorage.setItem(this._cacheCheckKey, String(Date.now())); } catch {}
      // Only commit when substance changed (buildCache always restamps
      // timestamps, so a deep-equal would never skip).
      if (window.RepoConfigCache.cacheChanged(prev, next)){
        await reg.save(window.RepoConfigCache.CACHE_PATH, next, 'Update config cache (state/configs.json) via show-repo');
      }
    } catch(e){ console.warn('config cache refresh:', e?.message || e); }
  },

  // ── Private mailbox: fulfill request files an agent session dropped in the
  // registry repo, using the viewer's token, and write results back. Read-only
  // kinds only (tree / branches / fetch), so this never spends write access on
  // agent-authored instructions. Polled once per page load (a pending request
  // wants prompt service and listing is cheap); a dropped request is picked up
  // on the next load. Results are keyed by the request filename so nothing
  // re-runs. See lib/repo-mailbox.js and web-tools-private/mailbox/README.md.
  async processMailbox(){
    if (!this.hasToken() || !window.RepoMailbox) return;
    const M = window.RepoMailbox;
    try {
      const reg = new window.GH({ token: window.TOKEN, repo: this.REGISTRY_REPO, ref: 'main' });
      let reqs = [], results = [];
      try { reqs = await reg.ls(M.REQ_DIR); } catch {}      // 404 = no mailbox yet
      if (!reqs.length) return;
      try { results = await reg.ls(M.RES_DIR); } catch {}
      const names = M.pending(
        reqs.filter(f => f.type === 'file').map(f => f.name),
        results.filter(f => f.type === 'file').map(f => f.name)
      );
      for (const name of names){
        let req;
        try { req = JSON.parse((await reg.get(M.REQ_DIR + '/' + name)).text); }
        catch(e){ continue; } // unreadable/!JSON request: leave it, don't loop
        const result = await M.fulfill(req, { GH: window.GH, token: window.TOKEN });
        await reg.save(M.RES_DIR + '/' + name, result, 'Fulfill mailbox request ' + name + ' via show-repo');
      }
    } catch(e){ console.warn('mailbox:', e?.message || e); }
  },

  // web-tools -> its pages index ('gallery'); a repo whose manifest designates
  // a landing page -> that page rendered live ('custom'); every other repo ->
  // a synthesized overview ('overview'). The design notes below cover the
  // custom render path and the task-0002 federation.
  landingKind(){
    const s = Alpine.store('browser');
    if (s.repo === this.DEFAULT_REPO) return 'gallery';
    if (s.config?.landing) return 'custom';
    return 'overview';
  },
  get landingLabel(){ return { gallery: 'Pages', custom: 'Landing', overview: 'Overview' }[this.landingKind()]; },
  get landingIcon(){ return { gallery: 'ph-squares-four', custom: 'ph-planet', overview: 'ph-house' }[this.landingKind()]; },

  // Custom landings render through toss-render's #gh= address mode: fetched
  // with the viewer's stored token (private repos and branches work), rendered
  // same-origin, and gated by toss-render's OWNERS allowlist — a repo outside
  // it shows toss-render's refusal, not the page.
  get customLandingUrl(){
    const s = Alpine.store('browser');
    if (!s.config?.landing) return '';
    const ref = s.ref && s.ref !== s.defaultRef ? '@' + s.ref : '';
    return '../toss-render.html#gh=' + s.repo + ref + ':' + s.config.landing;
  },

  // Pinned folders and files from the manifest. A pin whose last segment has
  // an extension opens as a file; anything else opens the Files view at that
  // folder, where the explorer navigates onward.
  get pins(){ return Alpine.store('browser').config?.pins || []; },
  pinIsFile(p){ return /\.[^./]+$/.test(p.split('/').pop()); },
  async openPin(p){
    if (this.pinIsFile(p)) return this.openFile(p);
    await this.openFolder(p.replace(/\/+$/, ''));
  },

  // Auth state drives which pinned private repos are dimmed, and the sidebar
  // shield's icon/tooltip.
  _authState: 'public',
  _authUser: '',
  get authIcon(){
    if (this._authState === 'auth') return 'ph-shield-check text-success';
    if (this._authState === 'expired') return 'ph-warning text-warning';
    return 'ph-globe text-base-content/50';
  },
  get authTip(){
    if (this._authState === 'auth') return 'Authenticated: ' + this._authUser;
    if (this._authState === 'expired') return 'Token expired';
    return 'Public only';
  },

  // The brand icon goes home on desktop, where the sidebar is pinned, and opens
  // the drawer on mobile, where it stands in for the hamburger.
  get isDesktop(){ return window.matchMedia('(min-width: 1024px)').matches; },
  get brandTip(){ return this.isDesktop ? 'web-tools' : 'Browse'; },
  brandClick(){ this.isDesktop ? this.goHome() : this.openSidebar(); },

  // The open repo@ref on GitHub — the sidebar's standing jump-over. Every view
  // keeps a one-tap route to the GitHub presentation of what it is showing
  // (this link, the viewer's per-file GitHub action, the explorer's folder
  // link, the estate cards): show-repo is a wrapper over GitHub, not a wall.
  get repoGithubUrl(){
    const s = Alpine.store('browser');
    if (!s.repo) return '';
    const ref = s.ref && s.ref !== s.defaultRef ? '/tree/' + s.ref : '';
    return 'https://github.com/' + s.repo + ref;
  },

  get atlasUrl(){
    const s = Alpine.store('browser');
    const use = new URLSearchParams(location.search).get('use');
    let u = '../repo-atlas.html?repo=' + encodeURIComponent(s.repo || this.DEFAULT_REPO);
    if (s.ref && s.ref !== s.defaultRef) u += '&ref=' + encodeURIComponent(s.ref);
    if (use) u += '&use=' + encodeURIComponent(use);
    return u;
  },

  parseUrl(){
    const p = new URLSearchParams(location.search);
    if (!p.has('repo') && !p.has('file') && !p.has('view')) return null;
    return { repo: p.get('repo') || this.DEFAULT_REPO, ref: p.get('ref') || '',
             file: p.get('file'), view: p.get('view'), path: p.get('path') || '' };
  },

  syncUrl(){
    const s = Alpine.store('browser');
    const p = new URLSearchParams(location.search);
    if (s.repo && s.repo !== this.DEFAULT_REPO) p.set('repo', s.repo); else p.delete('repo');
    if (s.ref && s.ref !== s.defaultRef) p.set('ref', s.ref); else p.delete('ref');
    p.delete('file'); p.delete('view'); p.delete('path');
    if (this.view === 'files') {
      // A cross-repo staged file (activeFile.origin from another repo) has no
      // honest ?file= deep link against the open repo, so it gets none.
      const f = s.activeFile;
      if (f && (!f.origin || f.origin.repo === s.repo)) p.set('file', f.path);
      else { p.set('view', 'files'); if (s.path) p.set('path', s.path); }
    }
    else if (this.view === 'atlas') p.set('view', 'atlas');
    else if (this.view === 'stage') p.set('view', 'stage');
    else if (this.view === 'estate' && (p.has('repo') || p.has('ref'))) p.set('view', 'estate');
    const qs = p.toString();
    const next = location.pathname + (qs ? '?' + qs : '') + location.hash;
    const cur = location.pathname + location.search + location.hash;
    // Push a new history entry per distinct URL so the browser Back button walks
    // the navigation (repo, view, file, folder). A no-op change, or a change made
    // while restoring from a popstate, replaces in place instead, so Back never
    // needs a double press and popstate restoration doesn't re-push.
    if (this._restoring || next === cur) history.replaceState(null, '', next);
    else history.pushState(null, '', next);
  },

  // Browser Back/Forward: re-derive the shell state from the URL, mirroring the
  // init routing. `_restoring` makes syncUrl replace-in-place during the restore,
  // so the watchers this fires don't push new entries.
  async restoreFromUrl(){
    this._restoring = true;
    try {
      const url = this.parseUrl();
      await this.ensureBrowser(url?.repo, url?.ref);
      if (url && url.file) await this.openFile(url.file);
      else if (url && url.view === 'estate') this.goEstate();
      else if (url && url.view === 'atlas') this.goAtlas();
      else if (url && url.view === 'stage') this.goStage();
      else if (url && url.view === 'files') { this.goFiles(); if (url.path) await this.openFolder(url.path); }
      else if (!url) this.goEstate();
      else this.goLanding();
    } finally { this._restoring = false; }
  },

  // Point the file browser at a repo. web-tools boots identity-free via
  // pickByName; setup() fills the repo dropdown in the background (quiet: a
  // missing/expired token won't hijack the page).
  async ensureBrowser(repo, ref){
    repo = repo || this.DEFAULT_REPO;
    const gh = Alpine.store('browser').gh;
    const repoEl = document.getElementById('repo');
    if (!await waitFor(() => repoEl.__repo)) { notify('Repo component never mounted.'); return; }
    if (!this._setup){
      this._setup = true;
      const rc = repoEl.__repo;
      const syncAuth = () => {
        this._authState = rc.auth ? 'auth' : (rc.tokenExpired ? 'expired' : 'public');
        this._authUser = rc.user || '';
      };
      this.$watch(() => rc.auth + '|' + rc.user + '|' + rc.tokenExpired, syncAuth);
      rc.setup(gh, { quiet: true }).then(syncAuth).catch(e => console.warn('repo setup:', e?.message || e));
    }
    if (Alpine.store('browser').repo !== repo || (ref && Alpine.store('browser').ref !== ref)){
      try { await repoEl.__repo.pickByName(repo, ref ? { ref } : {}); }
      catch(e){ notify('Could not open ' + repo + ': ' + (e?.message || e)); }
    }
  },

  async openFile(path){
    const el = document.getElementById('explorer');
    if (!await waitFor(() => el.__explorer)) return;
    const folder = path.split('/').slice(0, -1).join('/');
    if (folder) await el.__explorer.load(folder, true);
    await el.__explorer.sel(path);
  },

  async openFolder(path){
    const el = document.getElementById('explorer');
    if (!await waitFor(() => el.__explorer)) return;
    this.goFiles();
    await el.__explorer.load(path);
  },

  goHome(){ this.goEstate(); },
  goEstate(){ this.estateSeen = true; this.view = 'estate'; this.drawer = false; this.syncUrl(); },
  goLanding(){ this.view = 'landing'; this.drawer = false; this.syncUrl(); },
  goAtlas(){ this.atlasSeen = true; this.view = 'atlas'; this.drawer = false; this.syncUrl(); },
  goFiles(){ this.view = 'files'; this.drawer = false; this.syncUrl(); },
  goStage(){ this.view = 'stage'; this.drawer = false; this.syncUrl(); },
  openSidebar(){ this.drawer = true; },

  // Header shortcuts to frequently-visited repos. web-tools is always public;
  // the other two are private, so dim (not hide) the button when unauthed
  // rather than let a click fail silently.
  pinnedDim(p){ return p.repo !== this.DEFAULT_REPO && this._authState !== 'auth'; },
  pinnedTip(p){ return this.pinnedDim(p) ? p.repo + ' (sign in to open)' : p.repo; },
  async openPinned(repo){ await this.ensureBrowser(repo); }
}}

// ── Gallery: the web-tools pages index, rendered from pages.json ─────────────
function gallery(){
  // show-repo sits one level below pages/, so pages.json's page-relative hrefs
  // and thumbs rebase with a '../' prefix; absolute code URLs pass through.
  const REBASE = '../';
  return {
    loaded: false,
    filter: 'main',
    q: '',
    groups: [],

    async init(){
      try {
        const raw = await (await fetch('../pages.json')).json();
        this.groups = raw.map(g => ({
          ...g,
          items: g.items.map(p => ({
            ...p,
            href: REBASE + p.href,
            thumb: REBASE + p.thumb,
            view: 'shot', source: '', shotMissing: false,
          })),
        }));
      } catch(e){
        notify('Could not load the pages catalog: ' + (e?.message || e));
      }
      this.loaded = true;
      const p = new URLSearchParams(location.search);
      const f = p.get('filter');
      if (f && (f === 'all' || this.groups.some(g => g.top === f))) this.filter = f;
      this.q = p.get('q') || '';
      this.$watch('filter', () => this.syncUrl());
      this.$watch('q', () => this.syncUrl());
    },

    syncUrl(){
      const p = new URLSearchParams(location.search);
      if (this.filter === 'main') p.delete('filter'); else p.set('filter', this.filter);
      if (this.q.trim()) p.set('q', this.q.trim()); else p.delete('q');
      const qs = p.toString();
      history.replaceState(null, '', location.pathname + (qs ? '?' + qs : '') + location.hash);
    },

    get chips(){
      const tops = [...new Set(this.groups.map(g => g.top))].filter(t => t !== 'main');
      tops.sort((a, b) => (a === 'kit-demos') - (b === 'kit-demos') || a.localeCompare(b));
      const countTop = t => this.groups.filter(g => g.top === t).reduce((n, g) => n + g.items.length, 0);
      const all = this.groups.reduce((n, g) => n + g.items.length, 0);
      const path = t => t === 'kit-demos' ? ['lib/', 'kits/demos/'] : ['pages/', t + '/'];
      return [
        { key: 'main', pre: '', seg: 'pages/', count: countTop('main') },
        { key: 'all',  pre: '', seg: 'All',    count: all },
        ...tops.map(t => ({ key: t, pre: path(t)[0], seg: path(t)[1], count: countTop(t) })),
      ];
    },
    get visibleGroups(){
      if (this.filter === 'all') return this.groups.filter(g => g.items.length);
      return this.groups.filter(g => g.top === this.filter && g.items.length);
    },
    get filteredGroups(){
      const q = this.q.trim().toLowerCase();
      if (!q) return this.visibleGroups;
      return this.visibleGroups
        .map(g => ({ ...g, items: g.items.filter(p =>
          (p.label + ' ' + (p.title || '') + ' ' + (p.note || '')).toLowerCase().includes(q)) }))
        .filter(g => g.items.length);
    },
    async show(p, v){
      p.view = v;
      if (v === 'html' && !p.source){
        p.source = 'Loading…';
        try { p.source = await (await fetch(p.href)).text(); }
        catch(e){ p.source = '// failed to load source: ' + e; }
      }
    },
    // The bridge: open a card's source in the file browser. Its repo path is the
    // github blob URL after /blob/<ref>/; that always names the real file, even
    // for the out-of-tree kit demos under lib/.
    async inspect(p){
      const m = p.code.match(/\/blob\/[^/]+\/(.+)$/);
      if (!m || !window.__shell) return;
      await window.__shell.ensureBrowser();
      await window.__shell.openFile(m[1]);
    },
  };
}

// ── Overview: the default landing for a repo with no gallery — stats + README
// + a jump to the atlas. Reads the repo from the shared store; loads the README
// through gh at the current ref. ─────────────────────────────────────────────
function overview(){ return {
  loading: false,
  html: '',

  init(){
    this.$watch(() => Alpine.store('browser').repo + '@' + Alpine.store('browser').ref, () => this.load());
    this.load();
  },

  get repo(){ return Alpine.store('browser').repo; },
  get repoObj(){ return Alpine.store('browser').repoObj; },
  get desc(){ return this.repoObj?.description || ''; },
  get stars(){ return this.repoObj?.stargazers_count ?? 0; },
  get forks(){ return this.repoObj?.forks_count ?? 0; },
  get visibility(){ return this.repoObj?.private ? 'private' : 'public'; },
  get defaultRef(){ return this.repoObj?.default_branch || Alpine.store('browser').defaultRef || ''; },
  get pushed(){
    const g = Alpine.store('browser').gh, p = this.repoObj?.pushed_at;
    return (g && p && g.ago) ? g.ago(p) : '';
  },
  goAtlas(){ window.__shell?.goAtlas(); },

  async load(){
    // web-tools uses the gallery landing, so skip the README fetch there.
    if (!this.repo || this.repo === window.__shell?.DEFAULT_REPO) return;
    const gh = Alpine.store('browser').gh;
    if (!gh) return;
    this.loading = true; this.html = '';
    let res = null;
    for (const p of ['README.md', 'readme.md', 'README.markdown', 'Readme.md']){
      try { res = await gh.get(p); break; } catch {}
    }
    if (res){
      try { await loadMarked(); this.html = window.marked.parse(res.text); }
      catch { this.html = '<pre>' + res.text.replace(/</g, '&lt;') + '</pre>'; }
    }
    this.loading = false;
  }
}}
</script>

<!-- ── Design notes: the estate, the landing mechanism, the views, the stage ───
  The page has TWO CONTEXT LEVELS. The ESTATE is the global, all-repo context;
  a REPO is a per-repo context, with its own VIEWS (landing, atlas, files,
  stage) plus pinned/recent shortcuts. The header repo selector is the switcher
  between them: its top entry, "Repositories", is the estate; the owner's repos
  below it are the per-repo contexts. In the estate the header reads
  "mehrlander / Repositories" with no branch selector (a branch is a repo-level
  notion), and the sidebar hides every per-repo item (top bar reads
  "Repositories", the view list / pinned / recent are gone), since none of them
  applies above the repo. Pick a repo and the per-repo sidebar and branch
  context come back. The brand icon doubles as the mobile drawer toggle and, on
  desktop, returns to the estate. app.landingKind(repo) is the one landing
  decision point within a repo.

  THE ESTATE: the all-repo view (lib/alpineComponents/estate.js), and the page's
  front door — a bare open (no ?repo/?file/?view, no #stage=) lands here, and
  the brand icon returns here on desktop. It renders a card per repo from the
  registry's `repos` list (the ecosystem manifest in web-tools-private's
  .web-tools.json; fallback: the quickLinks row), enriched with live GitHub
  metadata (description, visibility, pushed-ago), then every curated surface in
  the registry's surfaces/*.surface files (the surfacer's format; archive
  category excluded). No token: the public default card only, no surfaces.
  Deep link: ?view=estate (only stamped in the URL when a repo/ref param is
  also present; the bare URL IS the estate).

  GITHUB JUMP-OVERS: show-repo is a wrapper over GitHub, not a wall — every
  view keeps a one-tap route to the GitHub presentation of what it is showing.
  The sidebar top bar links the open repo@ref (repoGithubUrl), the explorer's
  breadcrumb links the current folder (ghFolderUrl), the viewer's actions link
  the open file's blob, and every estate card and surface item carries its
  github-logo link. When adding a view, add its jump-over.

  Today: web-tools -> 'gallery' (its pages index); a repo whose manifest names a
  landing -> 'custom' (see below); every other repo -> 'overview' (a synthesized
  default: stats + README + a jump to the atlas). The atlas is a standing repo
  view, available for every repo regardless of its landing — the "ready
  mechanism" for it.

  THE MANIFEST: .web-tools.json at the repo root is the repo's web-tools config,
  and how a repo designates what this shell should consider. Probed once per
  repo@ref (404 = no config), parsed as data, never executed. Reads
  .web-tools.json, falling back to the legacy .show-repo.json name. The sidebar
  shield dialog (repoModal, lib/alpineComponents/repo.js) has a Config tab (the
  gear, beside the info/links tab): a JSON editor that writes the manifest via
  the viewer's token. It always saves the new name, so editing a repo still on
  .show-repo.json migrates it in place (no delete; the stale legacy file is
  inert since readers prefer the new name). Current fields:

    icon     Phosphor class (e.g. "ph-scales") for the repo's header quick-link
             button. A repo may self-declare it, but the quick-link row's icon
             comes from the registry entry (see THE QUICK-LINK REGISTRY below);
             this field is the repo's own suggestion for consumers that read it.
    quickLinks  (registry repo only) the curated header quick-link list:
             [{ repo, icon }], membership + order + icon. Read from REGISTRY_REPO
             (web-tools-private) by loadQuickLinks() when the viewer has a token.
    landing  path to the repo's own landing page (e.g. "pages/landing.html"),
             rendered live via toss-render #gh= — token-authed, so private
             repos and branches work; gated by toss-render's OWNERS allowlist.
             "The repo builds its own page."
    pins     folders/files surfaced in the sidebar Pinned block; a last
             segment with an extension opens as a file, else opens the Files
             view at that folder.
    stage    { files: [...], targets: ["owner/repo:dir", ...] } — a durable
             staged-files list and the default destinations the Stage view's
             transfer UI offers. Entries in files are bare paths (this repo at
             its default branch) or qualified refs ("owner/repo[@ref]:path").
             Copying goes through gh-transfer.js (lib/): per-file Contents-API
             commits, base64 pass-through, viewer's token, two-tap confirm.

  THE QUICK-LINK REGISTRY: the header row is data-driven, not a hardcoded list.
  This page is public, so its source must not enumerate private repos. The
  built-in default (PUBLIC_QUICK_LINKS) lists only the public repo. The real
  curated list lives in a private registry repo (REGISTRY_REPO =
  web-tools-private) as a `quickLinks: [{repo, icon}]` field in its root
  .web-tools.json, and loadQuickLinks() fetches it when the viewer has a token
  (the registry is private, so no token means the public default only). The one
  private string this public page names is the registry repo itself, never the
  repos it lists. Editing the registry's config in the shield dialog re-runs
  loadQuickLinks (via the web-tools:config-saved event), so the row updates
  without a reload.

  THE STAGE: a cross-repo fileset (store.stage, [{repo, ref, path}]) fed by the
  explorer's "+" buttons, a manifest's stage.files, or a #stage= link, and
  presented as its own main-area view (stager, lib/alpineComponents/stage.js).
  The link is the transport — refs only, content stays behind the viewer's
  token:

    #stage=owner/repo[@ref]:path1,path2;owner2/repo2:path3

  opens this page with those refs staged for action (view, copy out or download
  the concatenated bundle, send to a repo); "Copy link" mints one from the
  current stage. This folds toss-render's link-as-transport insight into
  show-repo on the transfer side: a link can deliver a fileset for moving, not
  only a page for rendering. Compare (ref-diff) also lives in this view: a diff
  belongs with the fileset, not under the file viewer. A content-carrying
  bundle form (#gz= style, for token-less contexts like the Claude app's
  in-app browser) is a contemplated follow-up, not built.

  RENDERING stays toss-render's job: the viewer's "Toss render" action hands an
  HTML file to toss-render #gh= at the file's own repo@ref, and custom landings
  embed toss-render the same way. show-repo shows and moves files; toss-render
  runs pages.

  Next, aligned with tracker task 0002 (private-repo landing federation via
  mehrlander/home): with a token, read mehrlander/home's landing.json and fold
  each featured private repo's landing into web-tools' own gallery as
  additional cards/sections. HOME_REPO becomes the one public-private hinge, a
  single lib/ constant. No token: the private section is absent, no leak.

  The seam stays small: each landing kind is a branch in landingKind() plus a
  matching landing block; each manifest field has exactly one consumer.
─────────────────────────────────────────────────────────────────────────── -->
</body>
</html>
