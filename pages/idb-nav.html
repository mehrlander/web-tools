<!DOCTYPE html>
<html data-theme="emerald">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IndexedDB Explorer</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🗃️</text></svg>">
  <link href="https://cdn.jsdelivr.net/combine/npm/daisyui@5/themes.css,npm/daisyui@5" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/combine/npm/@tailwindcss/browser@4,npm/@phosphor-icons/web"></script>

  <!--
    idb-nav: scan every IndexedDB database on the origin, browse stores, edit
    records in a JSON tree, and run destructive ops (clear / delete store /
    delete DB). Composes:
      - kits/persistence.js — idb introspection + idb.admin writes
      - alpineComponents/idb-tree.js — sidebar
      - alpineComponents/viewer-assembled.js — right pane (defaultMode: tree)
  -->
  <script type="module">
    const REPO = 'mehrlander/web-tools';
    const BRANCH = 'main';
    const BOOT = `https://cdn.jsdelivr.net/gh/${REPO}@${BRANCH}/gh-api.js`;
    try {
      const mod = await import(BOOT);
      window.GH = mod.default;
      const gh = new window.GH({ repo: REPO, ref: BRANCH });
      await gh.load('kits/persistence.js');
      await gh.load('alpineComponents/viewer-assembled.js');
      await gh.load('alpineComponents/idb-tree.js');
      await gh.load('alpineComponents/fab-assembled.js');
      await gh.load('alpine-bundle.js');
    } catch (e) {
      console.error('boot:', e);
      document.body.innerHTML =
        `<pre class="p-4 text-error whitespace-pre-wrap">Boot failed: ${String(e?.message || e)}</pre>`;
    }
  </script>
</head>
<body class="h-screen overflow-hidden bg-base-200/50" x-data="explorer()" x-init="init()">

  <!-- toasts wired by alpine-bundle -->
  <div class="toast toast-top toast-end z-50" x-data x-show="$store.toasts && $store.toasts.length">
    <template x-for="t in ($store.toasts || [])" :key="t.id">
      <div class="alert text-sm gap-2" :class="t.cls">
        <i class="ph" :class="'ph-'+t.icon"></i>
        <span x-text="t.msg"></span>
      </div>
    </template>
  </div>

  <div class="flex h-full">

    <!-- Sidebar -->
    <aside class="w-80 bg-base-100 flex flex-col border-r border-base-300 shrink-0">
      <header class="p-3 border-b border-base-300 flex items-center justify-between gap-2">
        <h1 class="text-xl font-bold">IndexedDB</h1>
        <button class="btn btn-ghost btn-sm btn-circle tooltip tooltip-left"
                data-tip="Refresh"
                @click="refreshTree()">
          <i class="ph ph-arrows-clockwise"></i>
        </button>
      </header>
      <div class="flex-1 min-h-0"
           x-data="idbTree({
             onSelect: (db, store) => loadStore(db, store)
           })">
      </div>
    </aside>

    <!-- Main -->
    <main class="flex-1 flex flex-col min-w-0">
      <header class="px-3 py-2 border-b border-base-300 flex justify-between items-center gap-3 bg-base-100">
        <div class="min-w-0">
          <div class="font-mono font-bold text-lg truncate"
               x-text="currentStore ? `${currentDB}.${currentStore}` : 'No store selected'"></div>
          <div class="text-sm opacity-60 truncate" x-show="currentInfo" x-text="currentInfo"></div>
        </div>
        <div class="flex gap-1.5 shrink-0" x-show="currentStore">
          <button class="btn btn-sm btn-success" x-show="dirty" @click="save()">
            <i class="ph ph-floppy-disk"></i>Save
          </button>
          <button class="btn btn-sm btn-ghost" @click="reload()">
            <i class="ph ph-arrows-clockwise"></i>Reload
          </button>
          <button class="btn btn-sm btn-warning" @click="askClear()">
            <i class="ph ph-eraser"></i>Clear
          </button>
          <button class="btn btn-sm btn-error" @click="askDeleteStore()">
            <i class="ph ph-trash"></i>Store
          </button>
          <button class="btn btn-sm btn-error" @click="askDeleteDB()">
            <i class="ph ph-database"></i>DB
          </button>
        </div>
      </header>
      <div class="flex-1 overflow-hidden bg-base-100">
        <template x-if="currentStore">
          <div class="h-full px-3 py-2 overflow-hidden"
               x-data="viewer({ copy: true, defaultMode: 'tree' })"></div>
        </template>
        <template x-if="!currentStore">
          <div class="h-full flex items-center justify-center text-base-content/30 italic">
            Select a store from the sidebar
          </div>
        </template>
      </div>
    </main>
  </div>

  <!-- Confirm modal -->
  <dialog class="modal" :class="modal.open && 'modal-open'">
    <div class="modal-box">
      <h3 class="font-bold text-lg" x-text="modal.title"></h3>
      <p class="py-4" x-text="modal.message"></p>
      <div class="modal-action">
        <button class="btn btn-error btn-sm" @click="modal.confirm()" x-text="modal.action || 'Delete'"></button>
        <button class="btn btn-sm" @click="modal.open = false">Cancel</button>
      </div>
    </div>
  </dialog>

  <!-- FAB for source / repo links -->
  <div x-data="fab()" data-path="pages/idb-nav.html"></div>

  <script>
    document.addEventListener('alpine:init', () => {
      Alpine.data('explorer', () => ({
        currentDB: null,
        currentStore: null,
        currentInfo: '',
        dirty: false,
        latestContent: null,
        modal: { open: false, title: '', message: '', action: 'Delete', confirm: () => {} },

        init() {
          document.addEventListener('viewer:tree-change', e => {
            this.dirty = true;
            this.latestContent = e.detail.content;
          });
        },

        treeEl() { return document.querySelector('[x-data^="idbTree"]'); },

        async refreshTree() {
          const t = this.treeEl()?.__idbTree;
          if (t) await t.refresh();
        },

        async loadStore(dbName, storeName) {
          this.currentDB = dbName;
          this.currentStore = storeName;
          const records = await persistence.idb.readAll(dbName, storeName);
          const props = [...new Set(records.flatMap(r => r && typeof r === 'object' ? Object.keys(r) : []))];
          this.currentInfo = `${records.length} record${records.length === 1 ? '' : 's'}` +
                             (props.length ? ` • ${props.join(', ')}` : '');
          this.dirty = false;
          this.latestContent = null;
          // Hand the records to the viewer via the shared browser store.
          // viewer({ defaultMode: 'tree' }) opens directly in the tree editor.
          Alpine.store('browser').activeFile = {
            path: `${dbName}.${storeName}.json`,
            content: JSON.stringify(records, null, 2)
          };
        },

        async reload() {
          if (!this.currentDB || !this.currentStore) return;
          await this.refreshTree();
          await this.loadStore(this.currentDB, this.currentStore);
        },

        async save() {
          if (!this.currentDB || !this.currentStore) return;
          const c = this.latestContent;
          let data;
          if (c?.json !== undefined) data = c.json;
          else if (c?.text !== undefined) {
            try { data = JSON.parse(c.text); }
            catch (e) {
              Alpine.store('toast')?.('warning', 'Invalid JSON: ' + e.message, 'alert-error', 3000);
              return;
            }
          } else return;
          if (!Array.isArray(data)) {
            Alpine.store('toast')?.('warning', 'Expected an array of records', 'alert-error', 3000);
            return;
          }
          try {
            await persistence.idb.admin.replaceAll(this.currentDB, this.currentStore, data);
            this.dirty = false;
            await this.reload();
            Alpine.store('toast')?.('floppy-disk', `Saved ${data.length}`, 'alert-success', 1500);
          } catch (e) {
            console.error('save:', e);
            Alpine.store('toast')?.('warning', e.message, 'alert-error', 3000);
          }
        },

        ask(title, message, action, confirm) {
          this.modal = { open: true, title, message, action, confirm };
        },

        askClear() {
          this.ask('Clear Store', `Remove all records from ${this.currentStore}?`, 'Clear', async () => {
            this.modal.open = false;
            try {
              await persistence.idb.admin.clearStore(this.currentDB, this.currentStore);
              await this.reload();
              Alpine.store('toast')?.('eraser', 'Cleared', 'alert-info', 1500);
            } catch (e) {
              console.error(e);
              Alpine.store('toast')?.('warning', e.message, 'alert-error', 3000);
            }
          });
        },

        askDeleteStore() {
          this.ask('Delete Store',
            `Delete ${this.currentStore} from ${this.currentDB}? Cannot be undone.`,
            'Delete',
            async () => {
              this.modal.open = false;
              try {
                await persistence.idb.admin.deleteStore(this.currentDB, this.currentStore);
                this.clearSelection();
                await this.refreshTree();
                Alpine.store('toast')?.('trash', 'Store deleted', 'alert-info', 1500);
              } catch (e) {
                console.error(e);
                Alpine.store('toast')?.('warning', e.message, 'alert-error', 3000);
              }
            });
        },

        askDeleteDB() {
          this.ask('Delete Database',
            `Delete ${this.currentDB}? Cannot be undone.`,
            'Delete',
            async () => {
              this.modal.open = false;
              try {
                await persistence.idb.admin.deleteDb(this.currentDB);
                this.clearSelection();
                await this.refreshTree();
                Alpine.store('toast')?.('database', 'Database deleted', 'alert-info', 1500);
              } catch (e) {
                console.error(e);
                Alpine.store('toast')?.('warning', e.message, 'alert-error', 3000);
              }
            });
        },

        clearSelection() {
          this.currentDB = null;
          this.currentStore = null;
          this.currentInfo = '';
          this.dirty = false;
          this.latestContent = null;
          const t = this.treeEl()?.__idbTree;
          if (t) { t.selectedDb = null; t.selectedStore = null; }
        }
      }));
    });
  </script>
</body>
</html>
