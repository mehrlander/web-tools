<!DOCTYPE html>
<html lang="en" data-theme="night">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>web-tools</title>
<link href="https://cdn.jsdelivr.net/combine/npm/daisyui@5/themes.css,npm/daisyui@5" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/combine/npm/@tailwindcss/browser@4,npm/@phosphor-icons/web"></script>
<script defer src="https://unpkg.com/alpinejs/dist/cdn.min.js"></script>
</head>
<body class="bg-base-100 text-base-content min-h-screen">

<div class="max-w-2xl mx-auto px-4 py-10"
  x-data="{
    files: [],
    loading: true,
    error: null,
    notes: {
      'show-repo/':        'GitHub-repo file viewers (show-repo, repo-drag, etc).',
      'demos/':            'Hub for kits/ demo pages.',
      'quick-dump.html':   'Quick mobile dump intake.',
      'data-shelf.html':   'Dexie-backed data jar — companion-window scratch storage.',
      'demo-spacex.html': 'Viewer component fed from api.spacexdata.com/v4 endpoints.',
      'compression-helper.html':    'Original (Alp-backed) compression bookmarklet packer.',
      'compression-helper-v2.html': 'Same UI, rebuilt on the in-repo kits/ — no external Alp dep.',
      'compression-helper-v3.html': 'Same UI again, with the components as Alpine.data() factories.',
      'table-compress.html':       'Single-function row transform + brotli/gz bundle round-trip.',
      'table-compress-multi.html': 'Multi-function variant of table-compress.',
      'bookmarklets-story.html':   'Field notes on bookmarklet packing.'
    },
    async init() {
      const res = await fetch('https://api.github.com/repos/mehrlander/web-tools/contents/pages')
      if (!res.ok) { this.error = `GitHub API ${res.status}`; this.loading = false; return }
      const data = await res.json()
      this.files = data
        .filter(f => f.type === 'dir' || (f.name.endsWith('.html') && f.name !== 'index.html'))
        .map(f => ({
          ...f,
          href:  f.type === 'dir' ? f.name + '/' : f.name,
          label: f.type === 'dir' ? f.name + '/' : f.name.replace('.html', '')
        }))
        .sort((a, b) => a.label.localeCompare(b.label))
      this.loading = false
    }
  }"
>

  <div class="flex items-baseline justify-between mb-1">
    <h1 class="text-2xl font-bold tracking-tight">web-tools</h1>
    <a href="https://github.com/mehrlander/web-tools"
       class="text-xs text-base-content/40 hover:text-base-content/70 flex items-center gap-1 transition-colors">
      <i class="ph ph-github-logo"></i> mehrlander/web-tools
    </a>
  </div>
  <p class="text-base-content/50 text-sm mb-8">Browser-based tools and demos. Fetched live from the repo.</p>

  <!-- Loading -->
  <div x-show="loading" class="flex items-center gap-2 text-base-content/40 text-sm py-4">
    <span class="loading loading-spinner loading-xs"></span> Loading files...
  </div>

  <!-- Error -->
  <div x-show="error" class="alert alert-error text-sm" x-text="error"></div>

  <!-- File list -->
  <ul x-show="!loading && !error" class="divide-y divide-base-200">
    <template x-for="f in files" :key="f.name">
      <li class="py-3 flex items-start gap-3 group">
        <i :class="f.type === 'dir' ? 'ph ph-folder' : 'ph ph-file-html'"
           class="text-base-content/30 text-lg mt-0.5 shrink-0 group-hover:text-primary transition-colors"></i>
        <div class="min-w-0">
          <a :href="f.href"
             class="font-semibold text-base-content hover:text-primary transition-colors text-sm"
             x-text="f.label"></a>
          <span class="block text-xs text-base-content/40 mt-0.5"
                x-text="notes[f.href] ?? ''"></span>
        </div>
        <a :href="`https://github.com/mehrlander/web-tools/${f.type === 'dir' ? 'tree' : 'blob'}/main/pages/${f.name}`"
           class="ml-auto text-base-content/20 hover:text-base-content/50 transition-colors shrink-0 mt-0.5"
           title="View on GitHub" target="_blank">
          <i class="ph ph-code text-sm"></i>
        </a>
      </li>
    </template>
  </ul>

</div>
</body>
</html>
