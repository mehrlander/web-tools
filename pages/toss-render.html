<!doctype html>
<html lang="en" data-theme="emerald">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />

<title>Toss Render</title>

<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🥏</text></svg>">
<link href="https://cdn.jsdelivr.net/combine/npm/daisyui@5/themes.css,npm/daisyui@5" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/combine/npm/@tailwindcss/browser@4,npm/@phosphor-icons/web"></script>

<!--
  toss-render.html — full-viewport render of HTML that GitHub Pages isn't
  serving. Formerly embed.html. Three ways in: a URL param, a paste, or the
  on-page GitHub-file field. Two trust levels, opposite handling:

  Payload modes (the 🥏 toss — content rides in on the URL, UNTRUSTED):
    #gz=<base64url of gzipped HTML>   inline HTML, gzip-compressed
    #html=<base64 of HTML>            inline HTML, plain
    #url=<base64 of absolute URL>     iframe src points at the URL
  Anyone can craft a toss link, so payloads render in a sandbox WITHOUT
  allow-same-origin: scripts run, but under an opaque origin that cannot
  read this origin's localStorage (which can hold a gh token). Pasted HTML
  and pasted URLs are treated as payloads too: same untrusted sandbox.

  Address mode (fetched by reference, TRUSTED via allowlist):
    #gh=<owner>/<repo>[@<ref>]:<path>[?<query>]
    e.g. #gh=mehrlander/web-tools@some-branch:pages/index.html
    An optional ?query after the path is handed to the PAGE (via the params
    shim, since a srcdoc iframe has no location.search), so a page's own
    deep links work tossed: ...:pages/show-repo/show-repo.html?view=stage.
  Fetches the file via the GitHub API (using the stored token, so private
  repos and un-deployed branches work) and renders it same-origin, with a
  <base> stamped in so relative URLs resolve and a shim so the page's own
  ?use= read returns <ref> (the rewrite recipe from alpineComponents/fab.js).
  Same-origin rendering means the page could read the stored token — which
  is exactly why this mode only accepts repos owned by the OWNERS allowlist
  below. A crafted link to someone else's repo is refused outright, so the
  token can neither fetch it nor be exposed to it. The ':' before <path> is
  unambiguous because git forbids ':' in ref names. No @ref means the
  repo's default branch (and no ?use shim). The on-page field and a pasted
  github.com/.../blob/<ref>/<path> URL both route here, so a private file is
  one paste away.

  Empty state: with no input, the page shows a panel — a "Paste & render"
  button (Clipboard API, so it works from one tap on iOS without revealing
  the text) and a field for a GitHub file. A global paste listener catches
  desktop Ctrl/Cmd-V too.

  Page actions live in the FAB, not a floating pill. A tiny `tossRender`
  x-data component exposes the FAB's opt-in contract — a `description` and an
  `actions` array — so the toolbox renders "Copy toss link" (rebuilds the
  durable #gz=/#url=/#gh= bookmark for what's on screen) and "New toss" in its
  header strip. The component only holds metadata closing over the render
  state below, so the critical render path stays vanilla and instant.

  The FAB (alpineComponents/fab.js) also brings zip/offline export, the
  component/script/console tabs, and the render tab's branch survey. It boots
  after the render logic and self-loads its own kits, so a blocked CDN
  degrades to render-only rather than breaking the page. ?use=<ref> pins the
  FAB's lib chain to a branch/tag/sha for previewing edits to this shell.

  One fab per viewport: every rendered mode stamps window.__fabHosted into
  the frame HTML, so a fab the tossed page mounts declines (fab.js's
  singleton guard). In address mode the shell also stamps window.__tossSubject
  ({repo, ref, path}) and fires 'toss-subject'; the shell's fab adopts it, so
  its header, version readout, and render tab describe the tossed page, not
  this shell, and "Re-toss at ref" re-addresses in place via __tossNavigate.

  Params are read from the fragment (#) first, then the query string (?).
  Payloads must use the fragment (a query string travels in the HTTP request
  and GitHub Pages' edge rejects URLs past ~8KB with a 414); addresses are
  short, so either form works. All base64 params accept standard or URL-safe
  alphabet, with or without padding.

  Caveat for #url=: sites that send X-Frame-Options or CSP frame-ancestors
  will refuse to load in the iframe.

  Private repos / un-deployed branches in #gh=: Pages and jsDelivr won't serve
  the content, and a token can't ride on a plain <script src>/<link href>, so
  the page's own relative deps would 404. Two shims close the basic case, both
  fetching through the authenticated contents API at the same ref: render-time
  inlining (inlineRelativeDeps) pulls each relative <script src> and
  <link rel=stylesheet href> ahead of render, and a fetch shim (addressHtml)
  reroutes the page's relative runtime GET fetch()es (e.g. './data.json',
  './rows.csv') on demand. A third shim makes history.replaceState/pushState
  safe: in a srcdoc iframe they throw a SecurityError (URL resolved against
  <base>, document at about:srcdoc), which would break hash-routing pages on
  every view switch. Still unhandled: static <img src> and other
  relative-tag assets, CSS url()/@import, XHR, and dynamic import().

  The 🥏 bookmarklet feeding the gz mode lives at bookmarklets/toss-render.js
  (canonical copy; re-copy from there after edits). Current text:

  javascript:(async()=>{const m=location.hostname==='github.com'&&location.pathname.match(/^\/([^/]+)\/([^/]+)\/blob\/([^/]+)\/(.+)$/);if(!m)return alert('Run this from a github.com file (blob) page');const[,owner,repo,ref,path]=m;let text=document.querySelector('#read-only-cursor-text-area')?.value;if(!text){try{const d=JSON.parse(document.querySelector('script[data-target="react-app.embeddedData"]')?.textContent||'{}');text=d?.payload?.blob?.rawLines?.join('\n');}catch(e){}}if(!text){try{const r=await fetch(`https://raw.githubusercontent.com/${owner}/${repo}/${ref}/${path}`);if(r.ok)text=await r.text();}catch(e){}}if(!text)return alert('Could not read the file contents from this page');if(!/<base[\s>]/i.test(text)){const dir=path.split('/').slice(0,-1).join('/');const base=`https://cdn.jsdelivr.net/gh/${owner}/${repo}@${ref}/${dir?dir+'/':''}`;text=/<head[^>]*>/i.test(text)?text.replace(/<head[^>]*>/i,h=>`${h}<base href="${base}">`):`<base href="${base}">`+text;}const buf=new Uint8Array(await new Response(new Blob([text]).stream().pipeThrough(new CompressionStream('gzip'))).arrayBuffer());let s='';for(const c of buf)s+=String.fromCharCode(c);const b64=btoa(s).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');location.href=`https://mehrlander.github.io/web-tools/pages/toss-render.html#gz=${b64}`;})()
-->
</head>
<body class="h-dvh m-0 bg-base-100">

<iframe id="frame"
        class="w-full h-full border-0 block bg-base-100 hidden"
        referrerpolicy="no-referrer"
        allow="fullscreen"></iframe>

<!-- Input panel (empty state). -->
<div id="empty" class="hidden h-full w-full flex-col items-center justify-center gap-4 p-8 text-center">
  <i class="ph ph-disc text-5xl opacity-50"></i>

  <button id="paste-btn" class="btn btn-primary gap-2"><i class="ph ph-clipboard-text"></i>Paste &amp; render</button>
  <div class="text-xs text-base-content/40 max-w-xs">Paste HTML or a URL — it renders straight to the frame, the text is never shown.</div>

  <div class="flex items-center gap-2 w-full max-w-sm">
    <div class="flex-1 h-px bg-base-300"></div>
    <span class="text-[10px] uppercase tracking-wide text-base-content/30">or a GitHub file</span>
    <div class="flex-1 h-px bg-base-300"></div>
  </div>
  <form id="addr-form" class="flex w-full max-w-sm gap-2">
    <input id="addr-input" class="input input-sm input-bordered flex-1 font-mono text-xs"
           placeholder="owner/repo@ref:path  or  blob URL" autocapitalize="off" autocorrect="off" spellcheck="false" />
    <button class="btn btn-sm" type="submit">Open</button>
  </form>

  <p id="empty-msg" class="text-error text-xs max-w-md font-mono"></p>
  <a id="empty-token" target="_blank" rel="noreferrer" class="link link-primary text-xs hidden"
     href="https://github.com/settings/tokens/new?scopes=repo&description=web-tools">Get or renew a GitHub token</a>
  <p class="text-[10px] text-base-content/30 max-w-md leading-relaxed">
    URL forms: <code>#gh=owner/repo@ref:path?query</code> (the ?query reaches the page), <code>#gz=</code>/<code>#html=</code> base64 HTML, <code>#url=</code> base64 URL.
  </p>
</div>

<!-- Page actions ("Copy toss link", "New toss") are surfaced through the FAB's
     header strip via the x-data `actions` contract, not a floating pill. -->
<div x-data="tossRender" data-marker="toss"></div>

<!-- Toolbox: page actions, zip/offline export, component/script/console tabs. -->
<div x-data="fab()" data-path="pages/toss-render.html"></div>

<script type="module">
  // Repos whose HTML may render same-origin (with token access) via #gh=.
  const OWNERS = ['mehrlander'];

  // Fragment first (never sent to the server, so no edge URL-length cap),
  // query string as fallback.
  const hashParams  = new URLSearchParams(location.hash.slice(1));
  const queryParams = new URLSearchParams(location.search);
  const param = k => hashParams.get(k) ?? queryParams.get(k);

  // Fragment-only navigation is same-document: this script wouldn't re-run
  // when the user follows a second toss link, so force a real reload.
  window.addEventListener('hashchange', () => location.reload());

  const frame = document.getElementById('frame');
  const empty = document.getElementById('empty');
  const msg   = document.getElementById('empty-msg');

  // Each render sets this to a function returning the durable bookmark for
  // what's on screen; the FAB's "Copy toss link" action calls it.
  let tossLinkFn = null;

  const absUrl = frag => location.origin + location.pathname + frag;

  function showInput(error, tokenHint) {
    tossLinkFn = null;
    // Back to the panel (or an error): nothing rendered, so no subject.
    setSubject(null);
    frame.classList.add('hidden');
    empty.classList.remove('hidden');
    empty.classList.add('flex');
    msg.textContent = error || '';
    // Only token-shaped failures surface the token link; a decode or parse
    // failure must not send the viewer off to mint a new token for nothing.
    document.getElementById('empty-token').classList.toggle('hidden', !tokenHint);
  }
  // Kept name for the existing error call sites; an error just re-shows the panel.
  const showEmpty = showInput;

  function reveal() {
    empty.classList.add('hidden'); empty.classList.remove('flex');
    frame.classList.remove('hidden');
  }

  // --- base64 helpers (standard or URL-safe, padded or not) ---
  function b64Bytes(s) {
    let b = s.replace(/\s/g, '').replace(/-/g, '+').replace(/_/g, '/');
    while (b.length % 4) b += '=';
    return Uint8Array.from(atob(b), c => c.charCodeAt(0));
  }
  const decodeB64 = s => new TextDecoder().decode(b64Bytes(s));
  function b64urlEncode(bytes) {
    let s = '';
    for (const c of bytes) s += String.fromCharCode(c);
    return btoa(s).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
  }
  const utf8 = str => new TextEncoder().encode(str);

  async function gunzip(bytes) {
    const ds = new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
    return await new Response(ds).text();
  }
  async function gzipB64(text) {
    const buf = new Uint8Array(await new Response(
      new Blob([text]).stream().pipeThrough(new CompressionStream('gzip'))
    ).arrayBuffer());
    return b64urlEncode(buf);
  }

  // Singleton guard for the sandboxed modes: stamp __fabHosted so a fab in
  // the tossed HTML declines to mount (the shell's fab owns the viewport).
  // Render-time only — tossLinkFn keeps encoding the original text.
  function guardHtml(text) {
    const g = '<script>window.__fabHosted=true;<\/script>';
    if (/<head[^>]*>/i.test(text)) return text.replace(/<head[^>]*>/i, m => m + g);
    if (/<html[^>]*>/i.test(text)) return text.replace(/<html[^>]*>/i, m => m + '<head>' + g + '</head>');
    return '<head>' + g + '</head>' + text;
  }

  // Announce the rendered subject (the repo/ref/path the viewer is actually
  // looking at) to the shell's own chrome; the fab adopts it. Cleared for
  // renders with no repo behind them (inline HTML, external URLs, the panel).
  function setSubject(s) {
    window.__tossSubject = s || null;
    window.dispatchEvent(new CustomEvent('toss-subject'));
  }

  function showHtml(html) {
    const t = html.match(/<title[^>]*>([^<]*)<\/title>/i);
    document.title = 'Toss · ' + (t ? t[1].trim() : 'inline');
    setSubject(null);
    // Sandbox without allow-same-origin: the inline HTML arrives via the URL
    // or a paste, so it must not run as this page's origin (which can hold a
    // gh token in localStorage). Scripts still run, but under an opaque origin.
    frame.setAttribute('sandbox', 'allow-scripts allow-popups allow-forms allow-modals allow-downloads');
    frame.srcdoc = guardHtml(html);
    tossLinkFn = async () => absUrl('#gz=' + await gzipB64(html));
    reveal();
  }

  // Same-origin render for allowlisted address mode only: the page keeps its
  // identity, so its own gh.load chain and stored token work.
  function showTrusted(html, title, addr) {
    document.title = title;
    frame.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-popups allow-forms allow-modals');
    frame.srcdoc = html;
    tossLinkFn = async () => absUrl('#gh=' + addr);
    reveal();
  }

  function showUrl(href) {
    const parsed = new URL(href);
    if (!/^https?:$/.test(parsed.protocol)) throw new Error('bad protocol');
    document.title = 'Toss · ' + parsed.host;
    setSubject(null);
    frame.removeAttribute('sandbox'); // a real cross-site load, not srcdoc
    frame.removeAttribute('srcdoc');
    frame.src = parsed.href;
    tossLinkFn = async () => absUrl('#url=' + b64urlEncode(utf8(parsed.href)));
    reveal();
  }

  // A <script> for the prelude that reroutes the rendered page's *relative*
  // GET fetch()es to the authenticated contents API at the same ref. Static
  // tags get inlined ahead of render (inlineRelativeDeps); this is the runtime
  // companion, so a private/un-deployed page that does fetch('./data.json') or
  // './rows.csv' just works — the page is unchanged, only fetch is patched.
  // Relative string URLs only (the unresolved value the page passes): absolute
  // URLs, non-GET, root-relative '/…', and Request objects pass straight
  // through. Bytes come back via the raw media type (served up to 100 MB; the
  // JSON media type empties "content" over 1 MB, with a git-blobs fallback by
  // sha), rewrapped in a Response with a MIME guessed from the extension so
  // res.json()/text()/blob() behave. The shim reads the token itself
  // (same-origin, allowlisted render).
  function fetchShim({ owner, name, ref, dir }) {
    const O = JSON.stringify(owner), N = JSON.stringify(name),
          R = JSON.stringify(ref || ''), D = JSON.stringify(dir);
    return `<script>(function(){
var O=${O},N=${N},R=${R},D=${D};
var real=window.fetch&&window.fetch.bind(window); if(!real)return;
var MIME={json:'application/json',csv:'text/csv',tsv:'text/tab-separated-values',txt:'text/plain',md:'text/markdown',xml:'application/xml',svg:'image/svg+xml',html:'text/html',htm:'text/html',js:'text/javascript',mjs:'text/javascript',css:'text/css',wasm:'application/wasm',png:'image/png',jpg:'image/jpeg',jpeg:'image/jpeg',gif:'image/gif',webp:'image/webp',pdf:'application/pdf'};
function mime(p){var e=(p.split('.').pop()||'').toLowerCase();return MIME[e]||'application/octet-stream';}
function tok(){try{var t=localStorage.getItem('ghToken');return(t&&t.indexOf('🎟')<0)?('Bearer '+t.trim()):'';}catch(e){return'';}}
function bytes(s){var b=atob(s.replace(/\\s/g,''));var u=new Uint8Array(b.length);for(var i=0;i<b.length;i++)u[i]=b.charCodeAt(i);return u;}
function wrap(body,rp){return new Response(body,{status:200,headers:{'Content-Type':mime(rp)}});}
function isJson(r){var c=(r.headers.get('Content-Type')||'').toLowerCase();return c.indexOf('json')>-1&&c.indexOf('raw')<0;}
function meta(d){return d&&typeof d==='object'&&!(d instanceof Array)&&('content' in d)&&('encoding' in d);}
function blob(sha,h,rp){var api='https://api.github.com/repos/'+O+'/'+N+'/git/blobs/'+sha;
  return real(api,{headers:h}).then(function(b){if(!b.ok)return b;
    if(!isJson(b))return b.arrayBuffer().then(function(buf){return wrap(buf,rp);});
    return b.text().then(function(t){var d=null;try{d=JSON.parse(t);}catch(e){return wrap(t,rp);}
      return wrap(meta(d)&&d.content?bytes(d.content):t,rp);});});}
window.fetch=function(input,init){try{
  var url=(typeof input==='string')?input:(input&&input.url);
  var m=((init&&init.method)||(input&&input.method)||'GET').toUpperCase();
  if(url&&m==='GET'&&!/^[a-z][a-z0-9+.-]*:/i.test(url)&&url.slice(0,2)!=='//'&&url.charAt(0)!=='/'&&url.charAt(0)!=='#'){
    var rp=new URL(url,'https://_/'+D).pathname.slice(1);
    var api='https://api.github.com/repos/'+O+'/'+N+'/contents/'+rp+(R?('?ref='+encodeURIComponent(R)):'');
    var h={Accept:'application/vnd.github.raw+json'};var a=tok();if(a)h.Authorization=a;
    return real(api,{headers:h}).then(function(r){if(!r.ok)return r;
      if(!isJson(r))return r.arrayBuffer().then(function(buf){return wrap(buf,rp);});
      return r.text().then(function(t){
        var d=null;try{d=JSON.parse(t);}catch(e){return wrap(t,rp);}
        if(d instanceof Array){if(!d.length||(d[0]&&d[0].sha&&d[0].path))return new Response('directory',{status:400});return wrap(t,rp);}
        if(!meta(d))return wrap(t,rp);
        if(d.content)return wrap(bytes(d.content),rp);
        if(d.sha)return blob(d.sha,h,rp);
        return wrap('',rp);
      });});
  }
}catch(e){}return real(input,init);};
})();<\/script>`;
  }

  // The fab.js frameHtml recipe: <base> so relative URLs resolve on github.io,
  // plus (when a ref was addressed) a shim so the page's own ?use= read
  // returns that ref and its lib chain loads from the same place. Then the
  // fetch shim, so the page's relative runtime fetches resolve from the repo.
  function addressHtml(text, { owner, name, ref, path, pageQuery }) {
    const dir = path.includes('/') ? path.slice(0, path.lastIndexOf('/') + 1) : '';
    let prelude = '<base href="https://' + owner + '.github.io/' + name + '/' + dir + '">';
    // Singleton guard: the shell mounts the one fab for this viewport, so a
    // fab in the rendered page sees __fabHosted and declines to mount.
    prelude += '<script>window.__fabHosted=true;<\/script>';
    // History-safe shim: in a srcdoc iframe history.replaceState/pushState
    // throw a SecurityError (the URL resolves against <base> while the
    // document is about:srcdoc), which kills hash-routing pages mid view
    // switch. Wrap both so a failed call is a no-op instead of an exception.
    prelude += '<script>(function(){var H=window.history;if(!H)return;' +
      'var rs=H.replaceState,ps=H.pushState;' +
      'H.replaceState=function(){try{return rs.apply(H,arguments)}catch(e){}};' +
      'H.pushState=function(){try{return ps.apply(H,arguments)}catch(e){}};' +
      '})();<\/script>';
    // Params shim: the srcdoc iframe has no location.search, so answer
    // URLSearchParams lookups for the addressed ?query keys (the page's own
    // deep links, e.g. ?view=stage) plus use=<ref> (the lib-chain pin, the
    // shim's original job). Injected values only fill absent/empty keys, so a
    // params string that really carries the key wins.
    const injected = {};
    if (pageQuery) for (const [k, v] of new URLSearchParams(pageQuery)) injected[k] = v;
    if (ref) { injected.use = ref; prelude += '<script>window.__ref=' + JSON.stringify(ref) + ';<\/script>'; }
    if (Object.keys(injected).length) {
      const P = JSON.stringify(injected);
      prelude += '<script>(function(){var P=' + P + ',O=Object.prototype.hasOwnProperty,' +
        'g=URLSearchParams.prototype.get,h=URLSearchParams.prototype.has;' +
        'URLSearchParams.prototype.get=function(k){var v=g.call(this,k);' +
        'return (v==null||v==="")&&O.call(P,k)?P[k]:v;};' +
        'URLSearchParams.prototype.has=function(k){return h.call(this,k)||O.call(P,k);};' +
        '})();<\/script>';
    }
    prelude += fetchShim({ owner, name, ref, dir });
    if (/<head[^>]*>/i.test(text)) return text.replace(/<head[^>]*>/i, m => m + prelude);
    if (/<html[^>]*>/i.test(text)) return text.replace(/<html[^>]*>/i, m => m + '<head>' + prelude + '</head>');
    return '<head>' + prelude + '</head>' + text;
  }

  // A github.com (or raw.githubusercontent.com) file URL -> owner/repo@ref:path,
  // so a pasted blob link routes through trusted address mode. null if not one.
  function blobUrlToAddr(s) {
    let m = s.match(/^https?:\/\/github\.com\/([^/]+)\/([^/]+)\/blob\/([^/]+)\/(.+?)(?:[?#].*)?$/i);
    if (m) return m[1] + '/' + m[2] + '@' + decodeURIComponent(m[3]) + ':' + m[4];
    m = s.match(/^https?:\/\/raw\.githubusercontent\.com\/([^/]+)\/([^/]+)\/([^/]+)\/(.+?)(?:[?#].*)?$/i);
    if (m) return m[1] + '/' + m[2] + '@' + decodeURIComponent(m[3]) + ':' + m[4];
    return null;
  }

  // Auth headers for the contents API: the stored token (skipping the 🎟
  // sentinel) so private repos and un-deployed branches resolve. The raw media
  // type is served for files 1–100 MB, where the JSON media type (v3+json)
  // returns an empty "content" field, so the contents fetches below ask for raw
  // and sniff the response; directories and errors come back as JSON regardless.
  const RAW_MEDIA = 'application/vnd.github.raw+json';
  function ghHeaders(accept) {
    const headers = { Accept: accept || 'application/vnd.github.v3+json' };
    try {
      const t = localStorage.getItem('ghToken');
      if (t && !t.includes('🎟')) headers.Authorization = 'Bearer ' + t.trim();
    } catch (e) {}
    return headers;
  }

  // Interpret a contents-API response fetched with the raw media type. The
  // Content-Type label alone cannot be trusted to say which body arrived: a
  // raw success may be echoed as text/plain OR as the raw media type itself
  // (whose name contains "+json"), and caches/proxies can mislabel either way
  // (Safari surfaces the mismatch as "The string did not match the expected
  // pattern"). So classify structurally: parse as JSON only when the label
  // suggests it, and accept the parse only if the result actually is
  // contents-API metadata (content + encoding fields); anything else is the
  // file itself. Directory listings throw; >1 MB metadata (content "") falls
  // back to the git blobs API by sha (served up to 100 MB).
  function contentsMeta(data) {
    return data && typeof data === 'object' && !Array.isArray(data) &&
      'content' in data && 'encoding' in data;
  }
  function jsonLabeled(res) {
    const ct = (res.headers.get('Content-Type') || '').toLowerCase();
    return ct.includes('json') && !ct.includes('raw');
  }
  async function readContents(res, apiBase) {
    const body = await res.text();
    if (!jsonLabeled(res)) return body;
    let data;
    try { data = JSON.parse(body); } catch (e) { return body; }
    if (Array.isArray(data)) {
      // A listing's entries carry sha+path; anything else is a raw JSON array file.
      if (!data.length || (data[0] && data[0].sha && data[0].path)) throw new Error('is a directory');
      return body;
    }
    if (!contentsMeta(data)) return body;
    if (data.content) return decodeB64(data.content);
    if (data.sha) {
      const b = await fetch(apiBase + '/git/blobs/' + data.sha, { headers: ghHeaders(RAW_MEDIA) });
      if (!b.ok) throw new Error('blob fetch: HTTP ' + b.status);
      const bBody = await b.text();
      if (jsonLabeled(b)) {
        try {
          const bd = JSON.parse(bBody);
          if (contentsMeta(bd) && bd.content) return decodeB64(bd.content);
        } catch (e) {}
      }
      return bBody;
    }
    throw new Error('empty response');
  }

  // Fetch a single repo file's text via the contents API at <ref>.
  async function ghText(owner, name, ref, filePath) {
    const apiBase = 'https://api.github.com/repos/' + owner + '/' + name;
    const res = await fetch(apiBase + '/contents/' + filePath +
      (ref ? '?ref=' + encodeURIComponent(ref) : ''), { headers: ghHeaders(RAW_MEDIA) });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return await readContents(res, apiBase);
  }

  // Inline relative script/CSS deps (a render-time mini-bake). A private repo
  // (or an un-deployed branch) isn't served by Pages or jsDelivr, and a token
  // can't ride on a plain <script src> / <link href>, so a page's own same-dir
  // deps would just 404. So fetch each *relative* <script src> and
  // <link rel=stylesheet href> through the authenticated contents API at the
  // same ref and inline it (scripts as <script>, CSS as <style>) — a page
  // written with ordinary references renders without ever being authored to
  // gh.load. Static first-level refs only: nested module imports, CSS
  // url()/@import, and images are left to <base> and a later pass. Runs only in
  // trusted address mode, and is a no-op when there are no relative deps.
  function isRelativeRef(u) {
    return !!u && !/^[a-z][a-z0-9+.-]*:/i.test(u) &&
      !u.startsWith('//') && !u.startsWith('/') && !u.startsWith('#') && !u.startsWith('data:');
  }
  function resolveRepoPath(dir, u) {
    try { return new URL(u, 'https://_/' + dir).pathname.slice(1); } catch (e) { return null; }
  }
  async function inlineRelativeDeps(text, { owner, name, ref, path }) {
    let doc;
    try { doc = new DOMParser().parseFromString(text, 'text/html'); } catch (e) { return text; }
    if (!doc || !doc.documentElement) return text;
    const dir = path.includes('/') ? path.slice(0, path.lastIndexOf('/') + 1) : '';
    const jobs = [];

    doc.querySelectorAll('script[src]').forEach(el => {
      const src = el.getAttribute('src');
      if (!isRelativeRef(src)) return;
      const p = resolveRepoPath(dir, src);
      if (!p) return;
      jobs.push((async () => {
        try {
          const code = await ghText(owner, name, ref, p);
          const s = doc.createElement('script');
          for (const a of el.attributes) if (a.name !== 'src') s.setAttribute(a.name, a.value);
          s.textContent = code;
          el.replaceWith(s);
        } catch (e) { el.setAttribute('data-inline-error', (e && e.message) || String(e)); }
      })());
    });

    doc.querySelectorAll('link[rel~="stylesheet"][href]').forEach(el => {
      const href = el.getAttribute('href');
      if (!isRelativeRef(href)) return;
      const p = resolveRepoPath(dir, href);
      if (!p) return;
      jobs.push((async () => {
        try {
          const css = await ghText(owner, name, ref, p);
          const st = doc.createElement('style');
          if (el.getAttribute('media')) st.setAttribute('media', el.getAttribute('media'));
          st.textContent = css;
          el.replaceWith(st);
        } catch (e) { el.setAttribute('data-inline-error', (e && e.message) || String(e)); }
      })());
    });

    if (!jobs.length) return text;  // nothing relative -> hand back the untouched original
    await Promise.all(jobs);
    return (doc.doctype ? '<!doctype html>\n' : '') + doc.documentElement.outerHTML;
  }

  async function showAddress(addr) {
    // <owner>/<repo>[@<ref>]:<path>[?<query>] — ':' can't appear in a git ref
    // name. The optional ?query is handed to the PAGE, not the API: the
    // srcdoc iframe has no location.search, so the params shim below answers
    // for these keys and the page's own deep links (?view=stage) work tossed.
    const m = addr.match(/^([^/@:]+)\/([^/@:]+)(?:@([^:]+))?:(.+)$/);
    if (!m) return showEmpty('Could not parse the gh address. Expected owner/repo[@ref]:path[?query], e.g. ' +
      'gh=mehrlander/web-tools@main:pages/index.html');
    let [, owner, name, ref, path] = m;
    let pageQuery = '';
    const qi = path.indexOf('?');
    if (qi !== -1) { pageQuery = path.slice(qi + 1); path = path.slice(0, qi); }
    if (!OWNERS.includes(owner)) {
      return showEmpty('Address mode renders same-origin with token access, so it only accepts ' +
        OWNERS.map(o => o + '/*').join(', ') + ' repos. For anything else, toss the file as a #gz= payload ' +
        '(sandboxed) with the 🥏 bookmarklet.');
    }
    const apiBase = 'https://api.github.com/repos/' + owner + '/' + name;
    let res;
    try {
      res = await fetch(apiBase + '/contents/' + path +
        (ref ? '?ref=' + encodeURIComponent(ref) : ''), { headers: ghHeaders(RAW_MEDIA) });
    } catch (e) {
      return showEmpty('Network error fetching ' + addr + ': ' + (e.message || e));
    }
    const at = owner + '/' + name + (ref ? '@' + ref : '') + ':' + path;
    if (!res.ok) {
      // Token-shaped failures say so and surface the token link; anything
      // else is labeled as GitHub's answer, not the viewer's credentials.
      const why = res.status === 404 ? 'not found, or the stored token lacks access (a private repo needs one)'
                : res.status === 401 ? 'the stored token was rejected (expired or revoked)'
                : res.status === 403 ? 'rate-limited or forbidden (is a token saved?)'
                : 'GitHub error ' + res.status;
      return showEmpty(at + ' — ' + why + '.', [401, 403, 404].includes(res.status));
    }
    let text;
    try {
      text = await readContents(res, apiBase);
    } catch (e) {
      if (e.message === 'is a directory') return showEmpty('That path is a directory, not a file.');
      // The fetch itself succeeded: name the stage so this never reads as a
      // token problem.
      return showEmpty(at + ' — fetched OK, but the response could not be decoded (' +
        (e.message || e) + '). A renderer decoding failure, not a token or access problem.');
    }
    // Inline the page's relative script/CSS deps from the same ref, so a
    // private/un-deployed page that uses ordinary references renders whole.
    const baked = await inlineRelativeDeps(text, { owner, name, ref, path });
    showTrusted(addressHtml(baked, { owner, name, ref, path, pageQuery }),
      'Toss · ' + name + (ref ? '@' + ref : '') + '/' + path, addr);
    setSubject({ repo: owner + '/' + name, ref: ref || 'main', path });
  }

  // Re-address in place, for the fab's "Re-toss at ref": swap the #gh= hash
  // without a navigation (replaceState fires no hashchange, so the reload
  // listener above stays quiet) and re-render. The new render re-stamps the
  // subject, so the fab re-adopts the picked ref.
  window.__tossNavigate = addr => {
    try { history.replaceState(null, '', location.pathname + location.search + '#gh=' + addr); } catch (e) {}
    showAddress(addr);
  };

  // Route a pasted string: a github blob URL -> trusted address, a bare URL ->
  // #url load, anything else -> untrusted HTML. Used by both paste paths.
  function renderInput(raw) {
    const text = (raw || '').trim();
    if (!text) return;
    const addr = blobUrlToAddr(text);
    if (addr) return showAddress(addr);
    if (/^https?:\/\/\S+$/i.test(text)) {
      try { return showUrl(text); }
      catch (e) { return showEmpty('Decoded value is not a valid http(s) URL: ' + text); }
    }
    showHtml(text);
  }

  // --- input panel wiring ---
  document.getElementById('paste-btn').addEventListener('click', async () => {
    try {
      const text = await navigator.clipboard.readText();
      if (text && text.trim()) renderInput(text);
      else showEmpty('Clipboard is empty — copy some HTML or a link first.');
    } catch (e) {
      showEmpty('Could not read the clipboard. Paste with Ctrl/Cmd-V, or use a toss link.');
    }
  });
  document.getElementById('addr-form').addEventListener('submit', e => {
    e.preventDefault();
    const v = document.getElementById('addr-input').value.trim();
    if (v) showAddress(blobUrlToAddr(v) || v);
  });
  // Desktop convenience: paste anywhere off a field renders straight away.
  window.addEventListener('paste', e => {
    const t = e.target;
    if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable)) return;
    const text = (e.clipboardData || window.clipboardData)?.getData('text/plain');
    if (text && text.trim()) { e.preventDefault(); renderInput(text); }
  });

  // Expose this page to the FAB through the x-data contract it already scans:
  // a one-line `description` and an `actions` array it renders as header
  // buttons. Both close over the render state above, so the critical render
  // path stays vanilla and instant — this only adds metadata for the toolbox.
  document.addEventListener('alpine:init', () => {
    Alpine.data('tossRender', () => ({
      description: 'Full-viewport renderer for tossed HTML, URLs, and GitHub files ' +
        '(#gz / #html / #url / #gh). Paste or use the panel to render; "Copy toss link" ' +
        'rebuilds the durable bookmark for whatever is on screen.',
      get actions() {
        const list = [];
        if (tossLinkFn) list.push({
          label: 'Copy toss link', icon: 'ph-link',
          run: async () => { await navigator.clipboard.writeText(await tossLinkFn()); return 'Copied'; }
        });
        list.push({
          label: 'New toss', icon: 'ph-plus',
          run: () => { location.href = location.pathname; }  // drop params, clean panel
        });
        return list;
      }
    }));
  });

  // --- route the initial URL ---
  // Page-sugar tosses: #<page>=<envelope-address> routes to a known renderer
  // page, fed the envelope through its own ?src=. The caller addresses the
  // CONTENT ("this chat envelope"), and toss-render stays a schema-blind
  // router: it never parses the envelope, it forwards the address to the page
  // named by the key. The map is the opt-in boundary and names each renderer's
  // repo/ref (default web-tools@main). See docs/CHAT-RESULTS.md.
  const PAGE_SUGAR = {
    'chat-results': { repo: 'mehrlander/web-tools', ref: 'main', path: 'pages/chat-results.html' },
  };
  const sugarKey = Object.keys(PAGE_SUGAR).find(k => param(k));

  const gh   = param('gh');
  const gz   = param('gz');
  const html = param('html');
  const url  = param('url') || param('u');

  if (sugarKey) {
    const s = PAGE_SUGAR[sugarKey], env = param(sugarKey).trim();
    // Desugar onto address mode: render the renderer page and hand it the
    // envelope via ?src=, which the params shim delivers to the page's own
    // location.search read. The renderer ref is the map's (the app itself);
    // any @ref inside <env> is the ENVELOPE's ref, untouched here.
    await showAddress(`${s.repo}@${s.ref}:${s.path}?src=${encodeURIComponent(env)}`);
    // Re-emit the pretty sugar form for "Copy toss link", not the desugared #gh=.
    tossLinkFn = async () => absUrl(`#${sugarKey}=${env}`);
  } else if (gh) {
    await showAddress(gh.trim());
  } else if (gz) {
    try {
      showHtml(await gunzip(b64Bytes(gz)));
    } catch (e) {
      showEmpty('Could not decode the gz parameter as base64-encoded gzip.');
    }
  } else if (html) {
    try {
      showHtml(decodeB64(html));
    } catch (e) {
      showEmpty('Could not decode the html parameter as base64.');
    }
  } else if (url) {
    let decoded;
    try {
      decoded = decodeB64(url).trim();
    } catch (e) {
      showEmpty('Could not decode the url parameter as base64.');
      decoded = null;
    }
    if (decoded) {
      try { showUrl(decoded); }
      catch (e) { showEmpty('Decoded value is not a valid http(s) URL: ' + decoded); }
    }
  } else {
    showInput();
  }
</script>

<script type="module">
  // Mount the FAB toolbox. Runs after the render logic above, and the FAB
  // self-loads its own kits, so a blocked CDN degrades to render-only rather
  // than breaking the page. ?use=<ref> pins this shell's lib chain.
  try {
    const ref = new URLSearchParams(location.search).get('use') || 'main';
    await import(`https://cdn.jsdelivr.net/gh/mehrlander/web-tools@${ref}/lib/gh-api.js`);
    await gh.load('alpineComponents/fab.js');
    await gh.load('alpine-bundle.js');
  } catch (e) {
    console.warn('FAB toolbox failed to load; rendering still works.', e);
  }
</script>

</body>
</html>
