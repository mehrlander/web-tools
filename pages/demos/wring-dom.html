<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wring | Bookend Merge — DOM Signature Grouping</title>
    <link href="https://cdn.jsdelivr.net/combine/npm/daisyui@5/themes.css,npm/daisyui@5" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/combine/npm/@tailwindcss/browser@4,npm/@phosphor-icons/web"></script>
    <script type="module">
      // ?use=<branch|tag|sha> picks which ref the kit loads from; defaults to
      // main. gh-api.js auto-bootstraps window.gh from its own import URL.
      const ref = new URLSearchParams(location.search).get('use') || 'main';
      await import(`https://cdn.jsdelivr.net/gh/mehrlander/web-tools@${ref}/lib/gh-api.js`);

      await gh.load('kits/wring.js');     // the induction engine -> window.wring
      window._gbt = window.wring;        // alias the page's Alpine code reads
      await gh.load('alpine-bundle.js');  // registers magics + boots Alpine
    </script>
</head>
<body class="bg-base-200 min-h-screen font-sans p-2">

<div x-data="groupDemo" class="max-w-6xl mx-auto flex flex-col h-[95vh] shadow-2xl bg-base-100 rounded-xl overflow-hidden">

    <!-- ── Header ─────────────────────────────────────────────────────────── -->
    <div class="p-4 bg-base-100 border-b border-base-300 shrink-0 space-y-3">
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-2">
                <i class="ph ph-tree-structure text-primary text-2xl"></i>
                <h1 class="text-lg font-black tracking-tight uppercase italic text-slate-700">
                    Wring — Bookend Merge
                </h1>
                <span class="badge badge-sm badge-ghost font-mono">Stage 1 + 3</span>
            </div>
            <button @click="inputExpanded = !inputExpanded" class="btn btn-xs btn-ghost gap-1">
                <i class="ph" :class="inputExpanded ? 'ph-caret-up' : 'ph-caret-down'"></i>
                <span x-text="inputExpanded ? 'Hide Input' : 'Edit Input'"></span>
            </button>
        </div>

        <!-- ── Collapsible Input ──────────────────────────────────────────── -->
        <div x-show="inputExpanded" x-transition class="space-y-2">
            <!-- Input mode toggle: pre-segmented strings vs. raw HTML (Stage 1) -->
            <div class="flex items-center gap-1">
                <span class="text-[10px] font-bold uppercase tracking-widest text-base-content/50 mr-1">Input</span>
                <div class="join">
                    <button class="btn btn-xs join-item" :class="inputMode === 'strings' ? 'btn-primary' : 'btn-ghost'"
                            @click="inputMode = 'strings'">Signatures</button>
                    <button class="btn btn-xs join-item" :class="inputMode === 'html' ? 'btn-primary' : 'btn-ghost'"
                            @click="inputMode = 'html'">HTML</button>
                </div>
                <span class="text-[9px] font-mono text-base-content/40 ml-2"
                      x-text="inputMode === 'html' ? 'raw HTML → extract signatures (Stage 1) → group (Stage 3)' : 'one signature per line → group (Stage 3)'"></span>
            </div>
            <textarea
                x-model="inputText"
                class="textarea textarea-bordered w-full font-mono text-[10px] leading-tight h-48 shadow-inner"
                :placeholder="inputMode === 'html' ? 'Paste raw HTML here…' : 'Paste strings here, one per line…'"
            ></textarea>
            <div class="flex items-center justify-between">
                <span class="text-[10px] font-mono text-base-content/50"
                      x-text="inputMode === 'html' ? 'HTML input' : inputText.trim().split('\\n').filter(Boolean).length + ' strings'"></span>
                <div class="flex items-center gap-1">
                    <button x-show="inputMode === 'html'" @click="loadHtmlSample()" class="btn btn-xs btn-ghost">Load HTML sample</button>
                    <button @click="loadDefaults()" class="btn btn-xs btn-ghost">Reset to defaults</button>
                </div>
            </div>
        </div>

        <!-- ── Controls ───────────────────────────────────────────────────── -->
        <div class="flex flex-wrap items-center gap-3">
            <label class="flex items-center gap-1.5 text-[10px] font-bold uppercase tracking-widest">
                Max Slots
                <input type="range" x-model.number="maxSlots" min="1" max="3" step="1" class="range range-xs range-primary w-16" />
                <span class="badge badge-sm badge-primary font-mono" x-text="maxSlots"></span>
            </label>

            <label class="flex items-center gap-1.5 text-[10px] font-bold uppercase tracking-widest">
                Min Group
                <input type="range" x-model.number="minGroupSize" min="2" max="10" step="1" class="range range-xs range-secondary w-16" />
                <span class="badge badge-sm badge-secondary font-mono" x-text="minGroupSize"></span>
            </label>

            <label class="flex items-center gap-1.5 text-[10px] font-bold uppercase tracking-widest">
                Strategy
                <select x-model="strategy" class="select select-xs select-bordered font-mono">
                    <option value="compress">compress</option>
                    <option value="specific">specific</option>
                </select>
            </label>

            <label class="flex items-center gap-1.5 text-[10px] font-bold uppercase tracking-widest cursor-pointer">
                <input type="checkbox" x-model="refineSlots" class="checkbox checkbox-xs checkbox-primary" />
                Refine Slots
            </label>

            <label class="flex items-center gap-1.5 text-[10px] font-bold uppercase tracking-widest">
                Delim
                <input type="text" x-model="delimiter" class="input input-xs input-bordered w-10 font-mono text-center" />
            </label>

            <button @click="run()" class="btn btn-primary btn-sm px-6 font-bold uppercase ml-auto">
                <i class="ph ph-play"></i> Run
            </button>
        </div>

        <!-- ── Stats Bar ──────────────────────────────────────────────────── -->
        <div class="flex flex-wrap gap-4 font-mono text-[10px] uppercase tracking-widest font-bold px-1">
            <span>Total: <span class="text-primary" x-text="totalStrings"></span></span>
            <span>Grouped: <span class="text-secondary" x-text="groupedCount"></span></span>
            <span>Ungrouped: <span class="text-base-content/50" x-text="ungrouped.length"></span></span>
            <span>Groups: <span class="text-accent" x-text="groups.length"></span></span>
            <span>Reconstruction:
                <span :class="allPass ? 'text-success' : 'text-error'"
                      x-text="allPass ? 'ALL PASS (' + recon.pass + ')' : recon.fail + ' FAILED'"></span>
            </span>
        </div>
    </div>

    <!-- ── Results ────────────────────────────────────────────────────────── -->
    <div class="flex-1 flex flex-col overflow-auto p-3 gap-2">

        <!-- Groups -->
        <template x-for="(group, gi) in groups" :key="gi">
            <div class="card bg-base-100 border border-base-300 shadow-sm">
                <div class="card-body p-3 gap-2">
                    <!-- Group header -->
                    <div @click="group.expanded = !group.expanded"
                         class="cursor-pointer flex items-start justify-between gap-2 select-none">
                        <div class="flex items-center gap-2 min-w-0">
                            <span class="badge badge-sm badge-primary font-mono shrink-0"
                                  x-text="'G' + (gi + 1)"></span>
                            <code class="text-[11px] text-primary break-all" x-text="group.template"></code>
                        </div>
                        <div class="flex items-center gap-3 shrink-0 text-[10px] uppercase tracking-widest font-bold text-base-content/60">
                            <span x-text="group.members.length + ' members'"></span>
                            <span x-text="'score ' + group.score"></span>
                            <i class="ph text-sm" :class="group.expanded ? 'ph-caret-up' : 'ph-caret-down'"></i>
                        </div>
                    </div>

                    <!-- Expanded member table -->
                    <div x-show="group.expanded" x-transition>
                        <div class="overflow-x-auto">
                            <table class="table table-xs">
                                <thead>
                                    <tr class="text-[9px] uppercase tracking-widest">
                                        <th class="w-8">#</th>
                                        <template x-for="(_, si) in group.members[0].slots" :key="si">
                                            <th x-text="group.members[0].slots.length === 1 ? 'Slot Value' : 'Slot ' + si"></th>
                                        </template>
                                        <th>Original</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template x-for="(m, mi) in group.members" :key="mi">
                                        <tr class="hover">
                                            <td class="font-mono text-[10px] text-base-content/40" x-text="mi + 1"></td>
                                            <template x-for="(s, si) in m.slots" :key="si">
                                                <td class="font-mono text-[11px] text-secondary font-bold"
                                                    x-text="s === '' ? '(empty)' : s"></td>
                                            </template>
                                            <td class="font-mono text-[9px] text-base-content/40 max-w-xs truncate"
                                                x-text="m.original"></td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </template>

        <!-- Ungrouped -->
        <template x-if="ungrouped.length > 0">
            <div class="card bg-base-200/50 border border-base-300">
                <div class="card-body p-3 gap-2">
                    <div @click="ungroupedExpanded = !ungroupedExpanded"
                         class="cursor-pointer flex items-center justify-between select-none">
                        <div class="flex items-center gap-2">
                            <span class="badge badge-sm badge-ghost font-mono">Ungrouped</span>
                            <span class="text-[10px] uppercase tracking-widest font-bold text-base-content/50"
                                  x-text="ungrouped.length + ' strings'"></span>
                        </div>
                        <i class="ph text-sm" :class="ungroupedExpanded ? 'ph-caret-up' : 'ph-caret-down'"></i>
                    </div>
                    <div x-show="ungroupedExpanded" x-transition>
                        <div class="space-y-0.5 mt-1">
                            <template x-for="(s, i) in ungrouped" :key="i">
                                <div class="font-mono text-[10px] text-base-content/50 truncate" x-text="s"></div>
                            </template>
                        </div>
                    </div>
                </div>
            </div>
        </template>

        <!-- Reconstruction failures (if any) -->
        <template x-if="recon.fail > 0">
            <div class="card bg-error/10 border border-error/30">
                <div class="card-body p-3">
                    <h3 class="text-xs font-bold text-error uppercase">Reconstruction Failures</h3>
                    <template x-for="(f, i) in recon.failures" :key="i">
                        <div class="font-mono text-[10px] space-y-0.5">
                            <div class="text-base-content">original: <span x-text="f.original"></span></div>
                            <div class="text-error">rebuilt:&nbsp; <span x-text="f.rebuilt"></span></div>
                        </div>
                    </template>
                </div>
            </div>
        </template>
    </div>

    <!-- ── Footer ─────────────────────────────────────────────────────────── -->
    <div class="px-4 py-2 border-t border-base-300 flex items-center justify-between text-[9px] font-mono text-base-content/30 uppercase tracking-widest shrink-0">
        <span>Wring — Single-document template induction</span>
        <a href="https://github.com/mehrlander/wring" class="hover:text-primary transition">github.com/mehrlander/wring</a>
    </div>
</div>

document.addEventListener('alpine:init', () => {
    Alpine.data('groupDemo', () => ({
        // ── Input ──
        inputText: DEFAULT_SIGNATURES,
        inputMode: 'strings',   // 'strings' (pre-segmented) or 'html' (Stage 1 extraction)

        // ── Options ──
        maxSlots: 1,
        minGroupSize: 2,
        strategy: 'compress',
        refineSlots: true,
        delimiter: '.',

        // ── Results ──
        groups: [],
        ungrouped: [],
        recon: { pass: 0, fail: 0, failures: [] },

        // ── UI state ──
        inputExpanded: false,
        ungroupedExpanded: false,

        // ── Computed ──
        get totalStrings() {
            return this.groupedCount + this.ungrouped.length;
        },
        get groupedCount() {
            return this.groups.reduce((s, g) => s + g.members.length, 0);
        },
        get allPass() {
            return this.recon.fail === 0 && this.recon.pass > 0;
        },

        // ── Methods ──
        init() {
            this.run();
        },

        loadDefaults() {
            this.inputMode = 'strings';
            this.inputText = DEFAULT_SIGNATURES;
            this.run();
        },

        loadHtmlSample() {
            this.inputMode = 'html';
            this.inputText = SAMPLE_HTML;
            this.delimiter = '.';   // signatures are dot-delimited
            this.run();
        },

        // Stage 1 for the DOM use case: parse HTML in-browser and emit signatures.
        extractFromHtml() {
            const doc = new DOMParser().parseFromString(this.inputText, 'text/html');
            return window._gbt.extractSignaturesFromNodes(doc.body || doc);
        },

        run() {
            const lines = this.inputMode === 'html'
                ? this.extractFromHtml()
                : this.inputText.trim().split('\n').map(s => s.trim()).filter(Boolean);
            if (lines.length === 0) {
                this.groups = [];
                this.ungrouped = [];
                this.recon = { pass: 0, fail: 0, failures: [] };
                return;
            }

            const { groupByTemplate, reconstruct } = window._gbt;

            const result = groupByTemplate(lines, {
                maxSlots: this.maxSlots,
                minGroupSize: this.minGroupSize,
                strategy: this.strategy,
                refineSlots: this.refineSlots,
                delimiter: this.delimiter,
            });

            this.groups = result.groups.map(g => ({ ...g, expanded: false }));
            this.ungrouped = result.ungrouped;

            // Verify reconstruction
            let pass = 0, fail = 0;
            const failures = [];
            for (const g of result.groups) {
                for (const m of g.members) {
                    const rebuilt = reconstruct(g.template, m.slots, this.delimiter);
                    if (rebuilt === m.original) { pass++; }
                    else { fail++; failures.push({ original: m.original, rebuilt }); }
                }
            }
            this.recon = { pass, fail, failures };
        },
    }));
});
</script>
