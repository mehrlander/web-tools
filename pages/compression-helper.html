<!doctype html>
<html lang="en" data-theme="emerald">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />

<title>Compression Helper (v5)</title>

<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🐈‍⬛</text></svg>">
<link href="https://cdn.jsdelivr.net/combine/npm/daisyui@5/themes.css,npm/daisyui@5" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/combine/npm/@tailwindcss/browser@4,npm/@phosphor-icons/web"></script>

<style>
  /* Mobile: tighten the toolbar controls. daisyUI v5's xs inputs/selects
     inherit the body's text-sm and render ~40px tall here, too chunky on a
     phone; btn-xs already sits at 24px/11px, so match the fields to it and
     close the row gaps. Desktop (>=640px) keeps daisyUI's defaults. */
  @media (max-width: 639px) {
    .compress-panel .input,
    .compress-panel .select,
    .compress-panel .btn {
      height: 1.6rem;
      min-height: 1.6rem;
      font-size: 0.6875rem;
      padding-inline: 0.4rem;
    }
    .compress-panel .select { padding-inline-end: 1.4rem; }
    .compress-panel .input { width: 5rem; }
    .compress-panel .checkbox { height: 0.9rem; width: 0.9rem; }
    .compress-panel .flex.flex-wrap { gap: 0.4rem; }
  }
</style>

<!--
  v5: same UI as v4, plus a floating action button (bottom-right) that
  opens a modal with links to the source on GitHub, the repo browser
  (show-repo) deep-linked to this file, github.dev, and jsDelivr raw.
  The FAB infers {repo, path} from location.hostname/pathname assuming
  a *.github.io/<repo>/<path> layout; override via data-repo / data-path
  on the <div x-data="fab()"> element.
-->
<script type="module">
  const REPO   = 'mehrlander/web-tools';
  const BRANCH = 'main';
  const BOOT   = `https://cdn.jsdelivr.net/gh/${REPO}@${BRANCH}/lib/gh-api.js`;

  const mod = await import(BOOT);
  window.GH = mod.default;
  const gh = new window.GH({ repo: REPO, ref: BRANCH, loadBase: 'lib/' });

  await gh.load('vanilla-bundle.js');
  await gh.load('kits/compression.js');
  await gh.load('kits/persistence.js');
  await gh.load('kits/messaging.js');
  await gh.load('kits/cm6.js');
  await gh.load('alpineComponents/compress-output.js');
  await gh.load('alpineComponents/compress-input-cm.js');
  await gh.load('alpineComponents/fab.js');
  await gh.load('alpine-bundle.js');
</script>
</head>
<body class="h-dvh font-mono text-sm">

<!--
  Layout splits at 640px. Desktop keeps the draggable divider (outHeight in px).
  Mobile foregoes the slider: the output panel takes a fixed share of the
  viewport (40dvh) and the input fills the rest, so there is no thin drag
  target to fight the host sheet's dismiss gesture. isDesktop gates the inline
  px height so the mobile dvh class isn't overridden.
-->
<div class="h-full flex flex-col p-4"
     x-data="{ outHeight: 150, resizing: false, startY: 0, startH: 0, isDesktop: window.matchMedia('(min-width: 640px)').matches }"
     x-init="window.matchMedia('(min-width: 640px)').addEventListener('change', e => isDesktop = e.matches)"
     :class="resizing && 'select-none cursor-ns-resize'"
     @pointerup.window="resizing = false"
     @pointercancel.window="resizing = false"
     @pointermove.window="if (resizing) { outHeight = Math.max(80, Math.min(startH + ($event.clientY - startY), $el.getBoundingClientRect().height - 200)) }">

  <h1 class="text-xl mb-4">Compression Helper</h1>

  <div x-data="compressOutput()" :style="isDesktop ? ('height:'+outHeight+'px') : null"
       class="compress-panel relative overflow-hidden flex-none mb-1 h-[40dvh] sm:h-auto"></div>

  <div class="h-2 bg-base-300 hover:bg-primary cursor-ns-resize rounded transition-colors flex-none touch-none hidden sm:block"
       @pointerdown.prevent="resizing = true; startY = $event.clientY; startH = outHeight; $event.target.setPointerCapture($event.pointerId)"></div>

  <div x-data="compressInputCm()" class="compress-panel relative overflow-hidden flex-1 min-h-0 mt-1"></div>
</div>

<div x-data="fab()"></div>

</body>
</html>
