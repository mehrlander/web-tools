<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shorter</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>✂️</text></svg>">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-white text-zinc-900 antialiased">
  <!--
    Standalone page: no gh.load chain, everything arrives from absolute CDN
    URLs. It still can't run from a data URL or a sandboxed iframe: web-llm
    persists model weights through the Cache API, which throws on opaque
    origins. A real https origin (github.io) plus a WebGPU browser is the
    supported combination; the boot check below names whichever is missing.
  -->
  <main class="mx-auto max-w-2xl px-5 py-10">
    <header class="mb-8 flex items-center justify-between gap-4 border-b border-zinc-200 pb-4">
      <h1 class="text-xl font-semibold">Shorter</h1>
      <div class="flex items-center gap-2 text-sm text-zinc-500" aria-live="polite">
        <span id="model-dot" class="h-2 w-2 rounded-full bg-amber-400"></span>
        <span id="model-status">Loading model…</span>
      </div>
    </header>

    <label for="source" class="mb-2 block text-sm font-medium">Text</label>
    <textarea
      id="source"
      class="min-h-44 w-full resize-y rounded-md border border-zinc-300 p-3 leading-relaxed outline-none focus:border-zinc-500"
      placeholder="Paste a paragraph here."
    ></textarea>
    <div id="source-count" class="mt-1 text-xs text-zinc-400">0 words</div>

    <div class="my-5 flex flex-wrap gap-2">
      <button id="shorten" disabled class="rounded-md bg-zinc-900 px-4 py-2 text-sm font-medium text-white disabled:cursor-not-allowed disabled:opacity-30">Shorten</button>
      <button id="another" disabled class="rounded-md border border-zinc-300 px-4 py-2 text-sm font-medium disabled:cursor-not-allowed disabled:opacity-30">Another</button>
      <button id="keep" disabled class="rounded-md border border-zinc-300 px-4 py-2 text-sm font-medium disabled:cursor-not-allowed disabled:opacity-30">Keep + shorten</button>
      <button id="copy" disabled class="rounded-md border border-zinc-300 px-4 py-2 text-sm font-medium disabled:cursor-not-allowed disabled:opacity-30">Copy</button>
    </div>

    <div id="activity" class="mb-5 min-h-5 text-sm text-zinc-500" aria-live="polite">First load downloads the model (~700 MB, cached after that). You can enter text now.</div>

    <label for="result" class="mb-2 block text-sm font-medium">Candidate</label>
    <textarea
      id="result"
      readonly
      class="min-h-44 w-full resize-y rounded-md border border-zinc-300 bg-zinc-50 p-3 leading-relaxed outline-none"
      placeholder="A shorter version will appear here."
    ></textarea>
    <div id="result-count" class="mt-1 text-xs text-zinc-400">0 words</div>
  </main>

  <script type="module">
    import { CreateMLCEngine } from "https://esm.run/@mlc-ai/web-llm@0.2.84";

    const $ = id => document.getElementById(id);
    const source = $('source');
    const result = $('result');
    const activity = $('activity');
    const modelStatus = $('model-status');
    const modelDot = $('model-dot');
    const shorten = $('shorten');
    const another = $('another');
    const keep = $('keep');
    const copy = $('copy');

    const strategies = [
      'remove repetition and explanation',
      'compress the syntax and combine related clauses',
      'use plainer, more direct wording',
      'restructure the passage rather than merely deleting words',
      'preserve the voice while cutting every expendable word',
      'make the central point arrive sooner'
    ];

    let engine;
    let loading;
    let generating = false;
    let variants = [];
    let turn = 0;

    const words = text => text.trim() ? text.trim().split(/\s+/).length : 0;

    function counts() {
      $('source-count').textContent = `${words(source.value)} words`;
      $('result-count').textContent = `${words(result.value)} words`;
    }

    function updateButtons() {
      shorten.disabled = !engine || generating || !source.value.trim();
      another.disabled = generating || !result.value;
      keep.disabled = generating || !result.value;
      copy.disabled = generating || !result.value;
    }

    // The q4f16 build needs the shader-f16 GPU feature; fall back to the
    // f32 weights (larger, slower, same model) where the adapter lacks it.
    async function pickModel() {
      if (!('gpu' in navigator)) throw new Error('This browser has no WebGPU. Try current Chrome or Edge on desktop, or Safari 26+.');
      if (!('caches' in window)) throw new Error('The Cache API is unavailable here (data URLs and sandboxed frames have opaque origins), so the model cannot be stored. Open the page from its https URL.');
      const adapter = await navigator.gpu.requestAdapter();
      if (!adapter) throw new Error('WebGPU is present but no GPU adapter was found.');
      return adapter.features.has('shader-f16')
        ? 'Llama-3.2-1B-Instruct-q4f16_1-MLC'
        : 'Llama-3.2-1B-Instruct-q4f32_1-MLC';
    }

    async function loadModel() {
      if (engine) return engine;
      if (loading) return loading;

      loading = pickModel().then(model => CreateMLCEngine(model, {
        initProgressCallback: p => {
          const percent = Math.round((p.progress || 0) * 100);
          modelStatus.textContent = `Loading model ${percent}%`;
        }
      })).then(value => {
        engine = value;
        modelStatus.textContent = 'Model ready';
        modelDot.className = 'h-2 w-2 rounded-full bg-emerald-500';
        activity.textContent = 'Ready.';
        updateButtons();
        return value;
      }).catch(error => {
        modelStatus.textContent = 'Model failed to load';
        modelDot.className = 'h-2 w-2 rounded-full bg-red-500';
        activity.textContent = error.message;
        throw error;
      }).finally(() => loading = null);

      return loading;
    }

    async function rewrite() {
      const text = source.value.trim();
      if (!text || !engine || generating) return;

      generating = true;
      result.value = '';
      counts();
      updateButtons();

      try {
        const strategy = strategies[turn++ % strategies.length];
        const earlier = variants.slice(-5).map((v, i) => `${i + 1}. ${v}`).join('\n');
        const limit = Math.max(1, words(text) - 1);

        activity.textContent = `Editing: ${strategy}…`;

        const chunks = await engine.chat.completions.create({
          messages: [
            {
              role: 'system',
              content: 'You are a severe but faithful editor. Preserve meaning, stance, factual qualifications, and voice. Add nothing. Return only the rewritten passage, with no explanation, label, or quotation marks.'
            },
            {
              role: 'user',
              content: `Rewrite the passage in no more than ${limit} words.\nApproach: ${strategy}.\n\nPassage:\n${text}${earlier ? `\n\nDo not repeat these earlier rewrites:\n${earlier}` : ''}`
            }
          ],
          temperature: 0.85,
          max_tokens: 250,
          stream: true
        });

        let reply = '';
        for await (const chunk of chunks) {
          reply += chunk.choices[0]?.delta?.content || '';
          result.value = reply.trimStart();
          counts();
        }

        result.value = reply.trim();
        variants.push(result.value);
        activity.textContent = `${words(text)} → ${words(result.value)} words · ${strategy}`;
      } catch (error) {
        activity.textContent = `Error: ${error.message}`;
      } finally {
        generating = false;
        counts();
        updateButtons();
      }
    }

    shorten.onclick = rewrite;
    another.onclick = rewrite;
    keep.onclick = () => {
      source.value = result.value;
      result.value = '';
      variants = [];
      turn = 0;
      counts();
      updateButtons();
      rewrite();
    };
    copy.onclick = async () => {
      try {
        await navigator.clipboard.writeText(result.value);
        activity.textContent = 'Copied.';
      } catch {
        result.select();
        activity.textContent = 'Clipboard blocked; text selected, copy manually.';
      }
    };
    source.oninput = () => {
      result.value = '';
      variants = [];
      turn = 0;
      counts();
      updateButtons();
    };

    counts();
    updateButtons();
    loadModel().catch(() => {});
  </script>
</body>
</html>
