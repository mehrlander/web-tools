<!DOCTYPE html>
<html data-theme="emerald">
<head>
  <base href="." target="_blank">
  <title>Data Shelf</title>
  <script src="https://cdn.jsdelivr.net/combine/npm/@tailwindcss/browser@4,npm/@phosphor-icons/web,npm/clipboard,npm/dexie"></script>
  <link href="https://cdn.jsdelivr.net/combine/npm/daisyui@5/themes.css,npm/daisyui@5" rel="stylesheet" />
  <script src="https://unpkg.com/alpinejs" defer></script>
</head>

<body class="h-screen overflow-hidden bg-base-200/50" x-data="appData">
  <div class="flex h-screen">
    <div class="w-80 h-full border-r border-base-300 flex flex-col bg-base-100 shrink-0">
      <div class="p-4 pb-2 border-b border-base-300 flex justify-between items-center">
        <h2 class="text-xl font-semibold text-primary/80" x-text="appContext"></h2>
        <button @click="editItem()" class="btn btn-ghost btn-sm btn-circle"><i class="ph ph-plus"></i></button>
      </div>

      <div class="flex-1 overflow-y-auto p-2">
        <template x-for="item in items" :key="item.id">
          <div @click="selectItem(item)" 
               class="flex items-center justify-between mb-1 px-2 py-1 rounded-lg cursor-pointer transition-colors group"
               :class="selectedItem?.id === item.id ? 'bg-primary/10 text-primary' : 'hover:bg-base-200'">
            <div class="flex items-center gap-2 min-w-0">
              <span class="badge badge-soft badge-xs !w-8 shrink-0" :class="cfg.types[item.type].badge" x-text="item.type"></span>
              <span class="truncate text-sm font-medium" x-text="item.name"></span>
              <span x-show="item.autorun" class="text-primary font-bold">»</span>
            </div>
            <div class="flex opacity-0 group-hover:opacity-100 transition-opacity">
              <button @click.stop="executeItem(item)" class="btn btn-ghost btn-xs btn-circle" :disabled="!cfg.types[item.type].exec">
                <i class="ph ph-play"></i>
              </button>
            </div>
          </div>
        </template>
      </div>
    </div>

    <div class="flex-1 h-full bg-base-100 flex flex-col overflow-hidden">
      <template x-if="selectedItem">
        <div class="flex flex-col h-full">
          <div class="navbar bg-base-100 border-b border-base-300 px-4 min-h-12 shrink-0">
            <div class="flex-1 gap-3">
              <h3 class="font-bold" x-text="selectedItem.name"></h3>
              <span class="badge badge-outline badge-sm uppercase opacity-50" x-text="selectedItem.type"></span>
            </div>
            <div class="flex-none gap-2">
              <button @click="executeItem(selectedItem)" class="btn btn-ghost btn-sm gap-2" x-show="canExecute(selectedItem.type)">
                <i class="ph ph-play text-primary"></i> Run
              </button>
              <button @click="copyItemCode(selectedItem)" class="btn btn-ghost btn-sm btn-square">
                <i class="ph text-lg" :class="copiedId === selectedItem.id ? 'ph-check text-success' : 'ph-copy'"></i>
              </button>
              <button @click="editItem(selectedItem)" class="btn btn-primary btn-sm gap-2 px-4">
                <i class="ph ph-pencil"></i> Edit
              </button>
            </div>
          </div>
          <div class="flex-1 relative bg-base-200/30">
            <div id="jse-container" class="absolute inset-0"></div>
          </div>
        </div>
      </template>

      <template x-if="!selectedItem">
        <div class="flex-1 flex items-center justify-center text-base-content/30 italic">
          Select an item to view data
        </div>
      </template>
    </div>
  </div>

  <dialog x-ref="editorModal" class="modal modal-bottom sm:modal-middle backdrop-blur-md" @close="closeModal()">
    <div class="modal-box w-11/12 max-w-4xl h-[92vh] flex flex-col p-0 overflow-hidden border border-base-300 bg-base-100 shadow-2xl">
      <div class="navbar bg-base-200/50 border-b border-base-300 px-3 min-h-12 shrink-0 gap-2">
        <div class="flex-none text-primary"><i class="ph-fill ph-pencil-circle text-2xl"></i></div>
        <div class="flex-1">
          <input type="text" x-model="editingItem.name" placeholder="Unnamed Script..." 
                 class="input input-ghost input-sm w-full font-bold text-base focus:bg-base-100 focus:outline-none p-0" />
        </div>
        <div class="flex-none flex items-center gap-1">
          <select x-model="editingItem.type" class="select select-ghost select-xs font-bold opacity-70 w-20 px-1 border-none focus:bg-base-100 focus:ring-0 appearance-none">
            <template x-for="[key, label] in Object.entries(typeLabels)" :key="key">
              <option :value="key" x-text="key.toUpperCase()"></option>
            </template>
          </select>
          <div class="divider divider-horizontal mx-1 h-6 opacity-20"></div>
          <div class="flex items-center gap-2">
            <button @click="editorCancel()" class="btn btn-ghost btn-sm h-8 min-h-8 px-3 text-xs font-medium opacity-60 hover:opacity-100 lowercase">cancel</button>
            <button @click="editorSave()" class="btn btn-primary btn-sm h-8 min-h-8 px-4 shadow-sm gap-2" :disabled="!editingItem.name?.trim()">
              <i class="ph ph-floppy-disk"></i> Save
            </button>
          </div>
        </div>
      </div>

      <div class="flex items-center gap-4 px-4 py-2 bg-base-100 border-b border-base-200 shrink-0">
        <div class="flex items-center gap-2 flex-1">
          <span class="text-[9px] font-black uppercase opacity-30 tracking-widest">Tags</span>
          <input type="text" x-model="editingItem.tags" placeholder="Add tags..." class="input input-xs bg-transparent border-none focus:ring-0 w-full p-0 text-xs" />
        </div>
        <div class="flex items-center gap-2 flex-[2] border-x border-base-200 px-4">
          <span class="text-[9px] font-black uppercase opacity-30 tracking-widest">Notes</span>
          <input type="text" x-model="editingItem.notes" placeholder="Short description..." class="input input-xs bg-transparent border-none focus:ring-0 w-full p-0 text-xs" />
        </div>
        <div class="flex items-center gap-4">
          <label class="flex items-center gap-2 cursor-pointer group" x-show="canExecute(editingItem.type)">
            <span class="text-[9px] font-black uppercase opacity-30 group-hover:opacity-60 transition-opacity">Autorun</span>
            <input type="checkbox" x-model="editingItem.autorun" class="toggle toggle-primary toggle-xs" />
          </label>
          <button x-show="editingItem.id" @click="editorDelete()" class="btn btn-ghost btn-xs text-error/40 hover:text-error"><i class="ph ph-trash"></i></button>
        </div>
      </div>

      <div class="flex-1 relative bg-base-100">
        <textarea x-model="editingItem.code" class="absolute inset-0 w-full h-full px-6 py-4 font-mono text-[13px] bg-transparent border-none outline-none focus:ring-0 resize-none leading-relaxed" spellcheck="false" @keydown.f5.prevent="editorRunCode()"></textarea>
      </div>
    </div>
  </dialog>

  <script>
    document.addEventListener('alpine:init', () => {
      Alpine.data('appData', () => ({
        items: [],
        selectedItem: null,
        editingItem: { name: '', type: 'js', tags: '', notes: '', autorun: false, code: '' },
        editorErrors: [],
        editorSuccess: '',
        copiedId: null,
        jse: null,
        activeTab: 0,
        appContext: 'Global Context',
        db: null,
        cfg: {
          types: {
            js: { label: 'JavaScript', badge: 'btn-primary', exec: true },
            html: { label: 'HTML', badge: 'btn-secondary', exec: true },
            json: { label: 'JSON', badge: 'btn-accent', exec: true },
            text: { label: 'Text', badge: 'btn-neutral', exec: false }
          }
        },
        ext: { tabs: [] },
        get typeLabels() {
          return Object.fromEntries(Object.entries(this.cfg.types).map(([k, v]) => [k, v.label]));
        },
        async init() {
          this.appContext = this.getAppContext();
          this.db = new Dexie('DataShelfDB');
          this.db.version(3).stores({ items: '++id, name, context, type, code, autorun, *tags, notes' });
          await this.db.open();
          await this.loadItems();
        },
        getAppContext() {
          try {
            const paramCtx = new URLSearchParams(window.location.search).get('ctx');
            if (paramCtx) return paramCtx;
            if (window.opener && window.opener.location.protocol === 'file:') {
              const loc = window.opener.location;
              return loc.pathname.split('/').pop() || loc.pathname;
            }
          } catch (e) {}
          return 'Global Context'; 
        },
        async loadItems() {
          this.items = this.appContext === 'Global Context' 
            ? await this.db.items.orderBy('name').toArray()
            : await this.db.items.where('context').equals(this.appContext).sortBy('name');
          
          if (this.items.length && !this.selectedItem) {
            this.selectItem(this.items[0]);
          }
        },
        async selectItem(item) {
          this.selectedItem = item;
          await Alpine.nextTick();
          if (!this.jse) {
            const { createJSONEditor } = await import('https://unpkg.com/vanilla-jsoneditor/standalone.js');
            this.jse = createJSONEditor({
              target: document.getElementById('jse-container'),
              props: { 
                mode: 'tree', 
                readOnly: true,
                mainMenuBar: false,
                navigationBar: false
              }
            });
          }
          this.jse.set({ json: item });
        },
        executeItem(item) {
          const target = window.opener || window;
          try {
            ({
              js: () => new target.Function(item.code)(),
              html: () => { const w = target.open('', '_blank', 'width=600,height=400'); w.document.write(item.code); w.document.close(); },
              json: () => target[item.name] = JSON.parse(item.code)
            }[item.type]?.());
          } catch (e) { console.error(e); }
        },
        editItem(item = null) {
          this.editorErrors = [];
          this.editorSuccess = '';
          this.editingItem = item ? {...item, tags: Array.isArray(item.tags) ? item.tags.join(', ') : item.tags || ''} : 
            { name: '', type: 'js', autorun: false, tags: '', notes: '', code: '' };
          this.$refs.editorModal.showModal();
        },
        copyItemCode(item) {
          const btn = document.createElement('button');
          new ClipboardJS(btn, { text: () => item.code }).on('success', () => {
            this.copiedId = item.id;
            setTimeout(() => this.copiedId = null, 1000);
          });
          btn.click();
        },
        closeModal() {
          this.editorErrors = [];
          this.editorSuccess = '';
        },
        async editorSave() {
          try {
            const itemToSave = {
              ...this.editingItem,
              context: this.appContext,
              tags: this.editingItem.tags ? this.editingItem.tags.split(',').map(t => t.trim()).filter(Boolean) : []
            };
            if (itemToSave.id) await this.db.items.put(itemToSave);
            else { delete itemToSave.id; await this.db.items.add(itemToSave); }
            await this.loadItems();
            this.selectItem(itemToSave.id ? itemToSave : this.items[this.items.length-1]);
            this.$refs.editorModal.close();
          } catch (error) { console.error(error); }
        },
        async editorDelete() {
          if (!confirm('Delete this item?')) return;
          await this.db.items.delete(this.editingItem.id);
          this.selectedItem = null;
          await this.loadItems();
          this.$refs.editorModal.close();
        },
        editorCancel() { this.$refs.editorModal.close(); },
        editorRunCode() { this.executeItem({...this.editingItem}); },
        canExecute(type) { return this.cfg.types[type]?.exec; }
      }));
    });
  </script>
</body>
</html>
