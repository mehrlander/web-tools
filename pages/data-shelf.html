<!DOCTYPE html>
<html data-theme="emerald">
<head>
  <title>Data Shelf</title>
  <script src="https://cdn.jsdelivr.net/combine/npm/@tailwindcss/browser@4,npm/@phosphor-icons/web,npm/clipboard,npm/dexie"></script>
  <link href="https://cdn.jsdelivr.net/combine/npm/daisyui@5/themes.css,npm/daisyui@5" rel="stylesheet" />
  <script src="https://unpkg.com/alpinejs" defer></script>
</head>

<body class="h-screen overflow-hidden bg-base-200/50" x-data="appData">
  <div class="flex h-screen">
    <div class="w-80 h-full border-r border-base-300 flex flex-col bg-base-100">
      <div class="p-4 pb-2 border-b border-base-300">
        <h2 class="text-xl font-semibold text-primary/80" x-text="window.opener?.location?.hostname || 'Data Jar'"></h2>
      </div>

      <div class="flex-1 overflow-y-auto p-2">
        <template x-for="item in items" :key="item.id">
          <div class="flex items-center justify-between mb-1">
            <div class="flex items-center gap-2 min-w-0">
              <span class="badge badge-soft badge-xs !w-8" :class="cfg.types[item.type].badge" x-text="item.type"></span>
              <button @click="executeItem(item)" class="btn btn-ghost btn-sm !px-1 truncate">
                <span class="truncate" x-text="item.name"></span>
                <span x-show="item.autorun" class="text-primary font-bold ml-1">»</span>
              </button>
            </div>
            <div class="flex">
              <template x-for="icon in ['pencil', 'play', copiedId === item.id ? 'check' : 'copy']">
                <button @click="icon === 'pencil' ? editItem(item) : icon === 'play' ? executeItem(item) : copyItemCode(item)" 
                        class="btn btn-ghost btn-sm btn-circle !p-1" 
                        :title="icon + ' item'"
                        :disabled="icon === 'play' && !cfg.types[item.type].exec">
                  <i class="ph text-lg" :class="'ph-' + icon"></i>
                </button>
              </template>
            </div>
          </div>
        </template>

        <div x-show="!items.length" class="text-center py-8 text-base-content/60">
          <i class="ph ph-plus-circle text-4xl mb-2 block"></i>
          <p>No items yet</p>
          <p class="text-sm">Add your first item below</p>
        </div>
      </div>

      <div class="p-4 border-t border-base-300">
        <button @click="editItem()" class="btn btn-primary w-full gap-2 normal-case">
          <i class="ph ph-plus text-lg"></i> Add Item
        </button>
      </div>
    </div>

    <div class="flex-1 h-full bg-base-100 flex flex-col">
      <div class="border-b border-base-300 p-2">
        <div class="tabs tabs-boxed bg-base-100">
          <template x-for="(tab, i) in ext.tabs" :key="tab.id || i">
            <button @click="activeTab = i" 
                    class="tab gap-2" 
                    :class="activeTab === i && 'tab-active'"
                    x-html="tab.icon ? `<i class='${tab.icon}'></i> ${tab.name}` : tab.name">
            </button>
          </template>
        </div>
      </div>

      <div class="flex-1 overflow-hidden">
        <template x-for="(tab, i) in ext.tabs" :key="tab.id || i">
          <div x-show="activeTab === i" class="h-full" x-html="tab.content?.call($data)"></div>
        </template>
      </div>
    </div>
  </div>

  <div x-show="editingItem" 
       style="display: none;"
       class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center"
       @click.self="editorCancel">
    <div class="bg-base-100 w-full h-full max-w-5xl max-h-[90vh] rounded-lg shadow-2xl flex flex-col">
      <div class="flex justify-between items-center p-6 border-b border-base-300 shrink-0">
        <div class="flex items-center gap-4">
          <h1 class="text-2xl font-bold" x-text="editingItem?.id ? 'Edit Item' : 'Add New Item'"></h1>
          <button class="btn btn-ghost btn-sm gap-2" @click="editorRunCode()" title="Test run this code" x-show="editingItem && canExecute(editingItem.type)">
            <i class="ph ph-play-circle text-lg"></i>
            Test Run
          </button>
        </div>
        <div class="flex gap-3">
          <button class="btn btn-ghost" @click="editorCancel()">Cancel</button>
          <button class="btn btn-primary" @click="editorSave()" :disabled="!editingItem?.name?.trim()">
            <i class="ph ph-floppy-disk"></i>
            Save
          </button>
          <template x-if="editingItem?.id">
            <button class="btn btn-error" @click="editorDelete()">
              <i class="ph ph-trash"></i>
              Delete
            </button>
          </template>
        </div>
      </div>

      <div class="flex-1 overflow-y-auto p-6">
        <div x-show="editorErrors.length > 0" class="alert alert-error mb-6">
          <i class="ph ph-warning-circle text-xl"></i>
          <div>
            <h3 class="font-bold">Please fix the following errors:</h3>
            <ul class="list-disc list-inside text-sm mt-2">
              <template x-for="error in editorErrors" :key="error">
                <li x-text="error"></li>
              </template>
            </ul>
          </div>
        </div>

        <div x-show="editorSuccess" class="alert alert-success mb-6">
          <i class="ph ph-check-circle text-xl"></i>
          <span x-text="editorSuccess"></span>
        </div>

        <template x-if="editingItem">
          <div class="max-w-3xl mx-auto">
            <div class="form-control mb-6">
              <label class="label">
                <span class="label-text text-base font-semibold">Item Name <span class="text-error">*</span></span>
              </label>
              <input type="text" x-model="editingItem.name" class="input input-bordered w-full" :class="editorErrors.some(e => e.includes('name')) && 'input-error'" placeholder="Enter a descriptive name for this item">
            </div>

            <div class="flex items-center gap-4 mb-6">
              <div class="dropdown dropdown-bottom">
                <div tabindex="0" role="button" class="btn btn-outline justify-between min-w-40">
                  <span x-text="typeLabels[editingItem.type] || editingItem.type"></span>
                  <i class="ph ph-caret-down"></i>
                </div>
                <ul tabindex="0" class="dropdown-content menu bg-base-100 rounded-box z-[1] w-full p-2 shadow-lg border border-base-300">
                  <template x-for="[key, label] in Object.entries(typeLabels)" :key="key">
                    <li><a @click="editingItem.type = key" x-text="label"></a></li>
                  </template>
                </ul>
              </div>

              <label class="label cursor-pointer gap-3" x-show="canExecute(editingItem.type)">
                <input type="checkbox" x-model="editingItem.autorun" class="checkbox checkbox-primary">
                <div class="flex items-center gap-2">
                  <span class="text-primary font-bold text-lg">»</span>
                  <span class="text-base">Autorun on load</span>
                </div>
              </label>
            </div>

            <div class="form-control mb-6">
              <label class="label">
                <span class="label-text text-base font-semibold">Tags</span>
                <span class="label-text-alt">Comma-separated keywords</span>
              </label>
              <input type="text" x-model="editingItem.tags" class="input input-bordered w-full" placeholder="tag1, tag2, category">
            </div>

            <div class="form-control mb-6">
              <label class="label">
                <span class="label-text text-base font-semibold">Notes</span>
                <span class="label-text-alt">Optional description or documentation</span>
              </label>
              <textarea x-model="editingItem.notes" class="textarea textarea-bordered !w-full h-24 resize-none" placeholder="Add any notes, documentation, or comments about this item"></textarea>
            </div>

            <div class="form-control mb-6">
              <label class="label">
                <span class="label-text text-base font-semibold">Code <span class="text-error">*</span></span>
                <span class="label-text-alt">Press F5 to test run • Use Ctrl+A to select all</span>
              </label>
              <textarea x-model="editingItem.code" class="textarea textarea-bordered !w-full h-80 font-mono text-sm resize-none" :class="editorErrors.some(e => e.includes('code')) && 'textarea-error'" :placeholder="getPlaceholderText(editingItem.type)" @keydown.f5.prevent="editorRunCode()"></textarea>
            </div>
          </div>
        </template>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('alpine:init', () => {
      Alpine.data('appData', () => ({
        items: [],
        editingItem: null,
        editorErrors: [],
        editorSuccess: '',
        copiedId: null,
        activeTab: 0,
        db: null,
        
        cfg: {
          types: {
            js: { label: 'JavaScript', badge: 'btn-primary', exec: true },
            html: { label: 'HTML', badge: 'btn-secondary', exec: true },
            json: { label: 'JSON', badge: 'btn-accent', exec: true },
            text: { label: 'Text', badge: 'btn-neutral', exec: false }
          }
        },
        
        ext: { tabs: [] },
        
        get typeLabels() {
          return Object.fromEntries(Object.entries(this.cfg.types).map(([k, v]) => [k, v.label]));
        },
        
        async init() {
          this.db = new Dexie('DataJarDB');
          this.db.version(2).stores({ items: '++id, name, type, code, autorun, *tags, notes' });
          await this.db.open();
          
          await Promise.all([
            this.loadItems(),
            this.loadExtensions('AppTabs', 'tabs')
          ]);
        },
        
        async loadExtensions(folder, target) {
          try {
            const res = await fetch(`https://api.github.com/repos/mehrlander/WebTools/contents/${folder}`);
            if (!res.ok) return;
            
            const files = await res.json();
            await Promise.all(files.filter(f => f.name.endsWith('.js')).map(async f => {
              try {
                const code = await (await fetch(f.download_url)).text();
                const config = eval(`(${code})`);
                if (config) {
                  this.ext[target].push(config);
                  config.init?.call(this);
                }
              } catch (e) { console.error(`Failed loading ${f.name}:`, e.message); }
            }));
          } catch (e) { console.warn(`GitHub access error for ${folder}`); }
        },
        
        async loadItems() {
          this.items = await this.db.items.orderBy('name').toArray();
          this.items.filter(i => i.autorun && this.cfg.types[i.type]?.exec).forEach(i => this.executeItem(i));
        },
        
        executeItem(item) {
          const target = window.opener || window;
          try {
            ({
              js: () => new target.Function(item.code)(),
              html: () => { const w = target.open('', '_blank', 'width=600,height=400'); w.document.write(item.code); w.document.close(); },
              json: () => target[item.name] = JSON.parse(item.code)
            }[item.type]?.());
          } catch (e) { console.error(`Error in ${item.name}:`, e.message); }
        },
        
        editItem(item = null) {
          this.editorErrors = [];
          this.editorSuccess = '';
          this.editingItem = item ? {...item, tags: Array.isArray(item.tags) ? item.tags.join(', ') : ''} : 
            { name: '', type: 'js', autorun: false, tags: '', notes: '', code: '' };
        },
        
        copyItemCode(item) {
          const btn = document.createElement('button');
          new ClipboardJS(btn, { text: () => item.code }).on('success', () => {
            this.copiedId = item.id;
            setTimeout(() => this.copiedId = null, 1000);
          });
          btn.click();
        },

        // --- Inline Editor Logic ---

        closeModal() {
          this.editingItem = null;
          this.editorErrors = [];
          this.editorSuccess = '';
        },

        async editorSave() {
          try {
            this.editorErrors = [];
            this.editorSuccess = '';
            
            const errors = this.editorValidateItem(this.editingItem);
            if (errors.length > 0) {
              this.editorErrors = errors;
              return;
            }
            
            const itemToSave = {
              ...this.editingItem,
              tags: this.editingItem.tags ? this.editingItem.tags.split(',').map(t => t.trim()).filter(Boolean) : []
            };
            
            if (itemToSave.id) {
              await this.db.items.put(itemToSave);
              this.editorSuccess = 'Item updated successfully!';
            } else {
              delete itemToSave.id; 
              await this.db.items.add(itemToSave);
              this.editorSuccess = 'Item created successfully!';
            }
            
            await this.loadItems();
            setTimeout(() => this.closeModal(), 1000);
            
          } catch (error) {
            console.error('Error saving item:', error);
            this.editorErrors = [`Save failed: ${error.message}`];
          }
        },

        async editorDelete() {
          if (!this.editingItem?.id) return;
          if (!confirm(`Are you sure you want to delete "${this.editingItem.name}"?\n\nThis action cannot be undone.`)) return;
          
          try {
            await this.db.items.delete(this.editingItem.id);
            await this.loadItems();
            this.closeModal();
          } catch (error) {
            console.error('Error deleting item:', error);
            this.editorErrors = [`Delete failed: ${error.message}`];
          }
        },

        editorCancel() {
          const hasChanges = this.editingItem && (this.editingItem.name || this.editingItem.code || this.editingItem.notes || this.editingItem.tags);
          if (hasChanges && !confirm('You have unsaved changes. Are you sure you want to cancel?')) return;
          this.closeModal();
        },

        editorRunCode() {
          if (!this.editingItem) return;
          try {
            this.executeItem({...this.editingItem});
          } catch (error) {
            alert(`Test run failed: ${error.message}`);
          }
        },

        editorValidateItem(item) {
          const errors = [];
          if (!item.name || !item.name.trim()) errors.push('Item name is required');
          if (!item.code || !item.code.trim()) errors.push('Code content is required');
          if (!item.type || !this.cfg.types[item.type]) errors.push('Valid item type is required');
          
          if (item.type === 'js' && item.code) {
            try { new Function(item.code); } catch (e) { errors.push(`JavaScript syntax error: ${e.message}`); }
          }
          if (item.type === 'json' && item.code) {
            try { JSON.parse(item.code); } catch (e) { errors.push(`Invalid JSON: ${e.message}`); }
          }
          
          if (!item.id && this.items.some(existingItem => existingItem.name === item.name.trim())) {
            errors.push('An item with this name already exists');
          }
          if (item.id && this.items.some(existingItem => existingItem.id !== item.id && existingItem.name === item.name.trim())) {
            errors.push('An item with this name already exists');
          }
          return errors;
        },

        canExecute(type) { return this.cfg.types[type]?.exec; },
        getPlaceholderText(type) { return `Enter ${this.cfg.types[type]?.label || 'code'}...`; }
      }));
    });
  </script>
</body>
</html>
