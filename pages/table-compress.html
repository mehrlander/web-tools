<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transform</title>
<link href="https://cdn.jsdelivr.net/combine/npm/daisyui@5/themes.css,npm/daisyui@5" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/combine/npm/@tailwindcss/browser@4,npm/@phosphor-icons/web,npm/papaparse"></script>
<script defer src="https://unpkg.com/alpinejs/dist/cdn.min.js"></script>
</head>
<body class="bg-base-100 min-h-screen p-6" x-data="app()" x-init="init()">

<div class="w-full space-y-4">

  <div class="flex items-baseline justify-between">
    <h1 class="text-xl font-bold tracking-tight">Transform</h1>
    <span class="text-base-content/40 text-xs">paste → transform → export</span>
  </div>

  <!-- Paste zone -->
  <div class="card bg-base-100 shadow-sm">
    <div class="card-body p-4">
      <div
        class="border-2 border-dashed border-base-300 rounded-lg p-8 text-center text-sm cursor-pointer transition-colors"
        :class="rawRows.length ? 'border-success/40 bg-success/5 text-success' : 'text-base-content/40 hover:border-base-content/20'"
        @paste.prevent="onPaste($event)"
        tabindex="0"
      >
        <template x-if="!rawRows.length">
          <div class="flex flex-col items-center gap-2">
            <i class="ph-bold ph-clipboard-text text-3xl"></i>
            <span>Click here and paste TSV, gz base64, or bundle JSON</span>
          </div>
        </template>
        <template x-if="rawRows.length">
          <div class="flex items-center justify-center gap-2">
            <i class="ph-bold ph-check-circle text-xl"></i>
            <span x-text="`${rawRows.length} rows × ${columns.length} columns`"></span>
            <button class="btn btn-xs btn-ghost text-base-content/40 ml-2" @click.stop="reset()">
              <i class="ph-bold ph-x"></i>
            </button>
          </div>
        </template>
      </div>
    </div>
  </div>

  <!-- Transform function -->
  <div class="card bg-base-100 shadow-sm">
    <div class="card-body p-4 space-y-3">
      <div class="flex items-center justify-between">
        <span class="font-semibold text-sm">Transform function</span>
        <div class="flex items-center gap-4">
          <label class="flex items-center gap-2 text-sm cursor-pointer">
            <input type="checkbox" class="checkbox checkbox-sm" x-model="trimAll">
            <span>Trim values</span>
          </label>
          <label class="flex items-center gap-2 text-sm cursor-pointer">
            <input type="checkbox" class="checkbox checkbox-sm" x-model="rollup">
            <span>Roll up Amount</span>
          </label>
          <label class="flex items-center gap-2 text-sm cursor-pointer">
            <input type="checkbox" class="checkbox checkbox-sm" x-model="includeFn">
            <span>Include function</span>
          </label>
        </div>
      </div>

      <div class="text-xs text-base-content/40 font-mono">
        rows =&gt; &nbsp;<span class="text-base-content/50">array of row objects in, transformed array out</span>
      </div>

      <textarea
        class="textarea textarea-bordered font-mono text-xs w-full leading-relaxed resize-y"
        rows="16"
        x-model="fnSrc"
        spellcheck="false"
      ></textarea>

      <template x-if="fnError">
        <div class="text-error text-xs flex items-center gap-1">
          <i class="ph-bold ph-warning-circle"></i>
          <span x-text="fnError"></span>
        </div>
      </template>

      <div class="flex items-center justify-between pt-1">
        <div x-show="result.ran" class="text-xs text-base-content/40">
          <template x-if="result.beforeCount !== result.afterCount">
            <span x-text="`${result.beforeCount} → ${result.afterCount} rows (rolled up)`"></span>
          </template>
          <template x-if="result.beforeCount === result.afterCount">
            <span x-text="`${result.afterCount} rows`"></span>
          </template>
        </div>
        <button class="btn btn-sm btn-primary ml-auto" :disabled="!rawRows.length" @click="run()">
          <i class="ph-bold ph-play"></i> Run
        </button>
      </div>
    </div>
  </div>

  <!-- Output -->
  <div x-show="result.ran" class="card bg-base-100 shadow-sm">
    <div class="card-body p-4 space-y-3">

      <div class="flex items-center gap-2 flex-wrap">
        <div class="join">
          <template x-for="v in views" :key="v.key">
            <button
              class="join-item btn btn-sm"
              :class="activeView === v.key ? 'btn-neutral' : 'btn-ghost'"
              @click="activeView = v.key"
            >
              <span x-text="v.label"></span>
              <span class="badge badge-xs ml-1 opacity-60" x-text="result.sizes[v.key] ?? '…'"></span>
            </button>
          </template>
        </div>
        <div class="ml-auto flex gap-2">
          <button class="btn btn-sm btn-ghost" @click="copy()" :class="copied ? 'text-success' : ''">
            <i class="ph-bold" :class="copied ? 'ph-check' : 'ph-copy'"></i>
            <span x-text="copied ? 'Copied' : 'Copy'"></span>
          </button>
          <button class="btn btn-sm btn-ghost" @click="download()">
            <i class="ph-bold ph-download"></i> Download
          </button>
        </div>
      </div>

      <pre class="bg-base-200 rounded-lg p-4 text-xs overflow-auto max-h-96 leading-relaxed whitespace-pre-wrap break-all" x-text="previewText"></pre>

    </div>
  </div>

</div>

<script>
function app() {
  return {
    rawRows: [],
    columns: [],
    trimAll: false,
    rollup: false,
    includeFn: true,
    fnSrc: 'rows => rows',
    fnError: null,
    result: {
      ran: false, json: '', csv: '', jsonB64: '', csvB64: '', bundle: '',
      jsonGzBlob: null, csvGzBlob: null, sizes: {}, beforeCount: 0, afterCount: 0
    },
    activeView: 'json',
    copied: false,
    views: [
      { key: 'json',    label: 'JSON',        ext: 'json', mime: 'application/json' },
      { key: 'jsonB64', label: 'JSON.gz b64', ext: 'gz',   mime: 'application/gzip' },
      { key: 'csv',     label: 'CSV',         ext: 'csv',  mime: 'text/csv' },
      { key: 'csvB64',  label: 'CSV.gz b64',  ext: 'gz',   mime: 'application/gzip' },
      { key: 'bundle',  label: 'Bundle',      ext: 'json', mime: 'application/json' },
    ],

    init() {},

    get previewText() { return this.result[this.activeView] ?? '' },

    async onPaste(event) {
      const text = event.clipboardData.getData('text')
      if (!text) return

      // Try bundle JSON first: {fn?, data}
      const trimmed = text.trim()
      if (trimmed.startsWith('{') && trimmed.includes('"data"')) {
        try {
          const obj = JSON.parse(trimmed)
          if (obj && typeof obj === 'object' && typeof obj.data === 'string') {
            if (await this.loadBundle(obj)) return
          }
        } catch(e) { /* fall through */ }
      }

      // Try gz base64: strip whitespace, check it's base64, decode, verify gzip magic bytes, decompress
      const clean = text.replace(/\s/g, '')
      if (clean && /^[A-Za-z0-9+/]+={0,2}$/.test(clean)) {
        try {
          const bytes = Uint8Array.from(atob(clean), c => c.charCodeAt(0))
          if (bytes[0] === 0x1f && bytes[1] === 0x8b) {
            const ds = new DecompressionStream('gzip')
            const w = ds.writable.getWriter()
            w.write(bytes)
            w.close()
            const decoded = await new Response(ds.readable).text()
            if (this.loadDecoded(decoded)) return
          }
        } catch(e) { /* fall through to TSV */ }
      }

      const parsed = Papa.parse(text, { delimiter: '\t', header: true })
      const rows = parsed.data.filter(r => Object.values(r).some(v => v !== ''))
      if (!rows.length) return
      this.rawRows = rows
      this.columns = Object.keys(rows[0])
      this.result.ran = false
      this.fnError = null
    },

    loadDecoded(text) {
      // Try JSON (columnar: { col: [...] } — matches the output format)
      try {
        const obj = JSON.parse(text)
        if (obj && typeof obj === 'object' && !Array.isArray(obj)) {
          const cols = Object.keys(obj)
          if (cols.length && cols.every(c => Array.isArray(obj[c]))) {
            const n = obj[cols[0]].length
            const rows = []
            for (let i = 0; i < n; i++) {
              const row = {}
              cols.forEach(c => row[c] = obj[c][i])
              rows.push(row)
            }
            this.rawRows = rows
            this.columns = cols
            this.result.ran = false
            this.fnError = null
            return true
          }
        } else if (Array.isArray(obj) && obj.length) {
          this.rawRows = obj
          this.columns = Object.keys(obj[0] ?? {})
          this.result.ran = false
          this.fnError = null
          return true
        }
      } catch(e) { /* not JSON, try CSV */ }

      // Try CSV
      const parsed = Papa.parse(text, { header: true, skipEmptyLines: true })
      const rows = parsed.data.filter(r => Object.values(r).some(v => v !== ''))
      if (rows.length) {
        this.rawRows = rows
        this.columns = Object.keys(rows[0])
        this.result.ran = false
        this.fnError = null
        return true
      }
      return false
    },

    reset() {
      this.rawRows = []
      this.columns = []
      this.result = {
        ran: false, json: '', csv: '', jsonB64: '', csvB64: '', bundle: '',
        jsonGzBlob: null, csvGzBlob: null, sizes: {}, beforeCount: 0, afterCount: 0
      }
      this.fnError = null
    },

    async buildResult(rows, beforeCount, afterCount) {
      const cols = Object.keys(rows[0] ?? {})
      const columnar = Object.fromEntries(cols.map(c => [c, rows.map(r => r[c])]))

      const jsonStr = JSON.stringify(columnar, null, 2)
      const csvStr  = Papa.unparse(rows)

      const compress = async str => {
        const cs = new CompressionStream('gzip')
        const w = cs.writable.getWriter()
        w.write(new TextEncoder().encode(str))
        w.close()
        return new Response(cs.readable).blob()
      }

      const blobToB64 = blob => new Promise(res => {
        const fr = new FileReader()
        fr.onload = () => res(fr.result.split(',')[1])
        fr.readAsDataURL(blob)
      })

      const [jsonGzBlob, csvGzBlob] = await Promise.all([
        compress(jsonStr), compress(csvStr)
      ])
      const [jsonB64, csvB64] = await Promise.all([
        blobToB64(jsonGzBlob), blobToB64(csvGzBlob)
      ])

      // Bundle encodes the TRANSFORMED output + fn. Roundtripping loses the raw input.
      const fnB64 = this.includeFn ? await blobToB64(await compress(this.fnSrc)) : ''
      const bundle = JSON.stringify(this.includeFn ? { fn: fnB64, data: jsonB64 } : { data: jsonB64 })

      const fmt = n => n < 1024 ? `${n}B` : n < 1048576 ? `${(n/1024).toFixed(1)}K` : `${(n/1048576).toFixed(1)}M`

      this.result = {
        ran: true, json: jsonStr, csv: csvStr, jsonB64, csvB64, bundle,
        jsonGzBlob, csvGzBlob,
        sizes: {
          json:    fmt(new Blob([jsonStr]).size),
          jsonB64: fmt(new Blob([jsonB64]).size),
          csv:     fmt(new Blob([csvStr]).size),
          csvB64:  fmt(new Blob([csvB64]).size),
          bundle:  fmt(new Blob([bundle]).size),
        },
        beforeCount, afterCount,
      }
    },

    async run() {
      this.fnError = null
      let fn
      try { fn = eval('(' + this.fnSrc + ')') }
      catch(e) { this.fnError = `Syntax: ${e.message}`; return }

      let rows = this.rawRows.map(r => ({ ...r }))

      if (this.trimAll)
        rows = rows.map(r => Object.fromEntries(
          Object.entries(r).map(([k, v]) => [k, typeof v === 'string' ? v.trim() : v])
        ))

      const beforeCount = rows.length

      try { rows = fn(rows) }
      catch(e) { this.fnError = `Runtime: ${e.message}`; return }

      if (this.rollup && rows.length && 'Amount' in rows[0]) {
        const groups = {}
        rows.forEach(r => {
          const key = JSON.stringify(
            Object.keys(r).filter(k => k !== 'Amount').sort()
              .reduce((acc, k) => { acc[k] = r[k]; return acc }, {})
          )
          if (!groups[key]) groups[key] = { ...r, Amount: parseFloat(r.Amount) || 0 }
          else groups[key].Amount += parseFloat(r.Amount) || 0
        })
        rows = Object.values(groups)
      }

      await this.buildResult(rows, beforeCount, rows.length)
      this.activeView = 'json'
    },

    async loadBundle(obj) {
      const decompressB64 = async b64 => {
        const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0))
        const ds = new DecompressionStream('gzip')
        const w = ds.writable.getWriter()
        w.write(bytes)
        w.close()
        return new Response(ds.readable).text()
      }

      // Parse everything up-front; only mutate state after all decoding succeeds.
      let rows, cols, loadedFn = null
      try {
        const dataText = await decompressB64(obj.data)
        const parsed = JSON.parse(dataText)
        if (!parsed || typeof parsed !== 'object' || Array.isArray(parsed)) return false

        cols = Object.keys(parsed)
        if (!cols.length || !cols.every(c => Array.isArray(parsed[c]))) return false
        const n = parsed[cols[0]].length
        rows = []
        for (let i = 0; i < n; i++) {
          const row = {}
          cols.forEach(c => row[c] = parsed[c][i])
          rows.push(row)
        }

        if (typeof obj.fn === 'string' && obj.fn) {
          try { loadedFn = await decompressB64(obj.fn) } catch(e) { /* keep existing fnSrc */ }
        }
      } catch(e) {
        return false
      }

      // Commit state
      this.rawRows = rows
      this.columns = cols
      this.fnError = null
      if (loadedFn !== null) this.fnSrc = loadedFn

      // Bundle data is already transformed output — show it directly, do not re-apply fn.
      await this.buildResult(rows, rows.length, rows.length)
      this.activeView = 'bundle'
      return true
    },

    async copy() {
      await navigator.clipboard.writeText(this.previewText)
      this.copied = true
      setTimeout(() => this.copied = false, 1500)
    },

    download() {
      const v = this.views.find(v => v.key === this.activeView)
      const isB64 = this.activeView.includes('B64')
      // b64 views: download raw gz blob; plain views: download text
      const blob = isB64
        ? (this.activeView === 'jsonB64' ? this.result.jsonGzBlob : this.result.csvGzBlob)
        : new Blob([this.result[this.activeView]], { type: v.mime })
      const url = URL.createObjectURL(blob)
      Object.assign(document.createElement('a'), { href: url, download: `output.${v.ext}` }).click()
      URL.revokeObjectURL(url)
    }
  }
}
</script>
</body>
</html>
