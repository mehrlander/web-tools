<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>iOS Sheet</title>
<script src="https://cdn.jsdelivr.net/combine/npm/@tailwindcss/browser@4,npm/@phosphor-icons/web"></script>
<link href="https://cdn.jsdelivr.net/combine/npm/daisyui@5/themes.css,npm/daisyui@5" rel="stylesheet" />
<script defer src="https://unpkg.com/alpinejs"></script>
<style>
  .sheet { touch-action: none; will-change: transform; }
  .sheet.animate { transition: transform .35s cubic-bezier(.32,.72,0,1); }
  .scrim.animate { transition: opacity .35s ease; }
</style>
</head>
<body class="min-h-screen bg-base-200 flex items-center justify-center" x-data="sheet()">

  <button class="btn btn-primary" @click="open()">
    <i class="ph ph-tray-arrow-up text-lg"></i> Show Sheet
  </button>

  <!-- scrim -->
  <div class="scrim animate fixed inset-0 bg-black/40 z-40"
       :class="shown ? 'opacity-100' : 'opacity-0 pointer-events-none'"
       @click="close()"></div>

  <!-- sheet -->
  <div x-ref="sheet"
       class="sheet fixed inset-x-0 bottom-0 z-50 bg-base-100 rounded-t-2xl shadow-2xl flex flex-col"
       style="height: 99dvh; transform: translateY(100%)"
       @pointerdown="grab($event)"
       @pointermove="move($event)"
       @pointerup="release($event)"
       @pointercancel="release($event)">

    <!-- header: drag affordance lives in the whole bar -->
    <div class="shrink-0 relative flex items-center justify-center px-4 pt-5 pb-4 cursor-grab active:cursor-grabbing">
      <button class="absolute left-4 top-4 btn btn-circle btn-ghost bg-base-200 size-11"
              @pointerdown.stop @click="close()">
        <i class="ph-bold ph-x text-xl"></i>
      </button>
      <h2 class="font-bold text-lg">sheet</h2>
      <div class="absolute right-4 top-4" @pointerdown.stop x-data="{ menu: false }" @click.outside="menu = false">
        <button class="btn btn-circle btn-ghost bg-base-200 size-11" @click="menu = !menu">
          <i class="ph-bold ph-dots-three text-2xl"></i>
        </button>
        <div x-show="menu"
             x-transition:enter="transition ease-out duration-150"
             x-transition:enter-start="opacity-0 scale-90 -translate-y-1"
             x-transition:enter-end="opacity-100 scale-100 translate-y-0"
             x-transition:leave="transition ease-in duration-100"
             x-transition:leave-start="opacity-100 scale-100"
             x-transition:leave-end="opacity-0 scale-90"
             class="absolute right-0 mt-2 w-60 origin-top-right bg-white/75 backdrop-blur-2xl rounded-[14px] shadow-2xl ring-1 ring-black/[.08] overflow-hidden z-10 divide-y [&>*]:border-black/[.07]">
          <button @click="copy(); menu = false"
                  class="w-full flex items-center justify-between pl-4 pr-3.5 py-3 text-[17px] hover:bg-black/5 active:bg-black/10 transition-colors">
            Copy <i class="ph ph-copy text-xl text-black/55"></i>
          </button>
          <button @click="menu = false"
                  class="w-full flex items-center justify-between pl-4 pr-3.5 py-3 text-[17px] hover:bg-black/5 active:bg-black/10 transition-colors">
            Share <i class="ph ph-share-network text-xl text-black/55"></i>
          </button>
          <button @click="menu = false"
                  class="w-full flex items-center justify-between pl-4 pr-3.5 py-3 text-[17px] hover:bg-black/5 active:bg-black/10 transition-colors">
            Save <i class="ph ph-bookmark-simple text-xl text-black/55"></i>
          </button>
          <button @click="close(); menu = false"
                  class="w-full flex items-center justify-between pl-4 pr-3.5 py-3 text-[17px] text-error hover:bg-error/10 active:bg-error/20 transition-colors !border-t-[6px] !border-t-black/[.08]">
            Delete <i class="ph ph-trash text-xl"></i>
          </button>
        </div>
      </div>
    </div>

    <div class="px-6 pb-8 pt-2 overflow-y-auto" style="touch-action: pan-y">
      <p class="text-base-content/70 mb-4">Drag the bar. Up snaps full, down dismisses. A quick flick tosses it away.</p>
      <div class="space-y-3">
        <template x-for="i in 12">
          <div class="card bg-base-200">
            <div class="card-body py-4">
              <span class="font-medium">Row <span x-text="i"></span></span>
            </div>
          </div>
        </template>
      </div>
    </div>
  </div>

<script>
function sheet() {
  return {
    shown: false,
    snaps: [0.45, 0.99],   // fractions of viewport height
    snapIdx: 0,
    dragging: false,
    startY: 0, startTrans: 0, lastY: 0, lastT: 0, velocity: 0,

    h() { return window.innerHeight },
    posFor(frac) { return this.h() * (1 - frac) },   // translateY from top

    open() {
      this.shown = true;
      this.snapIdx = 0;
      this.animate(this.posFor(this.snaps[0]));
    },
    close() {
      this.shown = false;
      this.animate(this.h());
    },
    copy() {
      navigator.clipboard?.writeText(document.querySelector('.overflow-y-auto').innerText);
    },
    animate(y) {
      const el = this.$refs.sheet;
      el.classList.add('animate');
      el.style.transform = `translateY(${y}px)`;
    },

    grab(e) {
      if (e.target.closest('.overflow-y-auto')) return;   // let content scroll
      this.dragging = true;
      this.$refs.sheet.classList.remove('animate');
      this.$refs.sheet.setPointerCapture(e.pointerId);
      this.startY = e.clientY;
      this.startTrans = this.current();
      this.lastY = e.clientY;
      this.lastT = performance.now();
    },
    current() {
      const m = this.$refs.sheet.style.transform.match(/-?[\d.]+/);
      return m ? +m[0] : this.h();
    },
    move(e) {
      if (!this.dragging) return;
      let y = this.startTrans + (e.clientY - this.startY);
      const top = this.posFor(this.snaps[this.snaps.length - 1]);
      if (y < top) y = top + (y - top) * 0.25;   // rubber-band past top
      this.$refs.sheet.style.transform = `translateY(${y}px)`;
      const now = performance.now();
      this.velocity = (e.clientY - this.lastY) / (now - this.lastT || 1);
      this.lastY = e.clientY; this.lastT = now;
    },
    release(e) {
      if (!this.dragging) return;
      this.dragging = false;
      const y = this.current();

      // fast downward flick tosses it
      if (this.velocity > 0.9) return this.close();
      if (this.velocity < -0.9) return this.animate(this.posFor(this.snaps[this.snaps.length - 1]));

      // settle to nearest target, dismiss below half of lowest snap
      const targets = [this.h(), ...this.snaps.map(s => this.posFor(s))];
      const nearest = targets.reduce((a, b) => Math.abs(b - y) < Math.abs(a - y) ? b : a);
      if (nearest === this.h()) return this.close();
      this.animate(nearest);
    }
  }
}
</script>
</body>
</html>
