<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Console Web Component</title>
  
  <script src="https://cdn.jsdelivr.net/combine/npm/@tailwindcss/browser@4,npm/@phosphor-icons/web,npm/tabulator-tables"></script>
  <link href="https://cdn.jsdelivr.net/combine/npm/daisyui@5/themes.css,npm/daisyui@5,npm/tabulator-tables/dist/css/tabulator_simple.min.css" rel="stylesheet">
  
  <script defer src="https://unpkg.com/alpinejs"></script>

  <style>
    /* Minimal override to seamlessly integrate the JSON editor with DaisyUI */
    .jse-main { 
      margin: 0 !important; 
      border-radius: var(--rounded-box, 1rem) !important; 
      border: 1px solid var(--fallback-bc, oklch(var(--bc)/0.2)) !important; 
    }
  </style>
</head>
<body class="h-screen w-screen overflow-hidden flex bg-base-200 m-0">

  <aside class="w-72 bg-base-100 flex flex-col border-r border-base-300 shrink-0">
    <div class="p-4 font-bold text-lg border-b border-base-300 flex items-center gap-2">
      <i class="ph ph-terminal-window text-xl"></i>
      Console Triggers
    </div>
    
    <div class="flex-1 overflow-y-auto p-4 flex flex-col gap-2" x-data>
      <button @click="console.log('Regular log message')" class="btn btn-info btn-sm justify-start">Log Text</button>
      <button @click="console.log({name: 'Test Object', nested: {value: 42, array: [1,2,3]}, active: true})" class="btn btn-success btn-sm justify-start">Log Object</button>
      <button @click="console.log([1, 2, 3, 'test', true])" class="btn btn-success btn-outline btn-sm justify-start">Log Array</button>
      <button @click="console.log('User:', {id: 123}, 'Status:', 'active')" class="btn btn-secondary btn-sm justify-start">Multiple Args</button>
      <button @click="console.warn('Warning message!')" class="btn btn-warning btn-sm justify-start">Warn</button>
      <button @click="console.error('Error occurred!')" class="btn btn-error btn-sm justify-start">Error</button>
      <button @click="console.table([{name: 'John', age: 30}, {name: 'Jane', age: 25}, {name: 'Bob', age: 35}])" class="btn btn-primary btn-sm justify-start">Table Array</button>
      <button @click="console.table({first: {name: 'Alice', score: 95}, second: {name: 'Bob', score: 87}})" class="btn btn-primary btn-outline btn-sm justify-start">Table Object</button>
      <button @click="Promise.reject('Unhandled promise rejection')" class="btn btn-neutral btn-sm justify-start">Promise Rejection</button>
    </div>
  </aside>

  <main class="flex-1 flex flex-col min-w-0">
    <debug-console class="flex-1 flex flex-col overflow-hidden"></debug-console>
  </main>

  <script type="module">
    import { createJSONEditor } from 'https://unpkg.com/vanilla-jsoneditor/standalone.js';

    class DebugConsole extends HTMLElement {
      connectedCallback() {
        if (this.initialized) return;
        this.initialized = true;
        this.logs = [];
        
        // Map console methods to DaisyUI semantic colors
        this.colors = { log: 'text-info', info: 'text-success', warn: 'text-warning', error: 'text-error', debug: 'text-neutral' };

        this.innerHTML = `
          <header class="bg-base-300 px-4 py-3 flex justify-between items-center shrink-0 border-b border-base-400">
            <div class="font-bold text-sm text-base-content flex items-center gap-2">
              <i class="ph ph-code"></i> Output
            </div>
            <div class="flex gap-2">
              <button id="copy-btn" class="btn btn-xs btn-ghost gap-1"><i class="ph ph-copy"></i> Copy</button>
              <button id="clear-btn" class="btn btn-xs btn-outline btn-error gap-1"><i class="ph ph-trash"></i> Clear</button>
            </div>
          </header>
          <div id="output" class="flex-1 overflow-y-auto p-4 font-mono text-sm flex flex-col gap-3 bg-base-100"></div>
        `;

        this.output = this.querySelector('#output');
        this.bindEvents();
        this.intercept();
        
        // Run demo sequence
        setTimeout(() => this.runDemo(), 500);
      }

      bindEvents() {
        this.querySelector('#clear-btn').addEventListener('click', () => this.clear());
        
        // Native Clipboard API instead of ClipboardJS
        this.querySelector('#copy-btn').addEventListener('click', async (e) => {
          const btn = e.currentTarget;
          const text = this.logs.map(l => `[${l.time}] ${l.type.toUpperCase()}: ${l.msg}`).join('\n');
          
          try {
            await navigator.clipboard.writeText(text);
            const originalHTML = btn.innerHTML;
            btn.innerHTML = `<i class="ph ph-check"></i> Copied!`;
            btn.classList.replace('btn-ghost', 'btn-success');
            setTimeout(() => {
              btn.innerHTML = originalHTML;
              btn.classList.replace('btn-success', 'btn-ghost');
            }, 1500);
          } catch (err) {
            this.logText('error', 'Failed to copy to clipboard');
          }
        });
      }

      intercept() {
        Object.keys(this.colors).forEach(m => {
          const orig = console[m] || console.log;
          console[m] = (...args) => {
            orig.apply(console, args);
            // Detect single objects for JSON viewer
            if (args.length === 1 && typeof args[0] === 'object' && args[0] !== null && !Array.isArray(args[0])) {
              this.logObject(m, args[0]);
            } else {
              const msg = args.map(a => typeof a === 'object' && a !== null ? JSON.stringify(a) : String(a)).join(' ');
              this.logText(m, msg);
            }
          };
        });

        const origTable = console.table || console.log;
        console.table = (data, columns) => {
          origTable(data, columns);
          this.logTable(data, columns);
        };

        window.addEventListener('error', e => this.logText('error', `Uncaught: ${e.message}`));
        window.addEventListener('unhandledrejection', e => {
          const reason = typeof e.reason === 'object' ? JSON.stringify(e.reason) : e.reason;
          this.logText('error', `Promise Rejection: ${reason}`);
        });
      }

      logText(type, msg) {
        const time = new Date().toLocaleTimeString();
        this.logs.push({ type, msg, time });
        
        const entry = document.createElement('div');
        entry.className = 'flex gap-3 border-b border-base-200 pb-2 last:border-0';
        entry.innerHTML = `
          <span class="opacity-50 shrink-0 select-none">[${time}]</span>
          <span class="font-bold uppercase shrink-0 ${this.colors[type] || 'text-base-content'}">${type}:</span>
          <span class="break-words whitespace-pre-wrap">${this.escapeHTML(msg)}</span>
        `;
        this.output.prepend(entry);
      }

      logObject(type, obj) {
        const time = new Date().toLocaleTimeString();
        this.logs.push({ type, msg: JSON.stringify(obj, null, 2), time });
        const viewerId = `json-${Math.random().toString(36).substr(2, 9)}`;

        const entry = document.createElement('div');
        entry.className = 'flex flex-col gap-2 border-b border-base-200 pb-3 last:border-0';
        entry.innerHTML = `
          <div class="flex gap-3 items-center">
            <span class="opacity-50 shrink-0 select-none">[${time}]</span>
            <span class="font-bold uppercase shrink-0 ${this.colors[type] || 'text-base-content'}">OBJECT:</span>
            <div class="join">
              <button data-mode="tree" class="btn btn-xs join-item btn-active">Tree</button>
              <button data-mode="text" class="btn btn-xs join-item">Text</button>
            </div>
          </div>
          <div id="${viewerId}" class="max-h-96 overflow-hidden mt-1"></div>
        `;
        this.output.prepend(entry);

        // Defer instantiation to ensure DOM is ready
        setTimeout(() => {
          const container = document.getElementById(viewerId);
          if (!container) return;
          
          const editor = createJSONEditor({
            target: container,
            props: { content: { json: obj }, mode: 'tree', readOnly: true, mainMenuBar: false, navigationBar: false, statusBar: false }
          });

          const buttons = entry.querySelectorAll('button[data-mode]');
          buttons.forEach(btn => {
            btn.addEventListener('click', () => {
              buttons.forEach(b => b.classList.remove('btn-active'));
              btn.classList.add('btn-active');
              editor.updateProps({ mode: btn.dataset.mode });
            });
          });
        }, 0);
      }

      logTable(data, columns) {
        const time = new Date().toLocaleTimeString();
        this.logs.push({ type: 'table', msg: JSON.stringify(data, null, 2), time });
        const tableId = `tbl-${Math.random().toString(36).substr(2, 9)}`;

        // Native replacements for Lodash keys/entries
        let tableData = Array.isArray(data) ? data : Object.entries(data).map(([k, v]) => ({ '(index)': k, ...v }));
        let tableCols = [];
        
        if (tableData.length > 0) {
          const keys = columns || Object.keys(tableData[0]);
          tableCols = keys.map(k => ({ title: k, field: k }));
        }

        const entry = document.createElement('div');
        entry.className = 'flex flex-col gap-2 border-b border-base-200 pb-3 last:border-0';
        entry.innerHTML = `
          <div class="flex gap-3 items-center">
            <span class="opacity-50 shrink-0 select-none">[${time}]</span>
            <span class="font-bold uppercase shrink-0 text-secondary">TABLE:</span>
          </div>
          <div id="${tableId}" class="mt-1 w-full text-xs"></div>
        `;
        this.output.prepend(entry);

        setTimeout(() => {
          if (window.Tabulator) {
            new Tabulator(`#${tableId}`, {
              data: tableData,
              columns: tableCols,
              layout: "fitDataFill",
              maxHeight: "300px",
            });
          }
        }, 0);
      }

      escapeHTML(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }

      clear() {
        this.logs = [];
        this.output.innerHTML = '';
        this.logText('info', 'Console cleared');
      }

      runDemo() {
        console.log('Welcome to the enhanced console!');
        console.info('Native web component, zero jQuery, native clipboard API.');
        console.log({
          status: 'success',
          details: { framework: 'DaisyUI', styles: 'Tailwind V4', storage: 'AlpineJS' }
        });
        console.table([
          { id: 1, package: 'Tabulator', size: 'Lightweight' },
          { id: 2, package: 'Vanilla JSON Editor', size: 'ES Module' }
        ]);
      }
    }

    customElements.define('debug-console', DebugConsole);
  </script>
</body>
</html>
