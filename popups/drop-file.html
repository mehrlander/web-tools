<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>File Drop</title>
  <link href="https://cdn.jsdelivr.net/combine/npm/daisyui@5/themes.css,npm/daisyui@5" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/combine/npm/@tailwindcss/browser@4,npm/@phosphor-icons/web"></script>
  <script type="module">
    // The minimal working example for the drop-zone component: mount it, listen
    // for its bubbling `drop-file` event, log the payload. ?use=<branch|tag|sha>
    // re-pins the lib load to a ref for previewing branch work.
    const ref = new URLSearchParams(location.search).get('use');
    if (ref) {
      // ?use=<ref>: fresh branch lib via raw + blob-import (no jsDelivr branch-tip lag).
      window.__ghBlobBoot = { repo: 'mehrlander/web-tools', ref };
      const r = await fetch(`https://raw.githubusercontent.com/mehrlander/web-tools/${ref}/lib/gh-api.js`);
      if (!r.ok) throw new Error(`?use=${ref}: could not fetch gh-api.js (HTTP ${r.status})`);
      const u = URL.createObjectURL(new Blob([await r.text()], { type: 'text/javascript' }));
      try { await import(u); } finally { URL.revokeObjectURL(u); }
    } else {
      await import('https://cdn.jsdelivr.net/gh/mehrlander/web-tools@main/lib/gh-api.js');
    }
    await gh.load('alpineComponents/drop-zone.js');
    await gh.load('alpine-bundle.js');
  </script>
  <style>[x-cloak]{display:none!important}</style>
</head>
<body class="bg-base-200 min-h-screen flex items-center justify-center p-6">

  <div class="w-full max-w-md" x-data="{ log: '' }" @drop-file="report($event.detail, (m) => log = m)">
    <div x-data="dropZone()"></div>

    <div x-show="log" x-cloak
         class="mt-3 font-mono text-xs whitespace-pre bg-base-100 border border-base-300 rounded-lg p-3"
         x-text="log"></div>
  </div>

  <script>
    // The host's handler: the drop-zone owns the gesture and the read; the page
    // owns what to do with the bytes. Here: stash on window.lastFile and print
    // a hex peek, the same output the standalone demo always gave.
    function report(d, show) {
      if (!d.file) return show('text  ' + d.size.toLocaleString() + ' chars');
      window.lastFile = d;
      const hex = [...new Uint8Array(d.buf, 0, Math.min(16, d.buf.byteLength))]
        .map(b => b.toString(16).padStart(2, '0')).join(' ');
      show(d.name + '  ' + d.size.toLocaleString() + ' bytes\n' +
           'first 16: ' + hex + '\nAvailable as window.lastFile');
    }
  </script>

</body>
</html>
