<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wring | General-Text Induction — Tokenize → Grammar → Group</title>
    <link href="https://cdn.jsdelivr.net/combine/npm/daisyui@5/themes.css,npm/daisyui@5" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/combine/npm/@tailwindcss/browser@4,npm/@phosphor-icons/web"></script>
    <script type="module">
      import { tokenize } from './tokenize.js';
      import { induceGrammar, expandRule } from './grammar.js';
      import { groupByAlignment, reconstructAlign } from './align-group.js';
      import { groupByTemplate, reconstruct } from '../core/group-by-template.js';
      window._gen = {
        tokenize, induceGrammar, expandRule,
        groupByAlignment, reconstructAlign,
        groupByTemplate, reconstruct,
      };
    </script>
    <script defer src="https://unpkg.com/alpinejs"></script>
</head>
<body class="bg-base-200 min-h-screen font-sans p-2">

<div x-data="induceDemo" class="max-w-6xl mx-auto flex flex-col h-[95vh] shadow-2xl bg-base-100 rounded-xl overflow-hidden">

    <!-- ── Header ─────────────────────────────────────────────────────────── -->
    <div class="p-4 bg-base-100 border-b border-base-300 shrink-0 space-y-3">
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-2">
                <i class="ph ph-text-columns text-primary text-2xl"></i>
                <h1 class="text-lg font-black tracking-tight uppercase italic text-slate-700">
                    Wring — General-Text Induction
                </h1>
                <span class="badge badge-sm badge-ghost font-mono">Stage 1 → 3</span>
            </div>
            <button @click="inputExpanded = !inputExpanded" class="btn btn-xs btn-ghost gap-1">
                <i class="ph" :class="inputExpanded ? 'ph-caret-up' : 'ph-caret-down'"></i>
                <span x-text="inputExpanded ? 'Hide Input' : 'Edit Input'"></span>
            </button>
        </div>

        <!-- ── Collapsible Input ──────────────────────────────────────────── -->
        <div x-show="inputExpanded" x-transition class="space-y-2">
            <span class="text-[9px] font-mono text-base-content/40 block">
                raw text → tokenize (Stage 1) → grammar (Stage 2) → split into records → group (Stage 3)
            </span>
            <textarea
                x-model="inputText"
                class="textarea textarea-bordered w-full font-mono text-[10px] leading-tight h-48 shadow-inner"
                placeholder="Paste a log or any record-structured text here…"
            ></textarea>
            <div class="flex items-center justify-between">
                <span class="text-[10px] font-mono text-base-content/50"
                      x-text="inputText.trim().split('\\n').filter(Boolean).length + ' lines'"></span>
                <div class="flex items-center gap-1">
                    <button @click="loadDefaults()" class="btn btn-xs btn-ghost">Reset to access.log</button>
                </div>
            </div>
        </div>

        <!-- ── Controls ───────────────────────────────────────────────────── -->
        <div class="flex flex-wrap items-center gap-3">
            <label class="flex items-center gap-1.5 text-[10px] font-bold uppercase tracking-widest">
                Tokens
                <select x-model="tokens" class="select select-xs select-bordered font-mono">
                    <option value="punct">punct</option>
                    <option value="word">word</option>
                    <option value="char">char</option>
                    <option value="line">line</option>
                </select>
            </label>

            <label class="flex items-center gap-1.5 text-[10px] font-bold uppercase tracking-widest">
                Records
                <select x-model="records" class="select select-xs select-bordered font-mono">
                    <option value="lines">lines</option>
                    <option value="anchor">anchor</option>
                </select>
            </label>

            <label class="flex items-center gap-1.5 text-[10px] font-bold uppercase tracking-widest">
                Group
                <select x-model="group" class="select select-xs select-bordered font-mono">
                    <option value="align">align (structural)</option>
                    <option value="bookend">bookend (literal)</option>
                </select>
            </label>

            <!-- align-only -->
            <label x-show="group === 'align'" class="flex items-center gap-1.5 text-[10px] font-bold uppercase tracking-widest">
                Threshold
                <input type="range" x-model.number="threshold" min="0.1" max="0.9" step="0.1" class="range range-xs range-primary w-16" />
                <span class="badge badge-sm badge-primary font-mono" x-text="threshold"></span>
            </label>

            <!-- bookend-only -->
            <label x-show="group === 'bookend'" class="flex items-center gap-1.5 text-[10px] font-bold uppercase tracking-widest">
                Max Slots
                <input type="range" x-model.number="maxSlots" min="1" max="8" step="1" class="range range-xs range-primary w-16" />
                <span class="badge badge-sm badge-primary font-mono" x-text="maxSlots"></span>
            </label>
            <label x-show="group === 'bookend'" class="flex items-center gap-1.5 text-[10px] font-bold uppercase tracking-widest">
                Strategy
                <select x-model="strategy" class="select select-xs select-bordered font-mono">
                    <option value="compress">compress</option>
                    <option value="specific">specific</option>
                </select>
            </label>

            <label class="flex items-center gap-1.5 text-[10px] font-bold uppercase tracking-widest">
                Min Group
                <input type="range" x-model.number="minGroupSize" min="2" max="10" step="1" class="range range-xs range-secondary w-16" />
                <span class="badge badge-sm badge-secondary font-mono" x-text="minGroupSize"></span>
            </label>

            <button @click="run()" class="btn btn-primary btn-sm px-6 font-bold uppercase ml-auto">
                <i class="ph ph-play"></i> Run
            </button>
        </div>

        <!-- ── Stats Bar ──────────────────────────────────────────────────── -->
        <div class="flex flex-wrap gap-4 font-mono text-[10px] uppercase tracking-widest font-bold px-1">
            <span>Tokens: <span class="text-primary" x-text="tokenCount"></span></span>
            <span>Rules: <span class="text-primary" x-text="ruleCount"></span></span>
            <span>Records: <span class="text-accent" x-text="recordCount"></span>
                <span class="text-base-content/40 normal-case" x-text="'(' + usedStrategy + ')'"></span></span>
            <span>Grouped: <span class="text-secondary" x-text="groupedCount"></span></span>
            <span>Ungrouped: <span class="text-base-content/50" x-text="ungrouped.length"></span></span>
            <span>Reconstruction:
                <span :class="allPass ? 'text-success' : 'text-error'"
                      x-text="allPass ? 'ALL PASS (' + recon.pass + ')' : recon.fail + ' FAILED'"></span>
            </span>
        </div>
    </div>

    <!-- ── Results ────────────────────────────────────────────────────────── -->
    <div class="flex-1 flex flex-col overflow-auto p-3 gap-2">

        <!-- Groups -->
        <template x-for="(group, gi) in groups" :key="gi">
            <div class="card bg-base-100 border border-base-300 shadow-sm">
                <div class="card-body p-3 gap-2">
                    <!-- Group header -->
                    <div @click="group.expanded = !group.expanded"
                         class="cursor-pointer flex items-start justify-between gap-2 select-none">
                        <div class="flex items-center gap-2 min-w-0">
                            <span class="badge badge-sm badge-primary font-mono shrink-0"
                                  x-text="'T' + (gi + 1)"></span>
                            <code class="text-[11px] text-primary break-all" x-text="group.template"></code>
                        </div>
                        <div class="flex items-center gap-3 shrink-0 text-[10px] uppercase tracking-widest font-bold text-base-content/60">
                            <span x-text="group.members.length + ' instances'"></span>
                            <span x-text="'score ' + group.score"></span>
                            <i class="ph text-sm" :class="group.expanded ? 'ph-caret-up' : 'ph-caret-down'"></i>
                        </div>
                    </div>

                    <!-- Expanded member table -->
                    <div x-show="group.expanded" x-transition>
                        <div class="overflow-x-auto">
                            <table class="table table-xs">
                                <thead>
                                    <tr class="text-[9px] uppercase tracking-widest">
                                        <th class="w-8">#</th>
                                        <template x-for="(_, si) in group.members[0].slots" :key="si">
                                            <th x-text="group.members[0].slots.length === 1 ? 'Slot Value' : 'Slot ' + si"></th>
                                        </template>
                                        <th>Original</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template x-for="(m, mi) in group.members" :key="mi">
                                        <tr class="hover">
                                            <td class="font-mono text-[10px] text-base-content/40" x-text="mi + 1"></td>
                                            <template x-for="(s, si) in m.slots" :key="si">
                                                <td class="font-mono text-[11px] text-secondary font-bold"
                                                    x-text="s === '' ? '(empty)' : s"></td>
                                            </template>
                                            <td class="font-mono text-[9px] text-base-content/40 max-w-xs truncate"
                                                x-text="m.original"></td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </template>

        <!-- Ungrouped -->
        <template x-if="ungrouped.length > 0">
            <div class="card bg-base-200/50 border border-base-300">
                <div class="card-body p-3 gap-2">
                    <div @click="ungroupedExpanded = !ungroupedExpanded"
                         class="cursor-pointer flex items-center justify-between select-none">
                        <div class="flex items-center gap-2">
                            <span class="badge badge-sm badge-ghost font-mono">Ungrouped</span>
                            <span class="text-[10px] uppercase tracking-widest font-bold text-base-content/50"
                                  x-text="ungrouped.length + ' records'"></span>
                        </div>
                        <i class="ph text-sm" :class="ungroupedExpanded ? 'ph-caret-up' : 'ph-caret-down'"></i>
                    </div>
                    <div x-show="ungroupedExpanded" x-transition>
                        <div class="space-y-0.5 mt-1">
                            <template x-for="(s, i) in ungrouped" :key="i">
                                <div class="font-mono text-[10px] text-base-content/50 truncate" x-text="s"></div>
                            </template>
                        </div>
                    </div>
                </div>
            </div>
        </template>

        <!-- Reconstruction failures (if any) -->
        <template x-if="recon.fail > 0">
            <div class="card bg-error/10 border border-error/30">
                <div class="card-body p-3">
                    <h3 class="text-xs font-bold text-error uppercase">Reconstruction Failures</h3>
                    <template x-for="(f, i) in recon.failures" :key="i">
                        <div class="font-mono text-[10px] space-y-0.5">
                            <div class="text-base-content">original: <span x-text="f.original"></span></div>
                            <div class="text-error">rebuilt:&nbsp; <span x-text="f.rebuilt"></span></div>
                        </div>
                    </template>
                </div>
            </div>
        </template>
    </div>

    <!-- ── Footer ─────────────────────────────────────────────────────────── -->
    <div class="px-4 py-2 border-t border-base-300 flex items-center justify-between text-[9px] font-mono text-base-content/30 uppercase tracking-widest shrink-0">
        <span>Wring — Single-document template induction</span>
        <a href="https://github.com/mehrlander/wring" class="hover:text-primary transition">github.com/mehrlander/wring</a>
    </div>
</div>

<script>
// Sample mirrors general/fixtures/access.log: an Apache-style log with several
// independent variable fields (IP, time, method, path, id, status, bytes).
const DEFAULT_TEXT = `192.168.1.10 - - [05/Jun/2026:10:00:01 +0000] "GET /api/users/1 HTTP/1.1" 200 1534
192.168.1.11 - - [05/Jun/2026:10:00:02 +0000] "GET /api/users/2 HTTP/1.1" 200 1622
192.168.1.10 - - [05/Jun/2026:10:00:03 +0000] "GET /api/users/3 HTTP/1.1" 404 312
192.168.1.12 - - [05/Jun/2026:10:00:04 +0000] "POST /api/orders HTTP/1.1" 201 88
192.168.1.10 - - [05/Jun/2026:10:00:05 +0000] "GET /api/users/4 HTTP/1.1" 200 1701
192.168.1.13 - - [05/Jun/2026:10:00:06 +0000] "GET /api/users/5 HTTP/1.1" 200 1499
192.168.1.11 - - [05/Jun/2026:10:00:07 +0000] "DELETE /api/orders/77 HTTP/1.1" 204 0
192.168.1.10 - - [05/Jun/2026:10:00:08 +0000] "GET /api/users/6 HTTP/1.1" 500 215`;

// Internal token separator: NUL never appears in normal text, so a NUL-joined
// record splits back into exactly its tokens. The bookend grouper sees records
// as strings with NUL as the delimiter; we strip it again for display.
const NUL = '\u0000';
const pretty = (s) => s.split(NUL).join('').replace(/\n/g, '⏎');

// ─── Bridge: grammar → records (token arrays) — mirrors general/induce.js ────

function recordsByLines(tokens) {
    const records = [];
    let cur = [];
    for (const tok of tokens) {
        cur.push(tok);
        if (tok.includes('\n')) { records.push(cur); cur = []; }
    }
    if (cur.length) records.push(cur);
    return records.filter((r) => r.length > 0);
}

function recordsByAnchor(grammar, expandRule) {
    const startBody = grammar.rules.get(grammar.start);
    const freq = new Map();
    for (const sym of startBody) {
        if (sym.rule !== undefined) freq.set(sym.rule, (freq.get(sym.rule) || 0) + 1);
    }
    let anchor = null, best = 1;
    for (const [id, c] of freq) if (c > best) { best = c; anchor = id; }
    if (anchor === null) return null;

    const records = [];
    let cur = null;
    for (const sym of startBody) {
        if (sym.rule === anchor) {
            if (cur) records.push(cur);
            cur = [];
        } else if (cur === null) {
            cur = [];
        }
        const toks = sym.rule !== undefined ? expandRule(grammar, sym.rule) : [sym.t];
        cur.push(...toks);
    }
    if (cur && cur.length) records.push(cur);
    return records.filter((r) => r.length > 0);
}

document.addEventListener('alpine:init', () => {
    Alpine.data('induceDemo', () => ({
        // ── Input ──
        inputText: DEFAULT_TEXT,

        // ── Options ──
        tokens: 'punct',
        records: 'lines',
        group: 'align',
        threshold: 0.5,
        maxSlots: 1,
        strategy: 'compress',
        minGroupSize: 2,

        // ── Results ──
        tokenCount: 0,
        ruleCount: 0,
        recordCount: 0,
        usedStrategy: 'lines',
        groups: [],
        ungrouped: [],
        recon: { pass: 0, fail: 0, failures: [] },

        // ── UI state ──
        inputExpanded: false,
        ungroupedExpanded: false,

        // ── Computed ──
        get groupedCount() {
            return this.groups.reduce((s, g) => s + g.members.length, 0);
        },
        get allPass() {
            return this.recon.fail === 0 && this.recon.pass > 0;
        },

        // ── Methods ──
        init() {
            this.run();
        },

        loadDefaults() {
            this.inputText = DEFAULT_TEXT;
            this.run();
        },

        run() {
            const G = window._gen;
            const text = this.inputText.split(NUL).join('');
            if (!text.trim()) {
                this.tokenCount = this.ruleCount = this.recordCount = 0;
                this.groups = []; this.ungrouped = [];
                this.recon = { pass: 0, fail: 0, failures: [] };
                return;
            }

            // Stage 1 + 2: tokenize, then induce a grammar of exact repeats.
            const tokens = G.tokenize(text, this.tokens);
            const grammar = G.induceGrammar(tokens);
            this.tokenCount = tokens.length;
            this.ruleCount = grammar.rules.size;

            // Bridge: carve the token stream into records.
            let records, usedStrategy = this.records;
            if (this.records === 'anchor') {
                records = recordsByAnchor(grammar, G.expandRule);
                if (!records || records.length < 2) {
                    records = recordsByLines(tokens);
                    usedStrategy = 'lines (anchor fallback)';
                }
            } else {
                records = recordsByLines(tokens);
            }
            this.recordCount = records.length;
            this.usedStrategy = usedStrategy;

            // Stage 3: group, with a reconstruction check on the raw result.
            let result, recon;
            if (this.group === 'align') {
                result = G.groupByAlignment(records, {
                    threshold: this.threshold,
                    minGroupSize: this.minGroupSize,
                });
                recon = this.verify(result, (t, s) => G.reconstructAlign(t, s));
            } else {
                const recordStrings = records.map((r) => r.join(NUL));
                result = G.groupByTemplate(recordStrings, {
                    maxSlots: this.maxSlots,
                    strategy: this.strategy,
                    minGroupSize: this.minGroupSize,
                    delimiter: NUL,
                });
                recon = this.verify(result, (t, s) => G.reconstruct(t, s, NUL));
            }

            // Display: strip the internal NUL delimiter and make newlines visible.
            this.groups = result.groups.map((g) => ({
                template: pretty(g.template),
                score: g.score,
                members: g.members.map((m) => ({
                    original: pretty(m.original),
                    slots: m.slots.map(pretty),
                })),
                expanded: false,
            }));
            this.ungrouped = result.ungrouped.map(pretty);
            this.recon = recon;
        },

        // Verify reconstruction on the raw (un-prettied) result.
        verify(result, rebuildFn) {
            let pass = 0, fail = 0;
            const failures = [];
            for (const g of result.groups) {
                for (const m of g.members) {
                    const rebuilt = rebuildFn(g.template, m.slots);
                    if (rebuilt === m.original) { pass++; }
                    else { fail++; failures.push({ original: pretty(m.original), rebuilt: pretty(rebuilt) }); }
                }
            }
            return { pass, fail, failures };
        },
    }));
});
</script>

</body>
</html>
