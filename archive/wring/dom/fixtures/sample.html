<!DOCTYPE html>
<!--
  Fixture for the end-to-end DOM induction demo. Hand-written to contain the
  kind of internal repetition Wring exists to find: repeated component shells
  (nav items, message rows, avatars, card headers) whose classes differ only in
  a small varying middle. Not generated, so the recurring structure is genuine.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sample — should be skipped by the segmenter</title>
  <style>.ignored { color: red }</style>
</head>
<body class="bg-bg-100 text-text-100">
  <div id="root" class="relative w-full min-h-full flex flex-col">

    <nav class="flex flex-col px-2 gap-px border-r-0.5 border-border-300">
      <a class="flex items-center gap-2 px-2 py-2 rounded-lg hover:bg-bg-200">Home</a>
      <a class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-bg-200">Projects</a>
      <a class="flex items-center gap-2 px-4 py-2 rounded-lg hover:bg-bg-200">Settings</a>
      <a class="flex items-center gap-2 px-2 py-2 rounded-md hover:bg-bg-300">Archive</a>
    </nav>

    <main id="main-content" class="flex-1 min-w-0 overflow-auto">
      <header class="flex w-full items-center justify-between px-4 py-2 bg-bg-000 gap-2">
        <h2 class="text-text-500 pb-2 mt-1 text-xs select-none">Conversations</h2>
      </header>

      <ul class="flex flex-col gap-1 py-4 min-w-0 flex-1">
        <li class="flex items-center gap-2 transition border-t-0.5 border-transparent">
          <div class="flex shrink-0 items-center justify-center rounded-full h-9 w-9 bg-text-200 text-bg-100">A</div>
          <h3 id="_r_a1_" class="text-[12px] break-words text-text-100 line-clamp-4">First thread</h3>
        </li>
        <li class="flex items-center gap-2 transition border-t-0.5 border-transparent">
          <div class="flex shrink-0 items-center justify-center rounded-full h-9 w-9 bg-text-300 text-bg-100">B</div>
          <h3 id="_r_b2_" class="text-[12px] break-words text-text-100 line-clamp-4">Second thread</h3>
        </li>
        <li class="flex items-center gap-2 transition border-t-0.5 border-transparent">
          <div class="flex shrink-0 items-center justify-center rounded-full h-9 w-9 bg-text-400 text-bg-100">C</div>
          <h3 id="_r_c3_" class="text-[12px] break-words text-text-100 line-clamp-4">Third thread</h3>
        </li>
        <li class="flex items-center gap-2 transition border-t-0.5 border-transparent">
          <div class="flex shrink-0 items-center justify-center rounded-full h-9 w-9 bg-text-500 text-bg-100">D</div>
          <h3 id="_r_d4_" class="text-[12px] break-words text-text-100 line-clamp-4">Fourth thread</h3>
        </li>
      </ul>

      <div class="flex flex-col gap-2 py-2">
        <button class="inline-flex items-center justify-center font-base-bold rounded-md px-3 h-8">Reply</button>
        <button class="inline-flex items-center justify-center font-base-bold rounded-lg px-4 h-9">Send</button>
        <button class="inline-flex items-center justify-center font-base-bold rounded-md px-3 h-8">Cancel</button>
      </div>
    </main>
  </div>
</body>
</html>
