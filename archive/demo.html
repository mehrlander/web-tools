<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GH Browse</title>
<script src="https://cdn.jsdelivr.net/combine/npm/@tailwindcss/browser@4,npm/@phosphor-icons/web"></script>
<link href="https://cdn.jsdelivr.net/combine/npm/daisyui@5/themes.css,npm/daisyui@5,npm/@tailwindcss/typography/dist/typography.min.css" rel="stylesheet" />
<script type="module">
  import GH from 'https://cdn.jsdelivr.net/gh/mehrlander/web-tools/gh-fetch.js';
  window.GH = GH;
</script>
</head>
<body class="min-h-screen bg-base-100" x-data="app()" x-init="init()">
<div class="max-w-7xl mx-auto px-2 py-3">

  <template x-if="pendingPath && !repo">
    <div class="mb-6 py-2 px-4 border-b border-primary/20 bg-primary/5 -mx-2 flex flex-col sm:flex-row items-center justify-between gap-4">
      <div class="flex items-center gap-3 text-sm">
        <i class="ph ph-clipboard-text text-xl text-primary"></i>
        <div>
          <span class="opacity-60 uppercase text-[9px] font-bold block leading-none mb-1">Clipboard path detected</span>
          <code class="text-xs font-mono break-all text-primary/80" x-text="pendingPath"></code>
        </div>
      </div>
      <div class="join">
        <select @change="pick(repos.find(r=>r.name===$event.target.value))" class="select select-bordered select-sm join-item bg-base-100 font-mono text-xs">
          <option disabled selected>Choose repository...</option>
          <template x-for="r in repos"><option :value="r.name" x-text="r.name"></option></template>
        </select>
        <button @click="pendingPath=''" class="btn btn-sm btn-ghost join-item border-base-300 text-[10px] uppercase">Ignore</button>
      </div>
    </div>
  </template>

  <template x-if="!(pendingPath && !repo)">
    <div class="mb-4 flex items-center justify-between border-b border-base-200 pb-3">
      <div class="flex items-baseline gap-2 text-xl font-bold font-mono">
        <span class="text-base-content/70" x-text="owner||'Select'"></span>
        <span class="text-base-content/30">/</span>
        <details class="dropdown dropdown-bottom" x-ref="dd">
          <summary class="hover:text-primary hover:underline decoration-2 underline-offset-4 cursor-pointer flex items-center gap-1">
            <span x-text="name||'Repository...'"></span>
            <i class="ph ph-caret-down text-xs opacity-50"></i>
          </summary>
          <ul class="dropdown-content z-10 menu p-2 shadow-lg bg-base-200 rounded-box w-64 max-h-96 overflow-y-auto mt-1 border border-base-300">
            <template x-for="r in repos"><li><a @click="pick(r)" class="font-mono text-xs" x-text="(r.private?'🔒 ':'')+r.name"></a></li></template>
          </ul>
        </details>
      </div>
      <div class="tooltip tooltip-left" :data-tip="auth?'Authenticated: '+user:'Public only'">
        <i class="ph text-xl" :class="auth?'ph-shield-check text-success':'ph-globe text-base-content/50'"></i>
        <span x-show="auth" class="text-xs text-base-content/50 hidden sm:inline" x-text="user"></span>
      </div>
    </div>
  </template>

  <div class="grid grid-cols-1 lg:grid-cols-4 gap-3">
    <div class="lg:col-span-1 flex flex-col gap-4">
      <div>
        <button @click="ui.files=!ui.files" class="flex items-center gap-1 font-semibold py-0.5 hover:text-primary mb-1 cursor-pointer">
          <i class="ph" :class="ui.files?'ph-caret-down':'ph-caret-right'"></i>Files
        </button>
        <div x-show="ui.files" x-collapse>
          <div class="text-xs font-mono text-base-content/50 px-1 pb-1 truncate flex items-center gap-1">
            <i class="ph ph-folder-open"></i><span x-text="'/'+path"></span>
          </div>
          <div class="overflow-y-auto text-sm bg-base-100 rounded-lg p-1 h-[33vh] border border-base-300" x-html="treeHtml"></div>
        </div>
      </div>
      <div x-show="pulled.length" x-html="pullHtml"></div>
    </div>

    <div class="lg:col-span-3">
      <button @click="ui.content=!ui.content" class="flex items-center gap-1 font-semibold py-0.5 hover:text-primary mb-1 cursor-pointer">
        <i class="ph" :class="ui.content?'ph-caret-down':'ph-caret-right'"></i>Content
      </button>
      <div x-show="ui.content" x-collapse>
        <div x-show="!file" class="h-[calc(100vh-190px)] border border-dashed border-base-300 rounded-lg flex items-center justify-center text-base-content/15">
          <i class="ph ph-code text-6xl"></i>
        </div>
        <div x-show="file" class="space-y-2 relative">
          <div class="flex items-center justify-between">
            <div class="flex-1 min-w-0 pr-2">
              <div class="text-sm font-medium font-mono truncate">
                <span x-text="file"></span>
                <span x-show="commits.length" class="badge badge-ghost badge-xs font-mono ml-1.5" x-text="commits.length+'v'"></span>
              </div>
              <div class="text-xs text-base-content/50" x-text="stats"></div>
            </div>
            <div class="flex items-center gap-0.5">
              <details class="dropdown dropdown-end">
                <summary class="btn btn-sm btn-square btn-ghost hover:text-primary">
                  <i class="ph text-lg" :class="modeIcon"></i>
                </summary>
                <ul class="dropdown-content z-[1] menu p-2 shadow-lg bg-base-200 rounded-box w-32 mt-1 border border-base-300">
                  <template x-for="m in availableModes">
                    <li><a @click="switchMode(m.id)" :class="mode === m.id ? 'active' : ''"><i class="ph" :class="m.icon"></i> <span x-text="m.label"></span></a></li>
                  </template>
                </ul>
              </details>
              <button @click="cp(content, $el)" class="btn btn-sm btn-square btn-ghost hover:text-primary"><i class="ph ph-copy text-lg"></i></button>
              <button @click="openModal()" class="btn btn-sm btn-square btn-ghost hover:text-primary"><i class="ph ph-link text-lg"></i></button>
            </div>
          </div>
          <div id="render-target" class="h-[calc(100vh-230px)] border border-base-300 rounded-lg bg-base-100 overflow-hidden relative" x-html="viewHtml">
            <div x-show="viewLoading" class="absolute inset-0 bg-base-100/30 flex items-center justify-center z-10">
              <span class="loading loading-spinner loading-md"></span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<dialog id="urlsModal" class="modal" onclick="if(event.target===this)this.close()">
  <div class="modal-box shadow-none border border-base-300 bg-base-100 p-4 max-w-lg">
    <div class="flex items-center justify-between mb-3 px-1 font-mono text-sm font-bold truncate" x-text="file.split('/').pop()"></div>
    <div class="flex flex-col gap-1.5">
      <template x-for="url in fileUrls">
        <div class="flex items-center bg-base-200 rounded-lg overflow-hidden">
          <a :href="url.u" target="_blank" class="flex-1 flex items-center gap-2.5 px-3 py-2 min-w-0 hover:bg-base-300">
            <i class="ph shrink-0 text-sm" :class="url.i"></i>
            <div class="flex flex-col min-w-0">
              <span class="text-xs font-semibold leading-tight" x-text="url.l"></span>
              <span class="text-[10px] font-mono opacity-50 truncate leading-tight mt-0.5" x-text="url.u.replace('https://','')"></span>
            </div>
          </a>
          <button class="px-3 py-2 border-l border-base-300 hover:bg-base-300" @click="cp(url.u, $el)">
            <i class="ph ph-copy text-sm opacity-40"></i>
          </button>
        </div>
      </template>
    </div>
    <div class="modal-action mt-3"><button onclick="urlsModal.close()" class="btn btn-ghost btn-sm text-xs">Done</button></div>
  </div>
</dialog>

<script>
const TOKEN = '🎟️GitHubToken', B64 = '📋ClipboardBase64';
const esc = s => new Option(String(s??'')).innerHTML;
const ext = p => p?.split('.').pop().toLowerCase()||'';
const fmt = t => t.replace(/ {4}/g,'  ');
const stat = t => `${t.split('\n').length} lines · ${(new Blob([t]).size/1024).toFixed(1)} KB`;

function app(){ return {
  gh: null, auth: false, user: '', repos: [], owner: '', name: '', repo: '', path: '', tree: [], loading: true, 
  file: '', content: '', mode: '', viewLoading: false, err: '', registryLoaded: false,
  pulled: [], pullText: '', pendingPath: '',
  ui: { files: true, content: true },
  commits: [], commitsFor: '', pinSha: '',

  get fileContext() { return { name: this.file, ext: ext(this.file), content: this.content }; },
  get availableModes() { return this.registryLoaded ? window.ViewRegistry.getModes(this.fileContext) : []; },
  get modeIcon() { return this.registryLoaded ? window.ViewRegistry.modules.find(m => m.id === this.mode)?.icon || 'ph-text-t' : 'ph-text-t'; },
  get stats() { return this.content ? stat(this.content) : ''; },

  async init(){
    window.$a = this;
    while(!window.GH) await new Promise(r => setTimeout(r, 50));
    try {
      this.gh = new window.GH({ token: TOKEN });
      
      const loaderGh = new window.GH({ token: TOKEN, repo: 'mehrlander/web-tools' });
      window.ViewRegistry = await loaderGh.load('view-registry.js');
      this.registryLoaded = true;

      this.auth = !!this.gh.headers.Authorization;
      if(this.auth){ try{ this.user = (await this.gh.req('/user')).login; }catch{ this.user='Me'; } }
      this.repos = await this.gh.repos();
      
      const decode = s => { if(!s || s.includes('📋')) return ''; try { return atob(s.trim()); } catch { return s.trim(); } };
      const rawClip = decode(B64);
      if(rawClip && rawClip.length < 500) {
          const parsed = this.gh.parseUrl(rawClip);
          if(parsed) {
              const r = this.repos.find(r => r.name === parsed.name) || { full_name: parsed.repo, owner: {login: parsed.owner}, name: parsed.name };
              this.pendingPath = parsed.path;
              this.pick(r); return;
          }
      }
      if(this.repos[0]) this.pick(this.repos[0]);
    } catch(e) { this.err = e.message; this.loading = false; console.error(e); }
  },

  async pick(r){
    this.repo = r.full_name; this.owner = r.owner.login; this.name = r.name;
    this.gh.repo = r.full_name; this.load('');
  },

  async load(p){
    this.path = p; this.loading = true;
    try { this.tree = await this.gh.ls(p); } catch(e) { this.err = e.message; }
    this.loading = false;
  },

  async sel(p){
    this.file = p; this.viewLoading = true; this.commitsFor = '';
    try { 
      const res = await this.gh.get(p);
      this.content = fmt(res.text);
      if(this.registryLoaded) {
        const modes = this.availableModes;
        await this.switchMode(modes.find(m=>m.id==='code')?.id || modes[0].id);
      }
    } catch(e) { this.content = `// Error: ${e.message}`; this.mode = 'raw'; }
    this.viewLoading = false;
  },

  async switchMode(id){
    if(!this.registryLoaded) return;
    this.viewLoading = true;
    const mod = await window.ViewRegistry.prepare(id);
    this.mode = id;
    this.$nextTick(() => { if(mod.after) mod.after(this.fileContext); this.viewLoading = false; });
  },

  async pullAdd(p){ if(!this.pulled.includes(p)){ this.pulled.push(p); await this.refreshPull(); } },
  async pullRm(p){ this.pulled = this.pulled.filter(x => x !== p); await this.refreshPull(); },
  async refreshPull(){ this.pullText = (await Promise.all(this.pulled.map(async p => { try { return `// === ${p} ===\n${fmt((await this.gh.get(p)).text)}`; } catch { return `// ERROR: ${p}`; } }))).join('\n\n'); },

  get treeHtml(){
    if(this.loading) return `<div class="flex justify-center py-8"><span class="loading loading-dots loading-sm opacity-30"></span></div>`;
    const back = this.path ? `<div onclick="$a.load('${this.path.split('/').slice(0,-1).join('/')}')" class="p-1 hover:bg-base-200 rounded cursor-pointer opacity-50 font-mono">..</div>` : '';
    return back + this.tree.map(f => {
      const isDir = f.type === 'dir', active = this.file === f.path;
      const plus = isDir ? '' : `<button onclick="event.stopPropagation();$a.pullAdd('${f.path}')" class="btn btn-ghost btn-xs w-6 h-6 p-0 opacity-30 hover:opacity-100 hover:text-success"><i class="ph ph-plus-circle text-lg"></i></button>`;
      return `<div onclick="$a.${isDir ? 'load' : 'sel'}('${f.path}')" class="group flex items-center justify-between p-1 hover:bg-base-200 rounded cursor-pointer ${active?'bg-primary/10 text-primary font-bold':''}">
        <div class="flex items-center gap-1 min-w-0"><i class="ph ${isDir?'ph-folder text-warning':'ph-file text-info'}"></i><span class="truncate">${esc(f.name)}</span></div>${plus}
      </div>`;
    }).join('');
  },

  get pullHtml(){
    const pills = this.pulled.map(p => `<div class="badge badge-outline gap-1 pr-0.5"><span class="truncate max-w-[140px] font-mono text-[10px]">${esc(p)}</span><button onclick="$a.pullRm('${p}')" class="btn btn-ghost btn-xs w-4 h-4 p-0 rounded-full hover:text-error"><i class="ph ph-x"></i></button></div>`).join('');
    return `<div class="flex flex-col gap-2 p-2 bg-base-200 rounded-lg"><div class="flex flex-wrap gap-1.5">${pills}</div><div class="flex items-center justify-between"><span class="text-xs font-bold opacity-70">Combined (${stat(this.pullText).split('·')[1]})</span><button @click="cp(pullText, $el)" class="btn btn-xs btn-square btn-ghost"><i class="ph ph-copy text-lg"></i></button></div><div class="overflow-auto font-mono text-xs border border-base-300 rounded p-2 bg-base-100 h-[25vh] opacity-80">${esc(this.pullText)}</div></div>`;
  },

  get viewHtml() {
    if(!this.file || !this.content || !this.registryLoaded) return '';
    return (window.ViewRegistry.modules.find(m => m.id === this.mode) || window.ViewRegistry.modules[0]).render(this.fileContext);
  },

  get fileUrls(){
    const r = this.repo, f = this.file;
    return [
      {l:'GitHub', i:'ph-github-logo', u:`https://github.com/${r}/blob/main/${f}`},
      {l:'Raw', i:'ph-file-text', u:`https://raw.githubusercontent.com/${r}/main/${f}`},
      {l:'CDN', i:'ph-cloud-arrow-down', u:`https://cdn.jsdelivr.net/gh/${r}/${f}`}
    ];
  },

  async openModal(){ urlsModal.showModal(); if(this.commitsFor !== this.file) { try { this.commits = await this.gh.history(this.file); this.commitsFor = this.file; } catch {} } },
  cp(text, el){ navigator.clipboard.writeText(text); const i = el.querySelector('i'); if(i) { const old = i.className; i.className = 'ph ph-check text-success'; setTimeout(()=>i.className=old, 1200); } }
}}
</script>
<script defer src="https://unpkg.com/@alpinejs/collapse"></script>
<script defer src="https://unpkg.com/alpinejs"></script>
</body>
</html>
